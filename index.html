// ── BARCODE SCANNER ──────────────────────────────────────────────────
let scannerActive=false;
let scannerStream=null;

function closeScannerCleanup(){
  if(scannerStream){scannerStream.getTracks().forEach(t=>t.stop());scannerStream=null;}
  scannerActive=false;
  const ov=document.getElementById("scanner-overlay");
  if(ov)ov.remove();
}

async function lookupBarcode(code){
  try{
    const r=await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    const d=await r.json();
    if(d.status!==1||!d.product)return null;
    const p=d.product;
    const n100=p.nutriments||{};
    return{
      fdcId:"off_"+code,
      name:p.product_name||p.generic_name||"Scanned product",
      servings:[],
      foodNutrients:[
        {nutrientId:1008,value:n100["energy-kcal_100g"]||n100["energy_100g"]||0},
        {nutrientId:1003,value:n100.proteins_100g||0},
        {nutrientId:1005,value:n100.carbohydrates_100g||0},
        {nutrientId:1004,value:n100.fat_100g||0},
        {nutrientId:1079,value:n100.fiber_100g||0}
      ],
      servingSize:p.serving_size||null
    };
  }catch{return null;}
}

async function startBarcodeScanner(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    alert("Camera not available on this device or browser.");return;
  }
  scannerActive=true;

  // Build overlay
  const ov=document.createElement("div");
  ov.id="scanner-overlay";
  ov.style.cssText="position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center";

  const vid=document.createElement("video");
  vid.style.cssText="width:100%;max-width:390px;height:auto";
  vid.setAttribute("playsinline","");vid.setAttribute("autoplay","");vid.muted=true;

  const frame=document.createElement("div");
  frame.style.cssText="position:absolute;width:260px;height:120px;border:2px solid #39ff14;border-radius:10px;box-shadow:0 0 0 9999px rgba(0,0,0,.55);pointer-events:none";

  const lbl=document.createElement("div");
  lbl.textContent="Point camera at barcode";
  lbl.style.cssText="color:#666;font-size:14px;margin-top:16px;font-family:'Exo 2',sans-serif;letter-spacing:.5px";

  const status=document.createElement("div");
  status.id="scan-status";
  status.style.cssText="color:#39ff14;font-size:14px;margin-top:8px;font-family:'Share Tech Mono',monospace;min-height:20px";

  const closeBtn=document.createElement("button");
  closeBtn.textContent="✕ Cancel";
  closeBtn.style.cssText="margin-top:24px;padding:10px 28px;background:transparent;border:1px solid #333;border-radius:10px;color:#666;font-size:15px;font-family:'Exo 2',sans-serif;cursor:pointer";
  closeBtn.addEventListener("click",()=>{closeScannerCleanup();renderNutrition();});

  const vidWrap=document.createElement("div");
  vidWrap.style.cssText="position:relative;width:100%;max-width:390px;display:flex;align-items:center;justify-content:center;overflow:hidden;max-height:55vh";
  vidWrap.appendChild(vid);vidWrap.appendChild(frame);

  ov.appendChild(vidWrap);ov.appendChild(lbl);ov.appendChild(status);ov.appendChild(closeBtn);
  document.body.appendChild(ov);

  try{
    scannerStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280},height:{ideal:720}}});
    vid.srcObject=scannerStream;
    await vid.play();
  }catch(e){
    status.textContent="Camera permission denied.";
    status.style.color="#ff4d6d";
    return;
  }

  // Use BarcodeDetector if available (Safari 17+, Chrome)
  if("BarcodeDetector" in window){
    const detector=new BarcodeDetector({formats:["ean_13","ean_8","upc_a","upc_e","code_128","code_39"]});
    let scanning=true;
    async function scan(){
      if(!scanning||!scannerActive)return;
      try{
        const codes=await detector.detect(vid);
        if(codes.length>0){
          scanning=false;
          const code=codes[0].rawValue;
          status.textContent="Found: "+code+" · Looking up…";
          const food=await lookupBarcode(code);
          closeScannerCleanup();
          if(food){
            fdSelected=food;fdGrams=100;fdPortionMode="grams";fdServing=null;
            renderNutrition();
          } else {
            alert("Product not found in database. Try searching by name instead.");
            renderNutrition();
          }
          return;
        }
      }catch{}
      if(scanning&&scannerActive)requestAnimationFrame(scan);
    }
    vid.addEventListener("playing",()=>requestAnimationFrame(scan));
  } else {
    // Fallback: manual barcode entry
    frame.style.display="none";
    lbl.textContent="BarcodeDetector not supported on this browser.";
    const inp=document.createElement("input");
    inp.type="number";inp.placeholder="Enter barcode number";
    inp.style.cssText="width:80%;max-width:300px;padding:12px;background:#161616;border:1px solid #39ff14;border-radius:8px;color:#fff;font-size:17px;outline:none;font-family:'Exo 2',sans-serif;margin-top:16px;text-align:center";
    const lookBtn=document.createElement("button");
    lookBtn.textContent="Look up";

function exportData(){
  const keys=["user_profile","wk_week","wk_completed","wk_setdata","wk_history","weighins","recent_foods"];
  const data={version:1,exported:new Date().toISOString(),profile:{}};
  keys.forEach(k=>{const v=localStorage.getItem(k);if(v)data[k]=JSON.parse(v);});
  // Also grab all nutrition logs (nutri_YYYY-MM-DD keys)
  data.nutrition={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith("nutri_")){data.nutrition[k]=JSON.parse(localStorage.getItem(k)||"[]");}
  }
  // Also grab all goal logs
  data.goals={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith("goals_")){data.goals[k]=JSON.parse(localStorage.getItem(k)||"{}");}
  }
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`ej-health-backup-${td()}.json`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}

function importData(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.version)throw new Error("Invalid backup file");
      const keys=["user_profile","wk_week","wk_completed","wk_setdata","wk_history","weighins","recent_foods"];
      keys.forEach(k=>{if(data[k]!==undefined)localStorage.setItem(k,JSON.stringify(data[k]));});
      if(data.nutrition)Object.entries(data.nutrition).forEach(([k,v])=>localStorage.setItem(k,JSON.stringify(v)));
      if(data.goals)Object.entries(data.goals).forEach(([k,v])=>localStorage.setItem(k,JSON.stringify(v)));
      // Reload all state
      profile=ld("user_profile",null)||INIT;
      wkWeek=ld("wk_week",1);
      wkComp=ld("wk_completed",[]);
      wkSets=ld("wk_setdata",{});
      wkHist=ld("wk_history",{});
      weighIns=ld("weighins",[]);
      recentFoods=ld("recent_foods",[]);
      alert("Data imported successfully!");
      render();
    }catch(err){alert("Import failed — make sure you're using a valid EJ Health backup file.");}
  };
  reader.readAsText(file);
}


// ── USDA FOOD DB ────────────────────────────────────────────────────
const USDA_KEY="DEMO_KEY";
const NID={energy:1008,protein:1003,carbs:1005,fat:1004,fiber:1079};

function getNutrient(food,id){
  if(!food||!food.foodNutrients)return 0;
  const n=food.foodNutrients.find(x=>x.nutrientId===id||(x.nutrient&&x.nutrient.id===id));
  return n?(n.value||n.amount||0):0;
}
function calcFromGrams(food,grams){
  const s=grams/100;
  return{
    calories:Math.round(getNutrient(food,NID.energy)*s),
    protein: +(getNutrient(food,NID.protein)*s).toFixed(1),
    carbs:   +(getNutrient(food,NID.carbs)*s).toFixed(1),
    fat:     +(getNutrient(food,NID.fat)*s).toFixed(1),
    fiber:   +(getNutrient(food,NID.fiber)*s).toFixed(1)
  };
}
async function searchFoods(q){
  if(!q||q.length<2){fdResults=[];updateSearchResults();return;}
  fdLoading=true;updateSearchResults();
  try{
    const url=`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&search_simple=1&action=process&json=1&page_size=12&fields=id,product_name,nutriments,serving_size,serving_quantity`;
    const r=await fetch(url);
    const d=await r.json();
    fdResults=(d.products||[])
      .filter(p=>p.product_name&&p.product_name.trim())

        const n=p.nutriments||{};
        return{
          fdcId:"off_"+p.id,

          servings:p.serving_size&&p.serving_quantity?[{disseminationText:p.serving_size,gramWeight:parseFloat(p.serving_quantity)||null}]:[],
          foodNutrients:[
            {nutrientId:1008,value:n["energy-kcal_100g"]||0},
            {nutrientId:1003,value:n.proteins_100g||0},
            {nutrientId:1005,value:n.carbohydrates_100g||0},
            {nutrientId:1004,value:n.fat_100g||0},

function h(tag,attrs,children){

    else if(k==="class")el.className=v;

    else el.setAttribute(k,v);

    if(c!=null&&c!==false)el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);

}
const div=(st,ch)=>h("div",{style:st},ch);

function ring(value,max,color,label){

  const mkC=(col,sw,da)=>{const c=document.createElementNS("http://www.w3.org/2000/svg","circle");c.setAttribute("cx",sz/2);c.setAttribute("cy",sz/2);c.setAttribute("r",r);c.setAttribute("fill","none");c.setAttribute("stroke",col);c.setAttribute("stroke-width",sw);if(da){c.setAttribute("stroke-dasharray",da);c.setAttribute("stroke-linecap","round");c.style.filter=`drop-shadow(0 0 3px ${col})`;}return c;};
  svg.appendChild(mkC(BRD,5,null));svg.appendChild(mkC(color,5,`${dash} ${circ}`));

// ── WORKOUT HELPERS ─────────────────────────────────────────────────
function getLast(di,ei){const h=wkHist[`d${di}_e${ei}`]||[];return h.length?h[h.length-1]:null}
function getTopSet(di,ei){
  const last=getLast(di,ei);
  if(!last||!last.sets||!last.sets.length)return null;
  return last.sets.reduce((a,s)=>s.weight>a.weight?s:a,last.sets[0]);
}
function getSug(di,ei){
  const phase=pf(wkWeek),dl=wkWeek%6===0&&wkWeek>0;
  const ep=PROG[di].exercises[ei].phases[phase],top=getTopSet(di,ei);
  if(!top)return null;
  if(dl)return Math.round(top.weight*.85*4)/4;
  const last=getLast(di,ei);
  const allHit=last&&last.sets&&last.sets.every(s=>s.reps>=ep.rr[1]);
  return allHit?top.weight+PROG[di].exercises[ei].inc:top.weight;
}
function getSets(di,ei){
  const k=`d${di}_e${ei}_w${wkWeek}`;
  if(!wkSets[k]){
    const ep=PROG[di].exercises[ei].phases[pf(wkWeek)];
    if(ep.sets===0)return[];
    const sw=getSug(di,ei);
    wkSets[k]=Array.from({length:ep.sets},()=>({weight:sw?String(sw):"",reps:"",done:false}));
    sv("wk_setdata",wkSets);
  }
  return wkSets[k];
}
function updSet(di,ei,si,field,val){
  getSets(di,ei); // ensure initialised
  wkSets[`d${di}_e${ei}_w${wkWeek}`][si][field]=String(val);
  sv("wk_setdata",wkSets);
}
function tglDone(di,ei,si){
  const sets=getSets(di,ei);
  sets[si].done=!sets[si].done;
  sv("wk_setdata",wkSets);
  // update checkbox in place — no re-render
  const btn=document.getElementById(`ck-${di}-${ei}-${si}`);
  if(btn){
    const done=sets[si].done;
    btn.style.border=`1px solid ${done?G:BRD}`;
    btn.style.background=done?OKD:SRF2;
    btn.style.color=done?G:DIM;
  }
  // update progress bar
  const pb=document.getElementById("wk-pb");
  if(pb){const p=calcProg(di);pb.style.width=Math.round(p*100)+"%";}
  // update ex dot
  const allDone=sets.every(s=>s.done);
  const dot=document.getElementById(`en-${di}-${ei}`);
  if(dot){
    dot.style.borderColor=allDone?G+"66":BRD;
    dot.style.background=allDone?OKD:SRF2;
    dot.style.color=allDone?G:MUT;
    dot.textContent=allDone?"✓":String(ei+1);
  }
  const card=document.getElementById(`ec-${di}-${ei}`);
  if(card)card.style.border=`1px solid ${allDone?G+"66":BRD}`;
}
function calcProg(di){
  const day=PROG[di],phase=pf(wkWeek);
  if(day.rest||!day.exercises.length)return 1;
  let t=0,d=0;
  pex(day,phase).forEach(exO=>{getSets(di,day.exercises.indexOf(exO)).forEach(s=>{t++;if(s.done)d++;});});
  return t?d/t:0;
}
function finishWorkout(){
  const di=activeDay,day=PROG[di],phase=pf(wkWeek),nh={...wkHist};
  pex(day,phase).forEach(exO=>{
    const ei=day.exercises.indexOf(exO);
    const done=getSets(di,ei).filter(s=>s.done&&s.weight&&s.reps);
    if(!done.length)return;
    const hk=`d${di}_e${ei}`;
    nh[hk]=[...(nh[hk]||[]),{week:wkWeek,date:td(),sets:done.map(s=>({weight:parseFloat(s.weight)||0,reps:parseFloat(s.reps)||0}))}];
  });
  wkHist=nh;sv("wk_history",wkHist);
  const nc=[...new Set([...wkComp,di])];wkComp=nc;sv("wk_completed",wkComp);
  if(PROG.map((_,i)=>i).filter(i=>!PROG[i].rest).every(i=>nc.includes(i))){
    wkWeek++;sv("wk_week",wkWeek);wkComp=[];wkSets={};sv("wk_completed",[]);sv("wk_setdata",{});
  }
  renderWorkout();
}

// ── FEEDBACK ────────────────────────────────────────────────────────
function getFeedback(){
  const tips=[];
  if(weighIns.length>=2){
    const r=weighIns.slice(-4),delta=r[r.length-1].weight-r[0].weight,rate=delta/r.length;
    if(rate<-1)tips.push({type:"warn",title:"Losing too fast",body:`~${Math.abs(rate).toFixed(1)} lbs/week. Add 150–200 kcal to protect muscle.`});
    else if(rate<-.25)tips.push({type:"ok",title:"Recomp on track",body:`~${Math.abs(rate).toFixed(2)} lbs/week fat loss. Keep going.`});
    else if(rate>.25)tips.push({type:"warn",title:"Weight trending up",body:`+${rate.toFixed(1)} lbs/week. Tighten up on weekends.`});
    else tips.push({type:"info",title:"Weight stable",body:"Good for recomp. For fat loss, try −100 kcal or +1,500 daily steps."});
  }
  const gains=[];
  PROG.forEach((day,di)=>day.exercises.forEach((exO,ei)=>{
    const h=wkHist[`d${di}_e${ei}`]||[];
    if(h.length>=3){
      const f=h[0].sets?Math.max(...h[0].sets.map(s=>s.weight)):h[0].weight||0;
      const l=h[h.length-1].sets?Math.max(...h[h.length-1].sets.map(s=>s.weight)):h[h.length-1].weight||0;
      if(l>f)gains.push({name:exO.name,g:l-f});
    }
  }));
  if(gains.length){const top=gains.sort((a,b)=>b.g-a.g)[0];tips.push({type:"ok",title:`PR — ${top.name}`,body:`Up ${top.g} lbs from your first session.`});}
  if(!tips.length)tips.push({type:"info",title:"Log a weigh-in for feedback",body:"After 2+ entries you'll get adaptive recommendations here."});
  return tips;
}

      txt("◑",{fontSize:"45px",marginBottom:"14px",color:TXT}),
      txt("Rest & recover",{fontSize:"18px",fontWeight:700,color:TXT,marginBottom:"7px"}),
      txt("Sleep, eat well, let the adaptation happen.",{fontSize:"14px",color:TXT,lineHeight:1.7})
    ]));
  } else {
    // Workout header
    const nameRow=div({display:"flex",alignItems:"center",gap:"8px",marginBottom:"2px"},[
      txt(day.name,{fontSize:"20px",fontWeight:700,color:TXT}),
      day.prime?div({fontSize:"11px",background:WARND,color:WARN,padding:"2px 8px",borderRadius:"10px",border:`1px solid ${WARN}44`},["⚡ PRIME"]):null
    ].filter(Boolean));
    wrap.appendChild(div({marginBottom:"12px"},[
      nameRow,
      txt(day.focus,{fontSize:"13px",color:TXT,marginBottom:"8px"}),
      div({background:SRF2,border:`1px solid ${BRD}`,borderRadius:"8px",padding:"8px 11px",marginBottom:"10px",fontSize:"12px",color:TXT,lineHeight:1.6},[day.pn[phase]]),
      dl?div({background:WARND,border:`1px solid ${WARN}44`,borderRadius:"7px",padding:"7px 11px",marginBottom:"8px",fontSize:"12px",color:WARN},["Deload week — weights at 85% of last session."]):null,
      isDone?
        div({background:OKD,border:`1px solid ${G}66`,borderRadius:"10px",padding:"11px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"},[
          div({display:"flex",alignItems:"center",gap:"10px"},[
            txt("✓",{fontSize:"19px",color:G}),
            div({},[txt("Session complete",{fontSize:"14px",fontWeight:700,color:G}),txt(pct+"% of sets logged",{fontSize:"12px",color:TXT})])
          ]),
          h("button",{style:{padding:"5px 11px",background:"transparent",border:`1px solid ${G}44`,borderRadius:"7px",color:G,fontSize:"12px",fontFamily:"'Exo 2',sans-serif",cursor:"pointer"},onclick:()=>{
            wkComp=wkComp.filter(x=>x!==activeDay);sv("wk_completed",wkComp);
            const nh={...wkHist};
            pex(day,phase).forEach(exO=>{const ei=day.exercises.indexOf(exO),hk=`d${activeDay}_e${ei}`;if(nh[hk]&&nh[hk].length){const l=nh[hk][nh[hk].length-1];if(l.week===wkWeek||l.date===td())nh[hk]=nh[hk].slice(0,-1);}});
            wkHist=nh;sv("wk_history",wkHist);renderWorkout();
          }},["Undo"])
        ]):
        div({class:"nbw"},[div({class:"nbf",id:"wk-pb",style:{width:pct+"%",background:pc,boxShadow:`0 0 5px ${pc}`}})])
    ].filter(Boolean)));

    // Exercises
    exes.forEach(exO=>{
      const ei=day.exercises.indexOf(exO);
      const ep=exO.phases[phase],sets=getSets(activeDay,ei);
      const allDone=sets.length>0&&sets.every(s=>s.done),isOpen=openEx===ei;
      const sw=getSug(activeDay,ei),last=getLast(activeDay,ei);
      const allHit=last&&last.sets&&last.sets.every(s=>s.reps>=ep.rr[1]);

      const dot=h("div",{class:"ex-num",id:`en-${activeDay}-${ei}`});
      if(allDone){dot.style.borderColor=G+"66";dot.style.background=OKD;dot.style.color=G;dot.textContent="✓";}
      else dot.textContent=String(ei+1);

      const pill=sw!==null?h("span",{style:{fontSize:"11px",padding:"1px 7px",borderRadius:"10px",fontFamily:"'Share Tech Mono',monospace",background:allHit&&!dl?GD:SRF2,color:allHit&&!dl?G:DIM,border:`1px solid ${allHit&&!dl?G+"44":BRD}`}},[(dl?"deload":allHit?`+${exO.inc}lb`:"same")]):null;

      const hdr=h("div",{class:"ex-hdr"});
      hdr.appendChild(dot);
      hdr.appendChild(div({flex:1,minWidth:0},[
        txt(exO.name,{fontSize:"14px",fontWeight:600,color:TXT,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}),
        div({fontSize:"12px",color:TXT,marginTop:"1px",display:"flex",alignItems:"center",gap:"5px",flexWrap:"wrap"},[
          document.createTextNode(`${ep.sets}×${ep.rr[0]}–${ep.rr[1]} · RPE ${ep.rpe}`),pill
        ].filter(Boolean))
      ]));
      hdr.appendChild(txt("⌄",{color:TXT,fontSize:"14px",transition:"transform .2s",transform:isOpen?"rotate(180deg)":"none",flexShrink:0}));
      hdr.addEventListener("click",()=>{openEx=isOpen?-1:ei;renderWorkout();});

      const exCard=h("div",{class:"ex-card",id:`ec-${activeDay}-${ei}`});
      if(allDone)exCard.style.border=`1px solid ${G}66`;
      exCard.appendChild(hdr);

      if(isOpen){
        const body=h("div",{class:"ex-body"});
        // Note + video link row
        const noteVideoRow=div({display:"flex",alignItems:"flex-start",gap:"8px",margin:"10px 0 8px"});
        if(exO.note){
          noteVideoRow.appendChild(div({background:SRF2,borderRadius:"7px",padding:"7px 10px",fontSize:"12px",color:TXT,lineHeight:1.5,flex:1},["💡 "+exO.note]));
        }
        const vBtn=h("a",{href:videoUrl(exO.name),target:"_blank",rel:"noopener",style:{flexShrink:0,display:"flex",alignItems:"center",gap:"4px",padding:"7px 10px",background:"#1a0a0a",border:"1px solid #ff000044",borderRadius:"7px",color:"#ff4444",fontSize:"12px",fontWeight:600,textDecoration:"none",fontFamily:"'Exo 2',sans-serif"}},["▶ Watch"]);
        noteVideoRow.appendChild(vBtn);
        if(noteVideoRow.children.length>0)body.appendChild(noteVideoRow);
        if(sw!==null)body.appendChild(div({display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${BRD}`,marginBottom:"8px"},[
          txt("Suggested weight",{fontSize:"12px",color:TXT}),
          txt(sw+" lbs",{fontFamily:"'Share Tech Mono',monospace",fontSize:"14px",color:G})
        ]));
        // Column headers
        body.appendChild(div({display:"grid",gridTemplateColumns:"24px 1fr 1fr 44px",gap:"6px",padding:"4px 0",marginBottom:"2px"},[
          txt("",{}),
          txt("Weight",{fontSize:"10px",color:TXT,textTransform:"uppercase",letterSpacing:".5px",textAlign:"center"}),
          txt("Reps",{fontSize:"10px",color:TXT,textTransform:"uppercase",letterSpacing:".5px",textAlign:"center"}),
          txt("✓",{fontSize:"10px",color:TXT,textAlign:"center"})
        ]));
        // Set rows
        sets.forEach((s,si)=>{
          const wI=h("input",{type:"number",inputmode:"decimal",placeholder:"lbs",class:"sinp"});
          wI.value=s.weight;
          wI.addEventListener("input",e=>updSet(activeDay,ei,si,"weight",e.target.value));
          wI.addEventListener("change",e=>updSet(activeDay,ei,si,"weight",e.target.value));

          const rI=h("input",{type:"number",inputmode:"numeric",placeholder:String(ep.rr[0]),class:"sinp"});
          rI.value=s.reps;
          if(s.reps&&parseInt(s.reps)>=ep.rr[1]){rI.style.borderColor=G;rI.style.background="#0a1a00";}
          rI.addEventListener("input",e=>{
            updSet(activeDay,ei,si,"reps",e.target.value);
            const hit=e.target.value&&parseInt(e.target.value)>=ep.rr[1];
            rI.style.borderColor=hit?G:BRD;rI.style.background=hit?"#0a1a00":SRF2;
          });
          rI.addEventListener("change",e=>updSet(activeDay,ei,si,"reps",e.target.value));

          const ck=h("button",{class:"sck",id:`ck-${activeDay}-${ei}-${si}`,onclick:()=>tglDone(activeDay,ei,si)},["✓"]);
          if(s.done){ck.style.border=`1px solid ${G}`;ck.style.background=OKD;ck.style.color=G;}

          body.appendChild(div({class:"set-row"},[
            txt(String(si+1),{fontFamily:"'Share Tech Mono',monospace",fontSize:"12px",color:TXT,textAlign:"center",lineHeight:"44px"}),
            wI,rI,ck
          ]));
        });
        body.appendChild(h("button",{style:{width:"100%",padding:"8px",background:"transparent",border:`1px dashed ${BRD}`,borderRadius:"8px",color:TXT,fontSize:"13px",fontFamily:"'Exo 2',sans-serif",cursor:"pointer",marginTop:"6px"},onclick:()=>{
          const k=`d${activeDay}_e${ei}_w${wkWeek}`,cur=getSets(activeDay,ei);
          wkSets[k]=[...cur,{weight:cur[0]?.weight||"",reps:"",done:false}];
          sv("wk_setdata",wkSets);renderWorkout();
        }},["+ Add set"]));
        exCard.appendChild(body);
      }
      wrap.appendChild(exCard);
    });

    if(!isDone){
      wrap.appendChild(h("button",{style:{width:"100%",padding:"13px",background:"transparent",border:`1.5px solid ${pc}`,borderRadius:"11px",color:pc,fontSize:"15px",fontWeight:700,fontFamily:"'Exo 2',sans-serif",cursor:"pointer",marginTop:"4px",boxShadow:`0 0 12px ${pc}44`},onclick:finishWorkout},["Finish session"]));
    }
  }
  content.appendChild(wrap);
}

// ── RENDER PROGRESS ───────────────────────────────────────────────────
function renderProgress(){
  const phase=pf(wkWeek),byEx={};
  PROG.forEach((day,di)=>day.exercises.forEach((exO,ei)=>{
    const h=wkHist[`d${di}_e${ei}`]||[];
    if(h.length){if(!byEx[exO.name])byEx[exO.name]=[];byEx[exO.name].push(...h);}
  }));
  const exes=Object.keys(byEx);
  const content=document.getElementById("content");content.innerHTML="";
  const wrap=div({padding:"14px 14px 88px"});

  if(!exes.length){
    wrap.appendChild(div({textAlign:"center",padding:"48px 20px"},[
      txt("◎",{fontSize:"39px",marginBottom:"12px",color:P}),
      txt("No data yet",{fontSize:"16px",fontWeight:700,color:TXT,marginBottom:"7px"}),
      txt("Finish a training session to see your history here.",{fontSize:"14px",color:TXT,lineHeight:1.7})
    ]));
    content.appendChild(wrap);return;
  }

  wrap.appendChild(div({background:SRF,border:`1px solid ${PC[phase]}33`,borderRadius:"11px",padding:"9px 14px",marginBottom:"14px"},[
    txt(`Phase ${phase+1} · ${PL[phase]}`,{fontSize:"10px",color:PC[phase],textTransform:"uppercase",letterSpacing:"1.8px",marginBottom:"1px"}),
    txt(`Week ${wkWeek} · ${exes.length} exercises tracked`,{fontSize:"12px",color:TXT})
  ]));

  exes.forEach(name=>{
    const sessions=byEx[name],isOpen=progEx===name;
    const topWts=sessions.map(s=>s.sets?Math.max(...s.sets.map(x=>x.weight)):s.weight||0);
    const maxW=Math.max(...topWts),firstTop=topWts[0],lastTop=topWts[topWts.length-1];
    const gained=Math.round((lastTop-firstTop)*10)/10;
    const latest=sessions[sessions.length-1];

    const cardEl=h("div",{class:"card",style:{marginBottom:"10px"}});

    // Summary row
    const sumRow=div({padding:"13px 14px 0",cursor:"pointer"});
    sumRow.appendChild(div({display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"8px"},[
      div({flex:1,paddingRight:"10px"},[
        txt(name,{fontSize:"14px",fontWeight:600,color:TXT,marginBottom:"3px"}),
        div({fontSize:"11px",color:TXT,fontFamily:"'Share Tech Mono',monospace",display:"flex",gap:"8px",flexWrap:"wrap"},[
          txt(sessions.length+" session"+(sessions.length!==1?"s":""),{color:TXT}),
          gained>0?txt("↑ +"+gained+"lb",{color:G}):gained<0?txt("↓ "+gained+"lb",{color:PROT}):sessions.length>1?txt("holding",{color:TXT}):null
        ].filter(Boolean))
      ]),
      div({textAlign:"right"},[
        txt(lastTop+"lbs",{fontFamily:"'Share Tech Mono',monospace",fontSize:"16px",color:G,marginBottom:"2px"}),
        txt("latest top set",{fontSize:"9px",color:TXT,textTransform:"uppercase",letterSpacing:".5px"})
      ])
    ]));
    // Sparkline
    if(sessions.length>1){
      sumRow.appendChild(div({display:"flex",alignItems:"flex-end",gap:"3px",height:"26px",marginBottom:"12px"},
        topWts.map((w,i)=>{const ht=maxW>0?Math.max(w/maxW*26,3):3,isLast=i===topWts.length-1;return div({flex:1,height:ht+"px",borderRadius:"2px",background:isLast?G:BRD,boxShadow:isLast?`0 0 5px ${G}`:"none"});})
      ));
    } else sumRow.appendChild(div({paddingBottom:"12px"}));
    sumRow.addEventListener("click",()=>{progEx=isOpen?null:name;renderProgress();});
    cardEl.appendChild(sumRow);

    // Expanded session history
    if(isOpen){
      const hist=h("div",{style:{borderTop:`1px solid ${BRD}`}});
      [...sessions].reverse().forEach(session=>{
        const sets=session.sets||[];
        const sTop=sets.length?Math.max(...sets.map(s=>s.weight)):0;
        hist.appendChild(div({padding:"9px 14px 6px",borderBottom:`1px solid ${BRD}`,display:"flex",justifyContent:"space-between",alignItems:"center"},[
          div({},[
            txt(session.date||`Week ${session.week}`,{fontSize:"13px",fontWeight:600,color:TXT}),
            txt(`Week ${session.week||"—"} · ${sets.length} set${sets.length!==1?"s":""}`,{fontSize:"11px",color:TXT,marginTop:"1px"})
          ]),
          txt(sTop+"lbs top",{fontFamily:"'Share Tech Mono',monospace",fontSize:"12px",color:G})
        ]));
        const grid=div({padding:"6px 14px 10px"});
        grid.appendChild(div({display:"grid",gridTemplateColumns:"28px 1fr 1fr 1fr",gap:"6px",marginBottom:"4px"},[
          txt("Set",{fontSize:"10px",color:TXT,textTransform:"uppercase",letterSpacing:".5px"}),
          txt("Weight",{fontSize:"10px",color:TXT,textTransform:"uppercase",letterSpacing:".5px",textAlign:"center"}),
          txt("Reps",{fontSize:"10px",color:TXT,textTransform:"uppercase",letterSpacing:".5px",textAlign:"center"}),
          txt("Vol",{fontSize:"10px",color:TXT,textTransform:"uppercase",letterSpacing:".5px",textAlign:"center"})
        ]));
        sets.forEach((s,si)=>{
          grid.appendChild(div({display:"grid",gridTemplateColumns:"28px 1fr 1fr 1fr",gap:"6px",marginBottom:"4px",alignItems:"center"},[
            txt(si+1,{fontFamily:"'Share Tech Mono',monospace",fontSize:"12px",color:TXT}),
            txt(s.weight+"lbs",{fontFamily:"'Share Tech Mono',monospace",fontSize:"13px",color:TXT,textAlign:"center"}),
            txt(s.reps+" reps",{fontFamily:"'Share Tech Mono',monospace",fontSize:"13px",color:CARB,textAlign:"center"}),
            txt(String(Math.round(s.weight*s.reps)),{fontFamily:"'Share Tech Mono',monospace",fontSize:"12px",color:TXT,textAlign:"center"})
          ]));
        });
        hist.appendChild(grid);
      });
      cardEl.appendChild(hist);
    }
    wrap.appendChild(cardEl);
  });
  content.appendChild(wrap);
}

// ── MAIN RENDER ───────────────────────────────────────────────────────
function render(){
  renderHeader();renderNav();
  if(activeTab==="dashboard")renderDashboard();
  else if(activeTab==="nutrition")renderNutrition();
  else if(activeTab==="workout")renderWorkout();
  else if(activeTab==="progress")renderProgress();
}

render();
</script>
</body>
</html>
