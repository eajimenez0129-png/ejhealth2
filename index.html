<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="EJ"/>
<meta name="theme-color" content="#000000"/>
<title>EJ · Daily practice.</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
/* ── 2B: Dark Slate · Space Grotesk · #0B1D2E ── */
:root{
  --bg:#282828;
  --bg2:#323232;
  --bg3:#3a3a3a;
  --brd:#444444;
  --brd2:#505050;
  --txt:#F2F0EE;
  --muted:#888884;
  --dim:#525252;
  --teal:#C4856A;
  --teal-dim:#2a1e18;
  --teal-bg:#C4856A15;
  --warn:#e0a030;
  --warn-dim:#2a1800;
  --prot:#e05570;
  --carb:#e0a030;
  --fat:#60b0d0;
  --fib:#70b080;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#282828;color:#F2F0EE;font-family:'Space Grotesk',sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none;height:100%}
::-webkit-scrollbar{width:0;height:0}
input,button,select,textarea{font-family:'Space Grotesk',sans-serif;color:var(--txt)}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
button{cursor:pointer}
.app{max-width:390px;margin:0 auto;min-height:100vh;background:#282828;position:relative}
.hdr{padding:14px 16px 12px;border-bottom:1px solid #444444;display:flex;justify-content:space-between;align-items:center;background:#282828;position:sticky;top:0;z-index:100}
.neon-line{height:1px;background:linear-gradient(90deg,transparent,#C4856A,transparent);opacity:.35}
.content{overflow-y:auto;-webkit-overflow-scrolling:touch}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;background:rgba(40,40,40,.96);border-top:1px solid #444444;display:flex;padding:10px 0;z-index:100;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.nav-btn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;position:relative}
.nav-dot{position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:20px;height:1px;background:var(--teal);border-radius:1px}
.card{background:#323232;border:1px solid #444444;border-radius:14px;overflow:hidden;margin-bottom:12px}
.inp{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--brd);border-radius:8px;color:var(--txt);font-size:15px;outline:none;font-family:'Space Grotesk',sans-serif}
.inp:focus{border-color:var(--teal)}
.nbw{height:2px;background:var(--brd);border-radius:1px;overflow:hidden}
.nbf{height:2px;border-radius:1px;transition:width .4s}
.day-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;scrollbar-width:none}
.ex-card{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;margin-bottom:8px;overflow:hidden}
.ex-hdr{display:flex;align-items:center;gap:11px;padding:12px 14px;cursor:pointer;user-select:none;-webkit-user-select:none}
.ex-num{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);flex-shrink:0}
.ex-body{padding:0 14px 12px;border-top:1px solid var(--brd)}
.set-row{display:grid;grid-template-columns:24px 1fr 1fr 44px;gap:6px;margin-bottom:6px;align-items:center}
.sinp{height:44px;border:1px solid var(--brd);border-radius:8px;text-align:center;font-size:17px;color:var(--txt);background:var(--bg3);width:100%;outline:none;font-family:'Space Grotesk',sans-serif;-webkit-appearance:none}
.sinp:focus{border-color:#C4856A;background:#2a1e18}
.sck{height:44px;width:44px;border-radius:8px;border:1px solid var(--brd);background:var(--bg3);color:var(--dim);font-size:17px}
.goal-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-top:1px solid var(--brd);cursor:pointer}
.safe-top{padding-top:env(safe-area-inset-top,0px)}
.safe-bottom{padding-bottom:calc(env(safe-area-inset-bottom,0px) + 8px)}
.sr-item{padding:10px 14px;border-bottom:1px solid var(--brd);cursor:pointer}
.sr-item:last-child{border-bottom:none}
.sr-item:active{background:var(--bg3)}
.mp-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px}
.mp-item{background:var(--bg);border-radius:8px;padding:8px 2px;text-align:center;border:1px solid var(--brd)}
.ptabs{display:flex;gap:6px;margin-bottom:10px}
.ptab{flex:1;padding:7px 0;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;text-align:center;border:1px solid var(--brd);background:transparent;color:var(--muted);font-family:'Space Grotesk',sans-serif}
.ptab.on{background:#C4856A15;border-color:#C4856A;color:#C4856A}
.sect{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.8px;margin-bottom:8px;font-family:'Space Mono',monospace}
.scan-btn{display:flex;align-items:center;gap:6px;padding:10px 14px;background:transparent;border:1px solid var(--teal);border-radius:9px;color:var(--teal);font-size:13px;font-weight:600;font-family:'Space Grotesk',sans-serif;cursor:pointer}
</style>
</head>
<body>
<div class="app">
  <div class="hdr safe-top">
    <div>
      <div style="font-size:20px;font-weight:700;letter-spacing:-.4px;font-family:'Space Grotesk',sans-serif">EJ<span style="color:#C4856A">.</span></div>
      <div style="font-size:10px;color:#525252;margin-top:2px;letter-spacing:1.8px;text-transform:uppercase;font-family:'Space Mono',monospace">Daily practice.</div>
    </div>
    <div style="text-align:right;font-family:'Space Mono',monospace;font-size:10px;color:#888884">
      <div id="hdr-date"></div>
      <div id="hdr-stats" style="display:none"></div>
    </div>
  </div>
  <div class="neon-line"></div>
  <div class="content" id="content" style="padding-bottom:80px"></div>
  <nav class="nav safe-bottom" id="nav"></nav>
</div>
<script>
// ── COLORS — 2C Charcoal + Rose Gold ────────────────────────────────
const G="#C4856A",P="#C4856A",GD="#2a1e18",PD="#2a1e18";
const PROT="#e05570",CARB="#e0a030",FAT="#60b0d0",FIB="#70b080";
const SRF="#323232",SRF2="#3a3a3a",BRD="#444444",TXT="#F2F0EE",MUT="#888884",DIM="#525252";
const WARN="#e0a030",WARND="#2a1800",OKD="#2a1e18";
const PC=["#C8A882","#C4856A","#E0A030"];
const FIBER_TARGET=25;

// ── STORAGE ─────────────────────────────────────────────────────────
const ld=(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb}catch{return fb}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};
const td=()=>{
  const d=new Date();
  const yr=d.getFullYear();
  const mo=String(d.getMonth()+1).padStart(2,"0");
  const dy=String(d.getDate()).padStart(2,"0");
  return `${yr}-${mo}-${dy}`;
};

// ── PROFILE ─────────────────────────────────────────────────────────
const INIT={weight:138,bodyFat:23.5,calories:1850,protein:145,carbs:175,fat:55,waterOz:94,tdee:2100};
let profile=ld("user_profile",null)||INIT;
function saveProfile(p){profile=p;sv("user_profile",p);renderHeader()}
function calcMacros(w,bf,cal){
  const lbm=w*(1-bf/100),pr=Math.round(lbm*1.05),fa=Math.round(cal*.27/9);
  return{protein:pr,fat:fa,carbs:Math.max(Math.round((cal-pr*4-fa*9)/4),80),waterOz:Math.round(w*.68)};
}
function estTDEE(w,bf){return Math.round((370+21.6*(w*(1-bf/100)*.453592))*1.25)}

// ── PROGRAM ─────────────────────────────────────────────────────────
const PL=["Reactivation","Accumulation","Development"];
const PD2=["Wks 1–2 · Light loads, movement patterns, zero soreness spirals.","Wks 3–4 · Volume builds, intensity climbs carefully.","Wks 5–6+ · Full program. Progressive overload in effect."];
const pf=w=>w<=2?0:w<=4?1:2;
const ex=(name,p0s,p0r,p1s,p1r,p2s,p2r,rpe,inc,note="")=>({name,phases:[{sets:p0s,rr:p0r,rpe:Math.max(rpe-2,5)},{sets:p1s,rr:p1r,rpe:Math.max(rpe-1,6)},{sets:p2s,rr:p2r,rpe}],inc,note});
// ── PROGRAM — slot-based with exercise pick lists ─────────────────
// Each slot has a muscle target + list of equipment-variable options
// Progressive overload is tracked per exercise name across all slots
const EXLIB={
  // Push
  "Chest Press":[
    {name:"Barbell bench press",       inc:5,  note:"Elbows 45° — protects cuff. Keep right arm controlled."},
    {name:"Dumbbell flat press",        inc:2.5,note:"Neutral grip option available — easier on right shoulder."},
    {name:"Landmine press",             inc:2.5,note:"Cuff-safe angle. Brace elbow into body at bottom."},
    {name:"Machine chest press",        inc:5,  note:"Fixed path — good for shoulder stability."},
    {name:"Push-up (weighted)",         inc:2.5,note:"Elevate feet to increase difficulty."},
  ],
  "Incline Press":[
    {name:"Incline dumbbell press",     inc:2.5,note:"30–45° incline. Neutral grip protects shoulder."},
    {name:"Incline barbell press",      inc:5,  note:"Spot recommended. Keep right arm path controlled."},
    {name:"Incline cable fly",          inc:2.5,note:"Low anchor for safe shoulder arc."},
    {name:"Incline machine press",      inc:5,  note:"Fixed path — good when shoulder is aggravated."},
  ],
  "Lateral Delts":[
    {name:"Cable lateral raise",        inc:2.5,note:"Arm forward 15° removes impingement risk."},
    {name:"Dumbbell lateral raise",     inc:2.5,note:"Lead with elbow, light weight."},
    {name:"Machine lateral raise",      inc:2.5,note:"Most shoulder-safe option."},
    {name:"Band lateral raise",         inc:0,  note:"Easiest on the cuff. Good for warm-up sets."},
  ],
  "Triceps":[
    {name:"Tricep rope pushdown",       inc:2.5,note:"Elbows pinned to sides throughout."},
    {name:"Tricep bar pushdown",        inc:2.5,note:"Overhand grip — more lateral head."},
    {name:"Overhead tricep extension",  inc:2.5,note:"Skip if shoulder is aggravated."},
    {name:"Close-grip bench press",     inc:5,  note:"Elbows tucked, shoulder-safe."},
    {name:"Skull crusher",              inc:2.5,note:"EZ bar reduces wrist strain."},
  ],
  // Pull
  "Horizontal Row":[
    {name:"Barbell row (neutral grip)", inc:5,  note:"Neutral grip reduces shoulder internal rotation."},
    {name:"Dumbbell row",               inc:2.5,note:"Supported — great for right shoulder stability."},
    {name:"Seated cable row",           inc:5,  note:"Drive elbows straight back. Squeeze at peak."},
    {name:"Machine row",                inc:5,  note:"Fixed path — safest for shoulder."},
    {name:"TRX/Ring row",               inc:0,  note:"Bodyweight — adjust difficulty by foot position."},
  ],
  "Vertical Pull":[
    {name:"Lat pulldown (neutral grip)",inc:5,  note:"Close neutral grip — full lat stretch, no shoulder risk."},
    {name:"Assisted pull-up",           inc:2.5,note:"Pronated grip. Control the descent."},
    {name:"Cable straight-arm pulldown",inc:2.5,note:"Isolates lats without bicep."},
    {name:"Single-arm lat pulldown",    inc:2.5,note:"Allows each side to work independently."},
  ],
  "Rear Delts / External Rotation":[
    {name:"Face pull",                  inc:2.5,note:"External rotation focus. Rehab and priming in one."},
    {name:"Rear delt fly (dumbbell)",   inc:2.5,note:"Prone or bent over. Light weight, squeeze."},
    {name:"Cable rear delt fly",        inc:2.5,note:"Cross-cable or single. Full contraction."},
    {name:"Band pull-apart",            inc:0,  note:"Essential cuff health. Slow and controlled."},
  ],
  "Biceps":[
    {name:"EZ bar curl",                inc:2.5,note:"Reduces wrist strain vs straight bar."},
    {name:"Dumbbell curl",              inc:2.5,note:"Supinate at top for full contraction."},
    {name:"Hammer curl",                inc:2.5,note:"Brachialis and brachioradialis emphasis."},
    {name:"Cable curl",                 inc:2.5,note:"Constant tension throughout the range."},
    {name:"Incline dumbbell curl",      inc:2.5,note:"Full stretch at bottom — great for hypertrophy."},
  ],
  // Legs A
  "Quad Dominant":[
    {name:"Goblet squat",               inc:5,  note:"Weeks 1–2: this IS your main leg movement."},
    {name:"Barbell back squat",         inc:5,  note:"Week 3+. Use safety bar if available."},
    {name:"Leg press",                  inc:10, note:"Feet high and wide — quad + glute emphasis."},
    {name:"Hack squat",                 inc:10, note:"Machine version — knees stay safe."},
    {name:"Bulgarian split squat",      inc:5,  note:"Week 5+. 2 sets each leg to start."},
  ],
  "Knee Extension":[
    {name:"Leg extension",              inc:5,  note:"Full range. Squeeze at top."},
    {name:"Spanish squat (band)",       inc:0,  note:"Bodyweight. Knee-over-toe focus."},
  ],
  "Calves":[
    {name:"Standing calf raise (machine)",inc:5,note:"Full range — deep stretch at bottom."},
    {name:"Leg press calf raise",       inc:10, note:"On the leg press platform."},
    {name:"Seated calf raise",          inc:2.5,note:"Soleus emphasis (bent knee)."},
    {name:"Dumbbell standing calf raise",inc:2.5,note:"Single leg for balance challenge."},
  ],
  // Legs B
  "Hip Hinge":[
    {name:"Romanian deadlift",          inc:5,  note:"Hip hinge: soft knees, push hips back, bar stays close."},
    {name:"Dumbbell RDL",               inc:2.5,note:"Same pattern, easier to control."},
    {name:"Good morning",               inc:5,  note:"Bar on back, hinge forward. Light weight."},
    {name:"Cable pull-through",         inc:5,  note:"Cuff-safe hinge. Great hip drive."},
  ],
  "Hip Thrust / Glute":[
    {name:"Hip thrust (barbell)",       inc:10, note:"Drive through heels. Squeeze glutes at top."},
    {name:"Hip thrust (dumbbell)",      inc:5,  note:"Lighter setup — same mechanics."},
    {name:"Glute bridge",               inc:5,  note:"On the floor. Weeks 1–2 use bodyweight."},
    {name:"Cable kickback",             inc:2.5,note:"Single leg. Keep spine neutral."},
  ],
  "Hamstring Curl":[
    {name:"Lying leg curl",             inc:5,  note:"Full range. Control the eccentric."},
    {name:"Seated leg curl",            inc:5,  note:"Hip flexed — longer hamstring length."},
    {name:"Nordic curl",                inc:0,  note:"Advanced. Use with pad under knees."},
    {name:"Stability ball leg curl",    inc:0,  note:"Bodyweight. Good when machines unavailable."},
  ],
  // Upper hypertrophy / Prime slots
  "Chest Fly":[
    {name:"Cable fly (low anchor)",     inc:2.5,note:"Anchor below hip — shoulder arc safe."},
    {name:"Pec deck",                   inc:2.5,note:"Fixed arc — very shoulder safe."},
    {name:"Dumbbell fly",               inc:2.5,note:"Light weight. Don't go too wide."},
  ],
  "Upper Back / Mid Trap":[
    {name:"Cable face pull",            inc:2.5,note:"External rotation. Never skip."},
    {name:"Band pull-apart",            inc:0,  note:"High rep. Great for shoulder health."},
    {name:"Prone Y/T/W raises",         inc:0,  note:"Bodyweight. Scapular stability."},
  ],
};

// Build slot-based program
// Each slot: {target, rr, rpe, sets per phase, inc — from selected exercise}
function mkSlot(target,p0s,p0r,p1s,p1r,p2s,p2r,rpe){
  return{target,phases:[
    {sets:p0s,rr:p0r,rpe:Math.max(rpe-2,5)},
    {sets:p1s,rr:p1r,rpe:Math.max(rpe-1,6)},
    {sets:p2s,rr:p2r,rpe}
  ]};
}

const PROG=[
  // DAY 0: MON — Push (Chest, Shoulders, Triceps) ~65–75 min
  {label:"MON",name:"Push",focus:"Chest · Shoulders · Triceps",rest:false,prime:false,
   pn:["Wks 1–2: 2 sets each. Stop 3 reps short of failure. Learn the movements.","Wks 3–4: 3 sets. Push closer to RPE targets.","Wks 5–6+: Full volume. Chase progressive overload."],
   slots:[
     mkSlot("Chest Press",   2,[10,12],3,[10,12],4,[8,10], 8),
     mkSlot("Incline Press", 2,[10,12],3,[10,12],3,[8,10], 8),
     mkSlot("Chest Fly",     2,[12,15],3,[12,15],3,[12,15],8),
     mkSlot("Lateral Delts", 2,[15,20],3,[15,20],4,[12,15],9),
     mkSlot("Triceps",       2,[12,15],3,[12,15],4,[12,15],8),
   ]},

  // DAY 1: TUE — Rest
  {label:"TUE",name:"Rest",focus:"",rest:true,prime:false,slots:[]},

  // DAY 2: WED — Pull (Back, Biceps, Rear Delts) ~65–75 min
  {label:"WED",name:"Pull",focus:"Back · Biceps · Rear Delts",rest:false,prime:false,
   pn:["Wks 1–2: 2 sets. Focus on feeling the right muscles, not just moving weight.","Wks 3–4: Volume increases. Start chasing RPE.","Wks 5–6+: Full program. Back should be noticeably stronger."],
   slots:[
     mkSlot("Vertical Pull",         2,[8,10], 3,[8,10], 4,[6,8],  8),
     mkSlot("Horizontal Row",        2,[8,10], 3,[8,10], 4,[6,8],  8),
     mkSlot("Rear Delts / External Rotation",2,[15,20],3,[15,20],3,[15,20],9),
     mkSlot("Upper Back / Mid Trap", 2,[15,20],3,[15,20],3,[15,20],8),
     mkSlot("Biceps",                2,[10,12],3,[10,12],3,[10,12], 8),
   ]},

  // DAY 3: THU — Rest
  {label:"THU",name:"Rest",focus:"",rest:true,prime:false,slots:[]},

  // DAY 4: FRI — Legs (Quad + Posterior Chain) ~70–80 min
  {label:"FRI",name:"Legs",focus:"Quads · Hamstrings · Glutes · Calves",rest:false,prime:false,
   pn:["Wks 1–2: Goblet squat + bodyweight hip thrust only. 2 sets. Stop well short of failure — you will be sore.","Wks 3–4: Volume steps up. Leg press and loaded hip thrust enter.","Wks 5–6+: Full program. Bulgarian split squat enters at 2 sets."],
   slots:[
     mkSlot("Quad Dominant",      2,[10,12],3,[10,12],4,[8,10], 7),
     mkSlot("Hip Hinge",          2,[10,12],3,[10,12],4,[8,10], 8),
     mkSlot("Hip Thrust / Glute", 2,[12,15],3,[12,15],3,[12,15],8),
     mkSlot("Hamstring Curl",     2,[12,15],3,[12,15],4,[10,12],8),
     mkSlot("Knee Extension",     2,[15,20],3,[15,20],3,[15,20],9),
     mkSlot("Calves",             2,[15,20],3,[15,20],4,[15,20],9),
   ]},

  // DAY 5: SAT — Rest
  {label:"SAT",name:"Rest",focus:"",rest:true,prime:false,slots:[]},

  // DAY 6: SAT — Full Body (Upper + Lower integration) ~70–80 min
  // Note: label shows as second SAT but displays as the 6th day slot
  {label:"SUN",name:"Full Body",focus:"Upper · Lower · Core balance",rest:false,prime:false,
   pn:["Wks 1–2: 2 sets each. Think of this as movement practice — everything light.","Wks 3–4: 3 sets. Treat this as a real training day now.","Wks 5–6+: Full volume. This is where your week's work comes together."],
   slots:[
     mkSlot("Chest Press",    2,[10,12],3,[10,12],3,[10,12],8),
     mkSlot("Horizontal Row", 2,[10,12],3,[10,12],3,[10,12],8),
     mkSlot("Quad Dominant",  2,[10,12],3,[10,12],3,[10,12],8),
     mkSlot("Hip Hinge",      2,[10,12],3,[10,12],3,[10,12],8),
     mkSlot("Lateral Delts",  2,[15,20],3,[15,20],3,[15,20],9),
     mkSlot("Biceps",         2,[12,15],3,[12,15],3,[12,15],8),
   ]}
];

// Selected exercise per slot — persisted so it survives tab switches
// key: "sel_d{di}_s{si}" → exercise name
function getSelEx(di,si){
  const k=`sel_d${di}_s${si}`;
  const saved=ld(k,"");
  const day=PROG[di];
  if(!day.slots||!day.slots[si])return null;
  const target=day.slots[si].target;
  const opts=EXLIB[target]||[];
  if(saved&&opts.find(e=>e.name===saved))return opts.find(e=>e.name===saved);
  return opts[0]||null; // default to first option
}
function setSelEx(di,si,name){sv(`sel_d${di}_s${si}`,name);}

// Compatibility shim — treat slots as exercises for history/logging
function slotExIdx(di,si){return si;} // slot index == exercise index for storage
function getSlotHistory(di,si){
  // History keyed by exercise NAME not slot, so switching equipment preserves separate histories
  const exName=getSelEx(di,si)?.name;
  if(!exName)return[];
  return (wkHist[`ex_${exName}`]||[]);
}
function getSlotTopSet(di,si){
  const h=getSlotHistory(di,si);
  if(!h.length)return null;
  const last=h[h.length-1];
  if(!last.sets||!last.sets.length)return null;
  return last.sets.reduce((a,s)=>s.weight>a.weight?s:a,last.sets[0]);
}
function getSlotSuggest(di,si){
  const day=PROG[di];if(!day.slots||!day.slots[si])return null;
  const phase=pf(wkWeek),dl=wkWeek%6===0&&wkWeek>0;
  const slot=day.slots[si],ep=slot.phases[phase];
  const exObj=getSelEx(di,si);if(!exObj)return null;
  const top=getSlotTopSet(di,si);if(!top)return null;
  if(dl)return Math.round(top.weight*.85*4)/4;
  const last=getSlotHistory(di,si);
  const allHit=last.length&&last[last.length-1].sets&&last[last.length-1].sets.every(s=>s.reps>=ep.rr[1]);
  return allHit?top.weight+exObj.inc:top.weight;
}
function getSlotSets(di,si){
  const k=`d${di}_s${si}_w${wkWeek}`;
  if(!wkSets[k]){
    const day=PROG[di];if(!day.slots||!day.slots[si])return[];
    const ep=day.slots[si].phases[pf(wkWeek)];
    if(ep.sets===0)return[];
    const sw=getSlotSuggest(di,si);
    wkSets[k]=Array.from({length:ep.sets},()=>({weight:sw?String(sw):"",reps:"",done:false}));
    sv("wk_setdata",wkSets);
  }
  return wkSets[k];
}
function updSlotSet(di,si,setIdx,field,val){
  const k=`d${di}_s${si}_w${wkWeek}`;
  getSlotSets(di,si);
  wkSets[k][setIdx][field]=String(val);
  sv("wk_setdata",wkSets);
}
function tglSlotDone(di,si,setIdx,domDay){
  // di = PROG index for data, domDay = display index for DOM element IDs
  const dd=domDay!==undefined?domDay:di;

// Brzycki 1RM formula: weight / (1.0278 - 0.0278 × reps)
function pc1RMFromSet(weight, reps) {
  if(reps===1)return weight;
  if(reps>12)return weight*1.35; // rough estimate for high rep sets
  return Math.round(weight / (1.0278 - 0.0278*reps));
}

// Get current program week based on start date
function pcCurrentWeek() {
  const start = new Date(PC_START_DATE + "T12:00:00");
  const now = new Date();
  const days = Math.floor((now - start) / (1000*60*60*24));
  return Math.min(Math.max(Math.floor(days/7)+1, 1), 31);
}

function pcPhase(week) {
  return PC_PHASES.find(p => week >= p.weeks[0] && week <= p.weeks[1]) || PC_PHASES[0];
}

function pcPhaseIdx(week) {
  return PC_PHASES.findIndex(p => week >= p.weeks[0] && week <= p.weeks[1]);
}

// Current test bodyweight (use latest weigh-in)
function pcTestBW() {
  return weighIns.length ? weighIns[weighIns.length-1].weight : PC_BW;
}

// Training weights for a given week (based on estimated 1RM)
function pcTrainingWeights(week, est1RM) {
  const bw = pcTestBW();
  const phase = pcPhaseIdx(week);
  if(phase === 0) { // Foundation
    return [
      {label:"Warm-up",    pct:40, weight:Math.round(est1RM*0.40/5)*5},
      {label:"Work sets",  pct:55, weight:Math.round(est1RM*0.55/5)*5},
      {label:"Top set",    pct:65, weight:Math.round(est1RM*0.65/5)*5},
    ];
  } else if(phase === 1) { // Accumulation
    return [
      {label:"Warm-up",    pct:50, weight:Math.round(est1RM*0.50/5)*5},
      {label:"Work sets",  pct:70, weight:Math.round(est1RM*0.70/5)*5},
      {label:"Heavy sets", pct:80, weight:Math.round(est1RM*0.80/5)*5},
    ];
  } else if(phase === 2) { // Endurance
    return [
      {label:"Warm-up",    pct:50, weight:Math.round(est1RM*0.50/5)*5},
      {label:"Volume sets",pct:65, weight:Math.round(est1RM*0.65/5)*5},
      {label:"BW sets",    pct:null,weight:Math.round(bw)},
    ];
  } else { // Peak + Taper
    return [
      {label:"Warm-up",    pct:50, weight:Math.round(est1RM*0.50/5)*5},
      {label:"BW AMRAP",   pct:null,weight:Math.round(bw)},
      {label:"Back-off",   pct:60, weight:Math.round(est1RM*0.60/5)*5},
    ];
  }
}

// Macro profiles
function pcMacros(type) {
  // type: "training" | "rest"
  // Eating to perform: more on days you train, less on days you don't.
  // Missing a session = rest day. No penalty — your body still needs recovery.
  const bw = pcTestBW();
  const lbm = bw * (1 - (weighIns.length ? (weighIns[weighIns.length-1].bodyFat||23.5) : 23.5)/100);
  if(type === "training") {
    // Training day: caloric surplus, carb-forward, high protein
    const protein = Math.round(lbm * 1.1);  // 1.1g/lb LBM
    const fat = Math.round(lbm * 0.40);
    const calories = Math.round(bw * 16);    // ~2200 kcal at 138lbs
    const carbs = Math.round((calories - protein*4 - fat*9) / 4);
    return {calories, protein, carbs, fat, label:"Train", note:"30–40g fast carbs 45 min before squats. Protein + carbs within 30 min after."};
  } else {
    // Rest day: maintenance, lower carbs, higher fat, same protein
    const protein = Math.round(lbm * 1.0);  // hold protein on rest days
    const fat = Math.round(lbm * 0.55);     // fat higher on rest — less carb needed
    const calories = Math.round(bw * 13.5); // ~1860 kcal at 138lbs
    const carbs = Math.round((calories - protein*4 - fat*9) / 4);
    return {calories, protein, carbs, fat, label:"Rest", note:"Lower carbs, higher fat. Same protein — muscle doesn't take days off."};
  }
}

}

// ── AUTO-ADVANCE WEEK ─────────────────────────────────────────────
// Runs on every page load. If calendar days since wk_start_date
// exceed the current program week, advances wkWeek to match.
// Prevents week getting stuck when sessions are missed or glitched.
(()=>{
  const startRaw=ld("wk_start_date",null);
  if(!startRaw)return;
  const start=new Date(startRaw+"T12:00:00");
  const now=new Date();
  const daysElapsed=Math.floor((now-start)/(1000*60*60*24));
  const expectedWeek=Math.floor(daysElapsed/7)+1;
  if(expectedWeek<=wkWeek)return;
  const weeksToAdd=expectedWeek-wkWeek;
  for(let i=0;i<weeksToAdd;i++){
    sv(`wk_completed_w${wkWeek}`,wkComp);
    sv(`wk_setdata_w${wkWeek}`,wkSets);
    wkWeek++;wkComp=[];wkSets={};
    sv("wk_week",wkWeek);
    sv("wk_completed",[]);
    sv("wk_setdata",{});
  }
  sv("wk_start_date",td());
})();

function closeScannerCleanup(){

async function lookupBarcode(code){
  try{
    const r=await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    const d=await r.json();
    if(d.status!==1||!d.product)return null;
    const p=d.product;
    const n=p.nutriments||{};
    // Build serving from product data if available
    const servings=[];
    if(p.serving_size&&p.serving_quantity){
      servings.push({disseminationText:p.serving_size,gramWeight:parseFloat(p.serving_quantity)||null});
    }
    return{
      fdcId:"off_"+code,
      name:(p.product_name||p.generic_name||"Scanned product").trim(),
      servings,
      foodNutrients:[
        {nutrientId:1008,value:parseFloat(n["energy-kcal_100g"])||parseFloat(n["energy_100g"])/4.184||0},
        {nutrientId:1003,value:parseFloat(n.proteins_100g)||0},
        {nutrientId:1005,value:parseFloat(n.carbohydrates_100g)||0},
        {nutrientId:1004,value:parseFloat(n.fat_100g)||0},
        {nutrientId:1079,value:parseFloat(n.fiber_100g)||0}
      ]
    };
  }catch(e){return null;}
}

async function startBarcodeScanner(){
  if(scannerActive)return; // prevent double-open
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    alert("Camera not available. Make sure you're using Safari and have allowed camera access in Settings → Safari → Camera.");return;
  }

  scannerActive=true;

  // Build full-screen overlay
  const ov=document.createElement("div");
  ov.id="scanner-overlay";
  ov.style.cssText="position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px";

  const title=document.createElement("div");
  title.textContent="Scan Barcode";
  title.style.cssText="color:#fff;font-size:18px;font-weight:700;font-family:'Space Grotesk',sans-serif;margin-bottom:16px";

  const vid=document.createElement("video");
  vid.style.cssText="width:100%;max-width:360px;border-radius:12px;background:#111";
  vid.setAttribute("playsinline","true");
  vid.setAttribute("autoplay","true");
  vid.setAttribute("muted","true");
  vid.muted=true;

  const frame=document.createElement("div");
  frame.style.cssText="position:absolute;width:240px;height:100px;border:2.5px solid #C4856A;border-radius:8px;box-shadow:0 0 0 9999px rgba(0,0,0,.6);pointer-events:none;top:50%;left:50%;transform:translate(-50%,-50%)";

  const vidWrap=document.createElement("div");
  vidWrap.style.cssText="position:relative;width:100%;max-width:360px;aspect-ratio:4/3;border-radius:12px;overflow:hidden;background:#111";
  vidWrap.appendChild(vid);vidWrap.appendChild(frame);

  const lbl=document.createElement("div");
  lbl.textContent="Align barcode with the green box";
  lbl.style.cssText="color:#cccccc;font-size:14px;margin-top:14px;font-family:'Space Grotesk',sans-serif;text-align:center";

  const status=document.createElement("div");
  status.id="scan-status";
  status.style.cssText="color:#C4856A;font-size:13px;margin-top:6px;font-family:'Space Mono',monospace;min-height:18px;text-align:center";

  const closeBtn=document.createElement("button");
  closeBtn.textContent="✕ Cancel";
  closeBtn.style.cssText="margin-top:20px;padding:12px 32px;background:transparent;border:1px solid #333;border-radius:10px;color:#999;font-size:15px;font-family:'Space Grotesk',sans-serif;cursor:pointer";
  closeBtn.addEventListener("click",()=>{closeScannerCleanup();renderNutrition();});

  ov.appendChild(title);ov.appendChild(vidWrap);ov.appendChild(lbl);ov.appendChild(status);ov.appendChild(closeBtn);
  document.body.appendChild(ov);

  // Request camera — environment (back) camera first, fallback to any
  try{
    try{
      scannerStream=await navigator.mediaDevices.getUserMedia({
        video:{facingMode:{exact:"environment"},width:{ideal:1280},height:{ideal:960}}
      });
    }catch{
      scannerStream=await navigator.mediaDevices.getUserMedia({video:true});
    }
    vid.srcObject=scannerStream;
    await new Promise((res,rej)=>{
      vid.onloadedmetadata=()=>{vid.play().then(res).catch(rej)};
      setTimeout(()=>rej(new Error("timeout")),8000);
    });
  }catch(e){
    status.textContent="Camera error: "+e.message;
    status.style.color=PROT;
    lbl.textContent="Check Settings → Privacy → Camera → Safari";
    return;
  }

  status.textContent="Camera ready — scanning…";

  // Check for BarcodeDetector (Safari 17.0+ on iOS, Chrome on Android)
  const hasBD=typeof BarcodeDetector!=="undefined";
  if(hasBD){
    let detector;
    try{detector=new BarcodeDetector({formats:["ean_13","ean_8","upc_a","upc_e","code_128","code_39","qr_code"]});}
    catch{detector=new BarcodeDetector();}

    let scanning=true;
    let lastCode="";
    const scanLoop=async()=>{
      if(!scanning||!scannerActive)return;
      try{
        if(vid.readyState>=2){ // HAVE_CURRENT_DATA
          const codes=await detector.detect(vid);
          if(codes.length>0&&codes[0].rawValue!==lastCode){
            lastCode=codes[0].rawValue;
            scanning=false;
            status.textContent="Found: "+lastCode+" · Looking up…";
            const food=await lookupBarcode(lastCode);
            closeScannerCleanup();
            if(food){
              fdSelected=food;fdGrams=100;fdPortionMode="grams";
              fdServing=food.servings&&food.servings.length&&food.servings[0].gramWeight?food.servings[0]:null;
              renderNutrition();
            }else{
              alert("Product not found in database. Try searching by name.");
              renderNutrition();
            }
            return;
          }
        }
      }catch(e){}
      // Use setTimeout instead of rAF for better battery life and reliability
      if(scanning&&scannerActive)setTimeout(scanLoop,150);
    };
    vid.addEventListener("playing",()=>setTimeout(scanLoop,500));
  } else {
    // Fallback for older Safari — show manual entry
    frame.style.border="2px dashed #666";
    lbl.textContent="Auto-scan not supported — enter barcode manually:";
    status.textContent="";
    const inp=document.createElement("input");
    inp.type="number";inp.placeholder="Barcode number (e.g. 0123456789012)";
    inp.style.cssText="width:100%;max-width:300px;padding:12px;background:#3a3a3a;border:1px solid #C4856A;border-radius:8px;color:#fff;font-size:16px;outline:none;font-family:'Space Grotesk',sans-serif;margin-top:12px;text-align:center";
    inp.addEventListener("keydown",e=>{if(e.key==="Enter")lookItUp();});
    const lookBtn=document.createElement("button");
    lookBtn.textContent="Look up barcode";
    lookBtn.style.cssText="margin-top:10px;width:100%;max-width:300px;padding:12px;background:transparent;border:1.5px solid #C4856A;border-radius:10px;color:#C4856A;font-size:15px;font-family:'Space Grotesk',sans-serif;cursor:pointer";
    async function lookItUp(){
      if(!inp.value.trim())return;
      status.textContent="Looking up…";status.style.color="#cccccc";
      const food=await lookupBarcode(inp.value.trim());
      closeScannerCleanup();
      if(food){fdSelected=food;fdGrams=100;fdPortionMode="grams";fdServing=null;renderNutrition();}
      else{alert("Product not found. Try searching by name.");renderNutrition();}
    }
    lookBtn.addEventListener("click",lookItUp);
    ov.insertBefore(inp,closeBtn);ov.insertBefore(lookBtn,closeBtn);
  }
}

function exportData(){
  const keys=["user_profile","wk_week","wk_completed","wk_setdata","wk_history","weighins","recent_foods"];
  const data={version:1,exported:new Date().toISOString(),profile:{}};
  keys.forEach(k=>{const v=localStorage.getItem(k);if(v)data[k]=JSON.parse(v);});
  // Also grab all nutrition logs (nutri_YYYY-MM-DD keys)
  data.nutrition={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith("nutri_")){data.nutrition[k]=JSON.parse(localStorage.getItem(k)||"[]");}
  }
  // Also grab all goal logs
  data.goals={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith("goals_")){data.goals[k]=JSON.parse(localStorage.getItem(k)||"{}");}
  }
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`ej-health-backup-${td()}.json`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}

function importData(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.version)throw new Error("Invalid backup file");
      const keys=["user_profile","wk_week","wk_completed","wk_setdata","wk_history","weighins","recent_foods"];
      keys.forEach(k=>{if(data[k]!==undefined)localStorage.setItem(k,JSON.stringify(data[k]));});
      if(data.nutrition)Object.entries(data.nutrition).forEach(([k,v])=>localStorage.setItem(k,JSON.stringify(v)));
      if(data.goals)Object.entries(data.goals).forEach(([k,v])=>localStorage.setItem(k,JSON.stringify(v)));
      // Reload all state
      profile=ld("user_profile",null)||INIT;
      wkWeek=ld("wk_week",1);
      wkComp=ld("wk_completed",[]);
      wkSets=ld("wk_setdata",{});
      wkHist=ld("wk_history",{});
      weighIns=ld("weighins",[]);
      recentFoods=ld("recent_foods",[]);
      alert("Data imported successfully!");
      render();
    }catch(err){alert("Import failed — make sure you're using a valid EJ Health backup file.");}
  };
  reader.readAsText(file);
}

function searchLocalFoods(q){
  const terms=q.toLowerCase().split(/\s+/);
  return LOCAL_FOODS.filter(f=>terms.every(t=>f.name.toLowerCase().includes(t)))
    .map(f=>({
      fdcId:"local_"+f.name,
      name:f.name,
      servings:[
        {disseminationText:"100g",gramWeight:100},
        {disseminationText:"1 medium (50g)",gramWeight:50},
      ],
      foodNutrients:[
        {nutrientId:1008,value:f.cal},
        {nutrientId:1003,value:f.p},
        {nutrientId:1005,value:f.c},
        {nutrientId:1004,value:f.f},
        {nutrientId:1079,value:f.fib}
      ]
    }));
}

const NID={energy:1008,protein:1003,carbs:1005,fat:1004,fiber:1079};

function getNutrient(food,id){
  if(!food||!food.foodNutrients)return 0;
  const n=food.foodNutrients.find(x=>x.nutrientId===id||(x.nutrient&&x.nutrient.id===id));
  return n?(n.value||n.amount||0):0;
}
function calcFromGrams(food,grams){
  const s=grams/100;
  return{
    calories:Math.round(getNutrient(food,NID.energy)*s),
    protein: +(getNutrient(food,NID.protein)*s).toFixed(1),
    carbs:   +(getNutrient(food,NID.carbs)*s).toFixed(1),
    fat:     +(getNutrient(food,NID.fat)*s).toFixed(1),
    fiber:   +(getNutrient(food,NID.fiber)*s).toFixed(1)
  };
}
async function searchFoods(q){
  if(!q||q.length<2){fdResults=[];updateSearchResults();return;}
  fdLoading=true;updateSearchResults();
  // 1. Local whole foods — instant, no API
  const local=searchLocalFoods(q);
  // 2. USDA FoodData Central — 600,000+ foods, full nutrient data
  let usda=[];
  try{
    const url=`https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(q)}&dataType=SR%20Legacy,Foundation,Survey%20(FNDDS),Branded&pageSize=12&api_key=${USDA_KEY}`;
    const r=await fetch(url);
    const d=await r.json();
    usda=(d.foods||[]).map(f=>({
      fdcId:f.fdcId,
      name:f.description+(f.brandOwner?` (${f.brandOwner})`:""),
      servings:(f.foodMeasures||[]).filter(s=>s.gramWeight).map(s=>({
        disseminationText:s.disseminationText||s.portionDescription||"Serving",
        gramWeight:s.gramWeight
      })),
      foodNutrients:f.foodNutrients||[]
    }));
  }catch(e){}
  // 3. Open Food Facts — packaged/branded products
  let off=[];
  try{
    const url=`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&search_simple=1&action=process&json=1&page_size=6&fields=id,product_name,nutriments,serving_size,serving_quantity`;
    const r=await fetch(url);
    const d=await r.json();
    off=(d.products||[])
      .filter(p=>p.product_name&&p.product_name.trim())
      .map(p=>{
        const n=p.nutriments||{};
        return{
          fdcId:"off_"+p.id,
          name:p.product_name.trim(),
          servings:p.serving_size&&p.serving_quantity?[{disseminationText:p.serving_size,gramWeight:parseFloat(p.serving_quantity)||null}]:[],
          foodNutrients:[
            {nutrientId:1008,value:n["energy-kcal_100g"]||0},
            {nutrientId:1003,value:n.proteins_100g||0},
            {nutrientId:1005,value:n.carbohydrates_100g||0},
            {nutrientId:1004,value:n.fat_100g||0},
            {nutrientId:1079,value:n.fiber_100g||0}
          ]
        };
      });
  }catch(e){}
  // Merge: local first, then USDA, then OFF — deduplicate by name
  const seen=new Set(local.map(f=>f.name.toLowerCase()));
  const usdaNew=usda.filter(f=>!seen.has(f.name.toLowerCase()));
  usdaNew.forEach(f=>seen.add(f.name.toLowerCase()));
  const offNew=off.filter(f=>!seen.has(f.name.toLowerCase()));
  fdResults=[...local,...usdaNew,...offNew];
  fdLoading=false;updateSearchResults();
}

async function requestNotifPermission(){
  if(!("Notification" in window))return false;
  if(Notification.permission==="granted")return true;
  if(Notification.permission==="denied")return false;
  const p=await Notification.requestPermission();
  return p==="granted";
}

function scheduleReminder(){
  // Cancel any existing timer
  if(window._reminderTimer)clearTimeout(window._reminderTimer);
  if(!reminderEnabled||!reminderTime)return;
  const [h,m]=reminderTime.split(":").map(Number);
  const now=new Date();
  const next=new Date();
  next.setHours(h,m,0,0);
  if(next<=now)next.setDate(next.getDate()+1); // schedule for tomorrow if already passed
  const ms=next-now;
  window._reminderTimer=setTimeout(()=>{
    if(Notification.permission==="granted"){
      new Notification("EJ Health — daily check-in",{
        body:"Time to log your nutrition, training, and goals 💪",
        icon:"/icons/icon-192.png",
        badge:"/icons/icon-192.png",
        tag:"ej-daily-reminder"
      });
    }
    // Reschedule for next day
    window._reminderTimer=setTimeout(()=>scheduleReminder(),1000);
  },ms);
}

// ── AUTO-APPLY PERFORMANCE MACROS ON LOAD ─────────────────────────
// Runs every page load — profile.calories always reflects today's type
(()=>{
  const todayIdx=(()=>{const d=new Date().getDay();return d===0?6:d-1;})();
  const progDay=((todayIdx-wkOffset)%7+7)%7;
  const isTraining=PROG[progDay]&&!PROG[progDay].rest;
  const weekLog=(pcState.weekLogs||{})[pcCurrentWeek()]||{};
  const type=weekLog.macroType||(isTraining?"training":"rest");
  const bw=weighIns.length?weighIns[weighIns.length-1].weight:profile.weight;
  const bf=(weighIns.length&&weighIns[weighIns.length-1].bodyFat)||profile.bodyFat||23.5;
  const lbm=bw*(1-bf/100);
  let calories,protein,fat,carbs;
  if(type==="training"){
    protein=Math.round(lbm*1.1);fat=Math.round(lbm*0.40);
    calories=Math.round(bw*16);carbs=Math.round((calories-protein*4-fat*9)/4);
  } else {
    protein=Math.round(lbm*1.0);fat=Math.round(lbm*0.55);
    calories=Math.round(bw*13.5);carbs=Math.round((calories-protein*4-fat*9)/4);
  }
  if(profile.calories!==calories){
    profile={...profile,calories,protein,carbs,fat};
    sv("user_profile",profile);
  }
})();

function shiftSchedule(){
  // Increment offset — shifts every remaining day forward by 1
  wkOffset++;
  sv(`wk_offset_${wkWeek}`,wkOffset);
  // Move activeDay forward so we stay on the current view
  activeDay=Math.min(activeDay+1,6);
  renderWorkout();
}

// Map a calendar day index to the PROG day it should show
// given the current offset
function progDayForDisplay(calDay){
  // Shift the PROG index back by offset so the workout appears later
  // e.g. Monday (0) with offset 1 → shows what was Sunday (6)
  // Actually: we want to shift FORWARD — today's workout appears tomorrow
  // So: the workout scheduled for (calDay - offset) now shows on calDay
  const progIdx=((calDay - wkOffset) % 7 + 7) % 7;
  return progIdx;
}

// What PROG day does this display tab actually show?
function getDisplayProgDay(calDay){
  return progDayForDisplay(calDay);
}

function pushWeek(){
  // Vacation mode: replay the entire current week
  // Clears completion for this week so all days become available again
  // History is preserved — progressive overload is not affected
  if(!confirm("Push this entire week? Your workout history is preserved, but this week's sessions will reset so you can repeat them."))return;
  wkComp=[];sv("wk_completed",[]);
  wkSets={};sv("wk_setdata",{});
  // Don't change wkWeek — same week replays, then advances when done
  renderWorkout();
}

function h(tag,attrs,children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k==="class")el.className=v;
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);

  if(children)(Array.isArray(children)?children:[children]).forEach(c=>{
    if(c!=null&&c!==false)el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  });
  return el;
}

// ── WORKOUT HELPERS ─────────────────────────────────────────────────
function getLast(di,ei){const h=wkHist[`d${di}_e${ei}`]||[];return h.length?h[h.length-1]:null}
function getTopSet(di,ei){
  const last=getLast(di,ei);
  if(!last||!last.sets||!last.sets.length)return null;
  return last.sets.reduce((a,s)=>s.weight>a.weight?s:a,last.sets[0]);
}
function getSug(di,ei){
  // Legacy — used only for old exercise-indexed history
  const day=PROG[di];if(!day.exercises||!day.exercises[ei])return null;
  const phase=pf(wkWeek),dl=wkWeek%6===0&&wkWeek>0;
  const ep=day.exercises[ei].phases[phase],top=getTopSet(di,ei);
  if(!top)return null;
  if(dl)return Math.round(top.weight*.85*4)/4;
  const last=getLast(di,ei);
  const allHit=last&&last.sets&&last.sets.every(s=>s.reps>=ep.rr[1]);
  return allHit?top.weight+day.exercises[ei].inc:top.weight;
}
function getSets(di,ei){
  // Legacy compat for old exercise-indexed data
  const day=PROG[di];if(!day.exercises||!day.exercises[ei])return[];
  const k=`d${di}_e${ei}_w${wkWeek}`;
  if(!wkSets[k]){
    const ep=day.exercises[ei].phases[pf(wkWeek)];
    if(!ep||ep.sets===0)return[];
    const sw=getSug(di,ei);
    wkSets[k]=Array.from({length:ep.sets},()=>({weight:sw?String(sw):"",reps:"",done:false}));
    sv("wk_setdata",wkSets);
  }
  return wkSets[k];
}
function updSet(di,ei,si,field,val){
  getSets(di,ei); // ensure initialised
  wkSets[`d${di}_e${ei}_w${wkWeek}`][si][field]=String(val);
  sv("wk_setdata",wkSets);
}
function tglDone(di,ei,si){
  const sets=getSets(di,ei);
  sets[si].done=!sets[si].done;
  sv("wk_setdata",wkSets);
  // update checkbox in place — no re-render
  const btn=document.getElementById(`ck-${di}-${ei}-${si}`);
  if(btn){
    const done=sets[si].done;
    btn.style.border=`1px solid ${done?G:BRD}`;
    btn.style.background=done?OKD:SRF2;
    btn.style.color=done?G:DIM;
  }
  // update progress bar
  const pb=document.getElementById("wk-pb");
  if(pb){const p=calcProg(di);pb.style.width=Math.round(p*100)+"%";}
  // update ex dot
  const allDone=sets.every(s=>s.done);
  const dot=document.getElementById(`en-${di}-${ei}`);
  if(dot){
    dot.style.borderColor=allDone?G+"66":BRD;
    dot.style.background=allDone?OKD:SRF2;

}
function calcProg(di){

  return calcProgSlots(di);
}

// ── FEEDBACK ────────────────────────────────────────────────────────
function getFeedback(){
  const tips=[];
  if(weighIns.length>=2){
    const r=weighIns.slice(-4),delta=r[r.length-1].weight-r[0].weight,rate=delta/r.length;
    if(rate<-1)tips.push({type:"warn",title:"Losing too fast",body:`~${Math.abs(rate).toFixed(1)} lbs/week. Add 150–200 kcal to protect muscle.`});
    else if(rate<-.25)tips.push({type:"ok",title:"Recomp on track",body:`~${Math.abs(rate).toFixed(2)} lbs/week fat loss. Keep going.`});
    else if(rate>.25)tips.push({type:"warn",title:"Weight trending up",body:`+${rate.toFixed(1)} lbs/week. Tighten up on weekends.`});
    else tips.push({type:"info",title:"Weight stable",body:"Good for recomp. For fat loss, try −100 kcal or +1,500 daily steps."});
  }
  const gains=[];
  // Gather gains from slot-based history (keyed by exercise name)
  Object.keys(wkHist).forEach(hk=>{
    if(!hk.startsWith("ex_"))return;
    const exName=hk.slice(3);
    const h=wkHist[hk];
    if(h.length>=3){
      const f=h[0].sets?Math.max(...h[0].sets.map(s=>s.weight)):h[0].weight||0;
      const l=h[h.length-1].sets?Math.max(...h[h.length-1].sets.map(s=>s.weight)):h[h.length-1].weight||0;
      if(l>f)gains.push({name:exName,g:l-f});
    }
  });
  if(gains.length){const top=gains.sort((a,b)=>b.g-a.g)[0];tips.push({type:"ok",title:`PR — ${top.name}`,body:`Up ${top.g} lbs from your first session.`});}
  if(!tips.length)tips.push({type:"info",title:"Log a weigh-in for feedback",body:"After 2+ entries you'll get adaptive recommendations here."});
  return tips;
}

// ── RENDER CORE FINISHER ─────────────────────────────────────────────
function renderCoreFinisher(wrap,pc){
  const ex=CORE_EX[coreSelIdx]||CORE_EX[0];

  // Toggle header
  const toggleBtn=h("button",{style:{width:"100%",padding:"12px 14px",background:"transparent",border:`1px solid ${BRD}`,borderRadius:"11px",color:TXT,fontSize:"13px",fontFamily:"'Space Grotesk',sans-serif",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:"12px"}},

     h("span",{style:{fontSize:"11px",color:TXT,fontFamily:"'Space Mono',monospace"}},[(coreOpen?"▲ hide":"▼ show")])]
  );
  toggleBtn.addEventListener("click",()=>{coreOpen=!coreOpen;renderWorkout();});
  wrap.appendChild(toggleBtn);
  if(!coreOpen)return;

  const panel=div({background:SRF,border:`1px solid ${BRD}`,borderRadius:"11px",padding:"14px",marginTop:"8px"});

  // Category tabs
  const cats=[...new Set(CORE_EX.map(e=>e.cat))];

  const curCat=ex.cat;

    btn.style.cssText=`flex-shrink:0;padding:5px 10px;border-radius:16px;font-size:11px;font-weight:${active?700:400};font-family:'Space Grotesk',sans-serif;cursor:pointer;border:1px solid ${active?pc+"88":BRD};background:${active?pc+"15":"transparent"};color:${active?pc:TXT}`;
    btn.addEventListener("click",()=>{
      const first=CORE_EX.findIndex(e=>e.cat===cat);
      coreSelIdx=first>=0?first:0;
      coreSets=[{reps:"",done:false},{reps:"",done:false},{reps:"",done:false}];
      saveCoreToday();renderWorkout();
    });
    catRow.appendChild(btn);
  });
  panel.appendChild(catRow);

  // Exercise picker within category
  const catExes=CORE_EX.filter(e=>e.cat===curCat);
  const pickRow=div({display:"flex",flexDirection:"column",gap:"5px",marginBottom:"12px"});
  catExes.forEach((opt,i)=>{
    const globalIdx=CORE_EX.indexOf(opt);

    btn.textContent=(isActive?"✓ ":"")+opt.name;
    btn.style.cssText=`width:100%;padding:8px 12px;border-radius:8px;font-size:13px;font-weight:${isActive?700:400};font-family:'Space Grotesk',sans-serif;cursor:pointer;text-align:left;border:1px solid ${isActive?pc+"66":BRD};background:${isActive?pc+"12":"transparent"};color:${isActive?pc:TXT}`;
    btn.addEventListener("click",()=>{
      coreSelIdx=globalIdx;
      coreSets=[{reps:"",done:false},{reps:"",done:false},{reps:"",done:false}];
      saveCoreToday();renderWorkout();
    });
    pickRow.appendChild(btn);
  });
  panel.appendChild(pickRow);

  // Note + video
  if(ex.note){
    panel.appendChild(div({background:SRF2,borderRadius:"7px",padding:"7px 10px",marginBottom:"10px",fontSize:"12px",color:TXT,lineHeight:1.5},["💡 "+ex.note]));
  }

    const rI=h("input",{type:"number",inputmode:"numeric",placeholder:isTimed?"30":"12",class:"sinp"});

// ── RENDER PROGRESS ───────────────────────────────────────────────────
function renderProgress(){
  checkDayRollover();
  const content=document.getElementById("content");
  content.innerHTML="";

  // Helper: make element with style
  function el(tag,css,text){
    const e=document.createElement(tag);
    if(css)e.style.cssText=css;
    if(text!==undefined)e.textContent=text;
    return e;
  }
  function row(items,gridCols,gap){

// ── RENDER POWERHOUSE CHALLENGE ──────────────────────────────────────
function renderChallenge() {
  const content = document.getElementById("content");
  content.innerHTML = "";
  const wrap = document.createElement("div");
  wrap.style.cssText = "padding:14px 14px 88px";

  function el(tag, css, text) {
    const e = document.createElement(tag);
    if(css) e.style.cssText = css;
    if(text !== undefined) e.textContent = text;
    return e;
  }
  function card(children, accent) {
    const c = document.createElement("div");
    c.style.cssText = `background:${SRF};border:1px solid ${accent||BRD};border-radius:14px;overflow:hidden;margin-bottom:12px`;
    children.forEach(ch => { if(ch) c.appendChild(ch); });
    return c;
  }
  function row(items, cols, gap) {
    const d = document.createElement("div");
    d.style.cssText = `display:grid;grid-template-columns:${cols};gap:${gap||"8px"}`;
    items.forEach(i => { if(i) d.appendChild(i); });
    return d;
  }
  function section(text) {
    const d = document.createElement("div");
    d.style.cssText = `font-size:11px;color:${MUT};text-transform:uppercase;letter-spacing:1.8px;margin:16px 0 8px;font-family:'Space Mono',monospace`;
    d.textContent = text;
    return d;
  }
  function btn(text, color, onClick, secondary) {
    const b = document.createElement("button");
    b.textContent = text;
    b.style.cssText = `width:100%;padding:12px;background:${secondary?"transparent":color+"15"};border:1.5px solid ${color};border-radius:10px;color:${color};font-size:14px;font-weight:600;font-family:'Space Grotesk',sans-serif;cursor:pointer;margin-bottom:8px`;
    b.addEventListener("click", onClick);
    return b;
  }

  const week = pcState.viewWeek || pcCurrentWeek();
  const phase = pcPhase(week);
  const est1RM = pcState.est1RM || 95;
  const bw = pcTestBW();
  const amrapTarget = PC_AMRAP_TARGETS[week] || 0;
  const oneRMTarget = PC_WEEK_TARGETS[week] || 95;
  const phaseIdx = pcPhaseIdx(week);
  const cardioRx = PC_CARDIO[phaseIdx+1] || PC_CARDIO[1];
  const weekLog = pcState.weekLogs[week] || {};
  const daysUntilTest = Math.ceil((new Date(PC_TEST_DATE) - new Date()) / (1000*60*60*24));

  const nextW = document.createElement("button");
  nextW.textContent = "→";
  nextW.style.cssText = `padding:4px 10px;background:transparent;border:1px solid ${BRD};border-radius:6px;color:${week<31?TXT:DIM};font-size:12px;cursor:${week<31?"pointer":"default"}`;
  nextW.addEventListener("click",()=>{ if(week<31){pcState.viewWeek=(week+1);savePCState();renderChallenge();}});

  wLabel.style.cssText = `flex:1;text-align:center;font-family:'Space Mono',monospace;font-size:12px;color:${MUT}`;
  wLabel.textContent = week===pcCurrentWeek()?"Current week":"Week "+week+" of 31";
  const goNow = document.createElement("button");
  goNow.textContent = "Today";
  goNow.style.cssText = `padding:4px 10px;background:transparent;border:1px solid ${phase.color}44;border-radius:6px;color:${phase.color};font-size:11px;cursor:pointer`;
  goNow.addEventListener("click",()=>{ pcState.viewWeek=null;savePCState();renderChallenge();});
  weekNav.appendChild(prevW);weekNav.appendChild(wLabel);weekNav.appendChild(nextW);weekNav.appendChild(goNow);
  headerCard.appendChild(weekNav);
  wrap.appendChild(headerCard);

  // ── BASELINE WEEK ───────────────────────────────────────────────
  if(isBaseline) {
    wrap.appendChild(section("Week 1 — Baseline Tests"));
    const blCard = document.createElement("div");
    blCard.style.cssText = `background:${SRF};border:1px solid ${BRD};border-radius:14px;overflow:hidden;margin-bottom:12px`;
    PC_BASELINE_TESTS.forEach((test,i) => {
      const row2 = document.createElement("div");
      row2.style.cssText = `padding:12px 14px;border-bottom:1px solid ${BRD}`;
      const saved = pcState.baseline[test.field];
      const topRow = document.createElement("div");
      topRow.style.cssText = "display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px";
      const left = document.createElement("div");
      left.appendChild(el("div","font-size:11px;color:"+MUT+";font-family:'Space Mono',monospace;margin-bottom:2px",test.day));
      left.appendChild(el("div","font-size:14px;font-weight:600;color:"+TXT,test.name));
      const right = saved ? el("div","font-family:'Space Mono',monospace;font-size:14px;color:"+phase.color, saved) :

      topRow.appendChild(left);topRow.appendChild(right);
      row2.appendChild(topRow);
      row2.appendChild(el("div","font-size:12px;color:"+MUT+";line-height:1.6",test.desc));
      if(test.field === "baseline5RM" || test.field === "baselineAMRAP") {

        inp.value = saved||"";
        const saveBtn = document.createElement("button");
        saveBtn.textContent = "Save";
        saveBtn.style.cssText = `margin-top:6px;padding:8px 16px;background:transparent;border:1px solid ${phase.color};border-radius:8px;color:${phase.color};font-size:13px;font-family:'Space Grotesk',sans-serif;cursor:pointer`;
        saveBtn.addEventListener("click",()=>{
          const val = inp.value.trim();
          if(!val) return;
          pcState.baseline[test.field] = val+"lbs";
          if(test.field==="baseline5RM") {
            // Calculate estimated 1RM from 5RM
            const est = pc1RMFromSet(parseFloat(val), 5);
            pcState.est1RM = est;
            pcState.baseline.est1RM = est;
          }
          if(test.field==="baselineAMRAP") {
            pcState.baseline[test.field] = val+" reps";
          }
          savePCState();renderChallenge();
        });
        const inp2 = test.field==="baselineHR"?null:null;
        row2.appendChild(inp);row2.appendChild(saveBtn);
      }
      if(i===PC_BASELINE_TESTS.length-1) row2.style.borderBottom="none";
      blCard.appendChild(row2);

    wrap.appendChild(blCard);
    if(pcState.baseline.est1RM) {
      const estCard = document.createElement("div");

  if(!isBaseline) {
    wrap.appendChild(section("Squat targets — Week "+week));
    const sqCard = document.createElement("div");
    sqCard.style.cssText = `background:${SRF};border:1px solid ${BRD};border-radius:14px;padding:14px;margin-bottom:12px`;

    weights.forEach(w2 => {

    // Log a new set to update 1RM

    logRow.style.cssText = "display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-top:14px;align-items:end";
    const wInp = document.createElement("input");wInp.type="number";wInp.placeholder="Weight (lbs)";wInp.className="inp";
    const rInp = document.createElement("input");rInp.type="number";rInp.placeholder="Reps";rInp.className="inp";
    const logBtn = document.createElement("button");
    logBtn.textContent="Log set";
    logBtn.style.cssText=`padding:10px 12px;background:transparent;border:1.5px solid ${phase.color};border-radius:8px;color:${phase.color};font-size:13px;font-weight:600;font-family:'Space Grotesk',sans-serif;cursor:pointer;white-space:nowrap`;
    logBtn.addEventListener("click",()=>{
      const w2=parseFloat(wInp.value),r=parseFloat(rInp.value);
      if(!w2||!r)return;
      const new1RM=pc1RMFromSet(w2,r);
      if(new1RM>pcState.est1RM){
        pcState.est1RM=new1RM;
        alert("New estimated 1RM: "+new1RM+" lbs");
      }
      if(!pcState.weekLogs[week])pcState.weekLogs[week]={};
      if(!pcState.weekLogs[week].sets)pcState.weekLogs[week].sets=[];
      pcState.weekLogs[week].sets.push({w:w2,r,est1RM:new1RM});
      savePCState();renderChallenge();
    });
    logRow.appendChild(wInp);logRow.appendChild(rInp);logRow.appendChild(logBtn);
    sqCard.appendChild(logRow);

    // Recent sets
    if(weekLog.sets&&weekLog.sets.length) {
      const setsDiv=document.createElement("div");setsDiv.style.cssText="margin-top:10px;border-top:1px solid "+BRD+";padding-top:10px";
      weekLog.sets.forEach((s,i)=>{
        const sr=document.createElement("div");
        sr.style.cssText=`display:flex;justify-content:space-between;font-size:12px;font-family:'Space Mono',monospace;color:${MUT};margin-bottom:3px`;
        sr.appendChild(el("span","","Set "+(i+1)+": "+s.w+"lbs × "+s.r));
        sr.appendChild(el("span","","→ "+s.est1RM+"lbs est"));
        setsDiv.appendChild(sr);
      });
      sqCard.appendChild(setsDiv);
    }
    wrap.appendChild(sqCard);

    // AMRAP section (weeks 7+)
    if(amrapTarget>0) {
      wrap.appendChild(section("AMRAP test — target "+amrapTarget+" reps"));
      const amrapCard=document.createElement("div");
      amrapCard.style.cssText=`background:${SRF};border:1px solid ${BRD};border-radius:14px;padding:14px;margin-bottom:12px`;
      const savedAMRAP=weekLog.amrap;

      // Progress toward 37
      const amrapPct=Math.min(Math.round((savedAMRAP||0)/37*100),100);
      const ap=document.createElement("div");ap.style.cssText="display:flex;justify-content:space-between;margin-bottom:6px";
      ap.appendChild(el("div","font-size:12px;color:"+MUT,"Progress toward 37"));
      ap.appendChild(el("div","font-family:'Space Mono',monospace;font-size:13px;color:"+TXT,(savedAMRAP||"--")+" / 37 reps"));
      amrapCard.appendChild(ap);
      const ab=document.createElement("div");ab.style.cssText=`height:3px;background:${BRD};border-radius:2px;overflow:hidden;margin-bottom:14px`;
      const af=document.createElement("div");af.style.cssText=`height:3px;background:${phase.color};width:${amrapPct}%;border-radius:2px`;
      ab.appendChild(af);amrapCard.appendChild(ab);

      amrapCard.appendChild(el("div","font-size:12px;color:"+MUT+";line-height:1.6;margin-bottom:12px",
        "138 lbs on bar. Unbroken, max reps. Stop when form breaks. Log immediately after."));
      const amrapRow=document.createElement("div");amrapRow.style.cssText="display:grid;grid-template-columns:1fr auto;gap:8px";
      const amrapInp=document.createElement("input");amrapInp.type="number";amrapInp.placeholder="Reps completed";amrapInp.className="inp";
      if(savedAMRAP)amrapInp.value=savedAMRAP;
      const amrapBtn=document.createElement("button");
      amrapBtn.textContent="Log";
      amrapBtn.style.cssText=`padding:10px 14px;background:transparent;border:1.5px solid ${phase.color};border-radius:8px;color:${phase.color};font-size:13px;font-weight:600;font-family:'Space Grotesk',sans-serif;cursor:pointer`;
      amrapBtn.addEventListener("click",()=>{
        const v=parseFloat(amrapInp.value);if(isNaN(v))return;
        if(!pcState.weekLogs[week])pcState.weekLogs[week]={};
        pcState.weekLogs[week].amrap=v;
        savePCState();renderChallenge();
      });
      amrapRow.appendChild(amrapInp);amrapRow.appendChild(amrapBtn);
      amrapCard.appendChild(amrapRow);
      wrap.appendChild(amrapCard);
    }
  }

  // ── CARDIO PRESCRIPTION ─────────────────────────────────────────
  wrap.appendChild(section("Cardio prescription"));
  const cardioCard=document.createElement("div");
  cardioCard.style.cssText=`background:${SRF};border:1px solid ${BRD};border-radius:14px;padding:14px;margin-bottom:12px`;
  cardioCard.appendChild(el("div","font-size:14px;font-weight:600;color:"+TXT+";margin-bottom:6px",cardioRx.desc));
  cardioCard.appendChild(el("div","font-size:13px;color:"+MUT+";line-height:1.7",cardioRx.detail));
  cardioCard.appendChild(el("div","font-size:11px;color:"+DIM+";margin-top:10px;font-family:'Space Mono',monospace",
    "HR zones · Z2: 109–127 · Z3: 127–145 · Z4: 145–163 · Z5: 163–182 bpm"));
  wrap.appendChild(cardioCard);

  // ── PERFORMANCE MACROS ──────────────────────────────────────────
  wrap.appendChild(section("Performance macros"));
  const macroCard=document.createElement("div");
  macroCard.style.cssText=`background:${SRF};border:1px solid ${BRD};border-radius:14px;overflow:hidden;margin-bottom:12px`;

  ["training","rest"].forEach((type,i)=>{

    const isActive=(weekLog.macroType||pcAutoMacroType())===type;
    const mRow=document.createElement("div");
    mRow.style.cssText=`padding:12px 14px;border-bottom:1px solid ${BRD};background:${isActive?phase.color+"12":"transparent"};cursor:pointer`;
    if(i===2)mRow.style.borderBottom="none";
    const mr1=document.createElement("div");mr1.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px";
    mr1.appendChild(el("div","font-size:13px;font-weight:600;color:"+(isActive?G:TXT),(isActive?"✓ ":"")+m.label));
    mr1.appendChild(el("div","font-family:'Space Mono',monospace;font-size:13px;color:"+phase.color,m.calories+" kcal"));
    const mr2=document.createElement("div");mr2.style.cssText="display:flex;gap:14px;font-size:12px;font-family:'Space Mono',monospace;color:"+MUT;
    mr2.appendChild(el("span","","P:"+m.protein+"g"));
    mr2.appendChild(el("span","","C:"+m.carbs+"g"));
    mr2.appendChild(el("span","","F:"+m.fat+"g"));
    mRow.appendChild(mr1);mRow.appendChild(mr2);
    if(m.note){const mn=el("div","font-size:11px;color:"+DIM+";margin-top:3px",m.note);mRow.appendChild(mn);}
    mRow.addEventListener("click",()=>{
      if(!pcState.weekLogs[week])pcState.weekLogs[week]={};
      pcState.weekLogs[week].macroType=type;
      // Update profile macros to match selection
      profile.calories=m.calories;profile.protein=m.protein;profile.carbs=m.carbs;profile.fat=m.fat;
      sv("profile",profile);
      savePCState();renderChallenge();
    });
    macroCard.appendChild(mRow);
  });
  wrap.appendChild(macroCard);
  wrap.appendChild(el("div","font-size:11px;color:"+DIM+";text-align:center;margin-top:-4px","Tap a macro profile to activate it. Your nutrition targets update immediately."));

  content.appendChild(wrap);
}

// ── SQUAT CHALLENGE DETAIL ────────────────────────────────────────────
function renderSquatChallenge(wrap){
  const cWeek=pcCurrentWeek();
  const cPhase=pcPhase(cWeek);
  const phaseIdx=pcPhaseIdx(cWeek);
  const viewWeek=pcState.challengeViewWeek||cWeek;
  const viewPhase=pcPhase(viewWeek);
  const viewPhaseIdx=pcPhaseIdx(viewWeek);
  const est1RM=pcState.est1RM||95;
  const bw=pcTestBW();
  const weekLog=pcState.weekLogs[viewWeek]||{};
  const daysLeft=Math.ceil((new Date(PC_TEST_DATE)-new Date())/(1000*60*60*24));
  const isBaselineWeek=viewWeek===1;
  const isCheckpoint=PC_CHECKPOINTS.includes(viewWeek)&&viewWeek===cWeek;

  function el(tag,css,text){const e=document.createElement(tag);if(css)e.style.cssText=css;if(text!==undefined)e.textContent=text;return e;}
  function secLabel(t){return el("div",`font-size:11px;color:${MUT};text-transform:uppercase;letter-spacing:1.8px;font-family:'Space Mono',monospace;margin:14px 0 8px`,t);}
  function mkCard(accent){const c=document.createElement("div");c.style.cssText=`background:${SRF};border:1px solid ${accent||BRD};border-radius:14px;overflow:hidden;margin-bottom:12px`;return c;}

  // Back button
  const back=el("button",`padding:5px 12px;background:transparent;border:1px solid ${BRD};border-radius:7px;color:${MUT};font-size:12px;font-family:'Space Grotesk',sans-serif;cursor:pointer;margin-bottom:14px`,"← Programs");
  back.addEventListener("click",()=>{pcState.openProgram=null;savePCState();renderPrograms();});
  wrap.appendChild(back);

  // Header
  const hdr=document.createElement("div");
  hdr.style.cssText=`display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px`;
  const hLeft=document.createElement("div");

function renderStrengthArchive(wrap){
  function el(tag,css,text){const e=document.createElement(tag);if(css)e.style.cssText=css;if(text!==undefined)e.textContent=text;return e;}

  const back=el("button",`padding:5px 12px;background:transparent;border:1px solid ${BRD};border-radius:7px;color:${MUT};font-size:12px;font-family:'Space Grotesk',sans-serif;cursor:pointer;margin-bottom:14px`,"← Programs");
  back.addEventListener("click",()=>{pcState.openProgram=null;savePCState();renderPrograms();});
  wrap.appendChild(back);

  wrap.appendChild(el("div","font-size:18px;font-weight:700;color:"+TXT+";margin-bottom:4px","Strength Program"));
  wrap.appendChild(el("div","font-size:12px;color:"+MUT+";margin-bottom:16px","Push · Pull · Legs · Full Body — 4-day split"));
  wrap.appendChild(el("div","font-size:13px;color:"+MUT+";line-height:1.7;margin-bottom:20px","This program is archived. Activate it to load it into your Training tab. It always starts with a baseline week to establish current working weights — previous data is preserved separately."));

  // Activate section
  const activateCard=document.createElement("div");
  activateCard.style.cssText=`background:${SRF};border:1px solid ${BRD};border-radius:14px;padding:14px`;
  activateCard.appendChild(el("div","font-size:11px;color:"+MUT+";text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;font-family:'Space Mono',monospace","Activate program"));
  const dateRow=document.createElement("div");dateRow.style.cssText="display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end";
  const dateInp=document.createElement("input");
  dateInp.type="date";dateInp.className="inp";
  const today=new Date();
  dateInp.value=today.toISOString().split("T")[0];
  dateInp.min=today.toISOString().split("T")[0];
  const actBtn=el("button",`padding:10px 14px;background:transparent;border:1.5px solid ${G};border-radius:8px;color:${G};font-size:13px;font-weight:600;font-family:'Space Grotesk',sans-serif;cursor:pointer;white-space:nowrap`,"Activate");
  actBtn.addEventListener("click",()=>{
    const d=dateInp.value;
    if(!d)return;
    if(confirm("Activate the Strength Program starting "+d+"?\n\nThis will replace the squat challenge in your Training tab. The squat challenge remains accessible here.")){
      sv("wk_start_date",d);sv("wk_week",1);sv("wk_completed",[]);sv("wk_setdata",{});
      wkWeek=1;wkComp=[];wkSets={};wkViewWeek=1;
      sv("active_program","strength");
      alert("Strength Program activated. Switch to the Training tab to begin your baseline week.");
    }
  });
  dateRow.appendChild(dateInp);dateRow.appendChild(actBtn);
  activateCard.appendChild(dateRow);
  wrap.appendChild(activateCard);
}

// ── PLAN RESTRUCTURE ─────────────────────────────────────────────────
function restructurePlan(newTestDate){
  const w=pcState.assessment.week;
  const currentEst1RM=pcState.est1RM||95;
  const bw=pcTestBW();
  const bestAMRAP=Object.values(pcState.weekLogs||{}).reduce((b,wl)=>Math.max(b,wl.amrap||0),0);
  const testDate=new Date(newTestDate+"T12:00:00");
  const now=new Date();
  const weeksRemaining=Math.floor((testDate-now)/(1000*60*60*24*7));

  // Archive weeks up to current checkpoint
  pcState.archivedWeeks=pcState.archivedWeeks||{};
  for(let i=1;i<=w;i++){pcState.archivedWeeks[i]=pcState.weekLogs[i]||{};}

  // Recalculate targets from current numbers to new test date
  const weeksTotal=weeksRemaining;
  const newTargetRM=Math.round(bw*1.75); // 1.75x BW = conservative target for 37 reps
  const rmGap=Math.max(newTargetRM-currentEst1RM,0);
  // Regenerate week targets dynamically
  const newWeekTargets={};const newAmrapTargets={};
  for(let i=1;i<=weeksTotal;i++){
    const t=(i-1)/(weeksTotal-1||1);
    newWeekTargets[i]=Math.round(currentEst1RM+(rmGap*Math.pow(t,0.7)));
    const amrapProg=i/weeksTotal;
    newAmrapTargets[i]=i<Math.floor(weeksTotal*0.35)?0:Math.round(Math.min(bestAMRAP+(37-bestAMRAP)*Math.pow((amrapProg-0.35)/0.65,0.8),37));
  }
  pcState.restructuredPlan={
    testDate:newTestDate,weeksTotal,newWeekTargets,newAmrapTargets,
    startedFromWeek:w,startRM:currentEst1RM,startAMRAP:bestAMRAP
  };
  pcState.challengeViewWeek=1;
  savePCState();
}

// ── AI ASSESSMENT ─────────────────────────────────────────────────────
async function runAssessment(week, phase){
  const est1RM=pcState.est1RM||95;
  const bw=pcTestBW();
  const bestAMRAP=Object.values(pcState.weekLogs||{}).reduce((b,w2)=>Math.max(b,w2.amrap||0),0);
  const daysLeft=Math.ceil((new Date(PC_TEST_DATE)-new Date())/(1000*60*60*24));
  const weeksLeft=Math.ceil(daysLeft/7);
  const targetRM=PC_TARGET_1RM;
  const rmGap=targetRM-est1RM;
  const amrapGap=37-(bestAMRAP||0);

  // Show loading state
  const btn=document.querySelector("[data-assess-btn]");
  if(btn){btn.textContent="Analysing...";btn.style.opacity="0.6";}

  try {
    const prompt=`You are a strength and conditioning coach assessing a client's progress on a squat endurance challenge.

CLIENT DATA:
- Goal: 37 unbroken back squats at bodyweight (${bw}lbs) by ${PC_TEST_DATE}
- Current estimated 1RM: ${est1RM}lbs (target: ${targetRM}lbs, gap: ${rmGap}lbs)
- Best AMRAP at bodyweight: ${bestAMRAP||0} reps (target: 37, gap: ${amrapGap})
- Weeks remaining: ${weeksLeft}
- Phase just completed: ${phase.name}
- Client history: returning to training after 2+ year gap, right rotator cuff tear (surgery pending), age 38, previous squat 1RM 195lbs

ASSESS:
1. Is the Jan 29 2027 test date attainable at current pace?
2. What is the injury risk level and to which specific body part, and why?
3. If behind, what is the earliest safe test date and what is a conservative test date?

Respond ONLY in this exact JSON format, no other text:
{
  "status": "on_track" | "ahead" | "behind",
  "headline": "one sentence, plain language",
  "detail": "2-3 sentences max. If injury risk exists: 'High risk of injury to [body part] due to [specific deficiency].' Then recommendation.",
  "earliestDate": "YYYY-MM-DD or null",
  "earliestNote": "one line rationale or null",
  "conservativeDate": "YYYY-MM-DD or null",
  "conservativeNote": "one line rationale or null"
}`;

    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:1000,
        messages:[{role:"user",content:prompt}]
      })
    });
    const data=await resp.json();
    const text=data.content.map(c=>c.text||"").join("");
    const clean=text.replace(/```json|```/g,"").trim();
    const result=JSON.parse(clean);
    result.week=week;result.decided=false;
    pcState.assessment=result;
    savePCState();renderPrograms();
  } catch(e){
    alert("Assessment failed. Check your connection and try again.");
  }
}


// ── DATE NAVIGATION BAR ──────────────────────────────────────────────
// Renders arrow ← date label → with tap-to-open calendar picker
// Used at the top of Today, Nutrition, and Progress tabs
function mkDateNav(onChangeFn) {
  const isToday = viewDate === td();
  const bar = document.createElement("div");
  bar.style.cssText = `display:flex;align-items:center;justify-content:space-between;background:${SRF};border:1px solid ${BRD};border-radius:10px;padding:8px 12px;margin-bottom:12px`;

  // Prev arrow
  const prev = document.createElement("button");
  prev.textContent = "←";
  prev.style.cssText = `background:none;border:none;color:${TXT};font-size:16px;cursor:pointer;padding:0 6px;font-family:'Space Mono',monospace`;
  prev.addEventListener("click", () => {
    const d = new Date(viewDate + "T12:00:00");
    d.setDate(d.getDate() - 1);
    viewDate = d.toISOString().slice(0,10);
    if(onChangeFn) onChangeFn();
    else render();
  });

  // Date label — tap to open calendar picker
  const mid = document.createElement("div");
  mid.style.cssText = "display:flex;align-items:center;gap:8px;cursor:pointer;position:relative";

  const lbl = document.createElement("div");
  const d = new Date(viewDate + "T12:00:00");
  const isToday2 = viewDate === td();
  lbl.style.cssText = `font-family:'Space Mono',monospace;font-size:13px;font-weight:600;color:${isToday2 ? G : TXT}`;
  lbl.textContent = isToday2 ? "Today" : d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});

  const calIco = document.createElement("span");
  calIco.style.cssText = `font-size:11px;color:${MUT}`;
  calIco.textContent = "▾";

  // Hidden date input for calendar picker
  const calInp = document.createElement("input");
  calInp.type = "date";
  calInp.value = viewDate;
  calInp.max = td();
  calInp.style.cssText = "position:absolute;opacity:0;width:100%;height:100%;top:0;left:0;cursor:pointer";
  calInp.addEventListener("change", e => {
    if(e.target.value) {
      viewDate = e.target.value;
      if(onChangeFn) onChangeFn();
      else render();
    }
  });

  mid.appendChild(lbl);
  mid.appendChild(calIco);
  mid.appendChild(calInp);

  // Next arrow — disabled if already on today
  const next = document.createElement("button");
  next.textContent = "→";
  next.style.cssText = `background:none;border:none;color:${isToday ? DIM : TXT};font-size:16px;cursor:${isToday ? "default" : "pointer"};padding:0 6px;font-family:'Space Mono',monospace`;
  next.addEventListener("click", () => {
    if(viewDate >= td()) return;
    const d2 = new Date(viewDate + "T12:00:00");
    d2.setDate(d2.getDate() + 1);
    viewDate = d2.toISOString().slice(0,10);
    if(onChangeFn) onChangeFn();
    else render();
  });

  bar.appendChild(prev);
  bar.appendChild(mid);
  bar.appendChild(next);
  return bar;
}

// ── COPY MEAL ────────────────────────────────────────────────────────
// Shows a picker to copy a single food entry to another date
function showCopyMeal(entry) {
  const overlay = document.createElement("div");
  overlay.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:flex-end;justify-content:center`;

  const sheet = document.createElement("div");
  sheet.style.cssText = `background:${SRF};border-radius:16px 16px 0 0;padding:20px 16px 40px;width:100%;max-width:390px;box-sizing:border-box`;

  const title = document.createElement("div");
  title.style.cssText = `font-size:15px;font-weight:700;color:${TXT};margin-bottom:4px`;
  title.textContent = "Copy meal";
  const sub = document.createElement("div");
  sub.style.cssText = `font-size:12px;color:${MUT};margin-bottom:16px`;
  sub.textContent = entry.name + " · " + entry.grams + "g";
  sheet.appendChild(title);
  sheet.appendChild(sub);

  // Date picker
  const dateRow = document.createElement("div");
  dateRow.style.cssText = "display:flex;align-items:center;gap:10px;margin-bottom:14px";
  const dateLbl = document.createElement("div");
  dateLbl.style.cssText = `font-size:13px;color:${TXT}`;
  dateLbl.textContent = "Copy to:";
  const dateInp2 = document.createElement("input");
  dateInp2.type = "date";
  // Default to next day from viewDate
  const nextD = new Date(viewDate + "T12:00:00");
  nextD.setDate(nextD.getDate() + 1);
  dateInp2.value = nextD.toISOString().slice(0,10);
  dateInp2.style.cssText = `flex:1;padding:8px 12px;background:${SRF2};border:1px solid ${BRD};border-radius:8px;color:${TXT};font-size:14px;font-family:'Space Grotesk',sans-serif;outline:none`;
  dateRow.appendChild(dateLbl);
  dateRow.appendChild(dateInp2);
  sheet.appendChild(dateRow);

  // Serving size adjuster
  const servRow = document.createElement("div");
  servRow.style.cssText = "display:flex;align-items:center;gap:10px;margin-bottom:20px";
  const servLbl = document.createElement("div");
  servLbl.style.cssText = `font-size:13px;color:${TXT}`;
  servLbl.textContent = "Serving (g):";
  const servInp = document.createElement("input");
  servInp.type = "number";
  servInp.value = entry.grams;
  servInp.min = "1";
  servInp.style.cssText = `flex:1;padding:8px 12px;background:${SRF2};border:1px solid ${BRD};border-radius:8px;color:${TXT};font-size:14px;font-family:'Space Mono',monospace;outline:none`;
  servRow.appendChild(servLbl);
  servRow.appendChild(servInp);
  sheet.appendChild(servRow);

  // Buttons
  const btnRow = document.createElement("div");
  btnRow.style.cssText = "display:grid;grid-template-columns:1fr 1fr;gap:8px";

  const cancelBtn = document.createElement("button");
  cancelBtn.textContent = "Cancel";
  cancelBtn.style.cssText = `padding:12px;background:transparent;border:1px solid ${BRD};border-radius:10px;color:${MUT};font-size:14px;font-family:'Space Grotesk',sans-serif;cursor:pointer`;
  cancelBtn.addEventListener("click", () => document.body.removeChild(overlay));

  const copyBtn = document.createElement("button");
  copyBtn.textContent = "Copy meal";
  copyBtn.style.cssText = `padding:12px;background:${GD};border:1.5px solid ${G};border-radius:10px;color:${G};font-size:14px;font-weight:600;font-family:'Space Grotesk',sans-serif;cursor:pointer`;
  copyBtn.addEventListener("click", () => {
    const targetDate = dateInp2.value;
    const newGrams = parseFloat(servInp.value) || entry.grams;
    if(!targetDate) return;
    // Scale macros by new serving size
    const ratio = newGrams / entry.grams;
    const newEntry = {
      ...entry,
      grams: newGrams,
      calories: Math.round((entry.calories||0) * ratio),
      protein:  Math.round((entry.protein||0)  * ratio * 10) / 10,
      carbs:    Math.round((entry.carbs||0)    * ratio * 10) / 10,
      fat:      Math.round((entry.fat||0)      * ratio * 10) / 10,
      fiber:    Math.round((entry.fiber||0)    * ratio * 10) / 10,
    };
    const existing = ld(`nutri_${targetDate}`, []);
    sv(`nutri_${targetDate}`, [...existing, newEntry]);
    document.body.removeChild(overlay);
    // Navigate to target date
    viewDate = targetDate;
    activeTab = "nutrition";
    render();
  });

  btnRow.appendChild(cancelBtn);
  btnRow.appendChild(copyBtn);
  sheet.appendChild(btnRow);
  overlay.appendChild(sheet);
  overlay.addEventListener("click", e => { if(e.target===overlay) document.body.removeChild(overlay); });
  document.body.appendChild(overlay);
}

// ── MAIN RENDER ───────────────────────────────────────────────────────
function render(){
  renderHeader();renderNav();
  if(activeTab==="dashboard")renderDashboard();
  else if(activeTab==="nutrition")renderNutrition();
  else if(activeTab==="workout")renderWorkout();
  else if(activeTab==="progress")renderProgress();
  else if(activeTab==="programs")renderPrograms();
}

render();
</script>
