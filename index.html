// ── PROFILE ───────────────────────────────────────────────────────
const INIT={weight:138,bodyFat:23.5,calories:1850,protein:145,carbs:175,fat:55,waterOz:94,tdee:2100};

function calcMacros(w,bf,cal){
  const lbm=w*(1-bf/100),pr=Math.round(lbm*1.05),fa=Math.round(cal*.27/9);
  return{protein:pr,fat:fa,carbs:Math.max(Math.round((cal-pr*4-fa*9)/4),80),waterOz:Math.round(w*.68)};
}
function estTDEE(w,bf){return Math.round((370+21.6*(w*(1-bf/100)*.453592))*1.25)}

// ── PROGRAM ───────────────────────────────────────────────────────
const PL=["Reactivation","Accumulation","Development"];
const PD2=["Wks 1–2 · Light loads, movement patterns, zero soreness spirals.","Wks 3–4 · Volume builds, intensity climbs carefully.","Wks 5–6+ · Full program. Progressive overload in effect."];
const pf=w=>w<=2?0:w<=4?1:2;

const PROG=[
  {label:"MON",name:"Push",focus:"Chest · Tris · Front delt",rest:false,prime:false,

  {label:"TUE",name:"Upper Prime",focus:"Activation · Blood flow · Mobility",rest:false,prime:true,
   pn:["Wks 1–2: Very easy. Just waking muscles up.","Wks 3–4: Slight resistance increase.","Wks 5–6: Still priming — don't kill yourself before Pull."],
   exercises:[ex("Band pull-apart",2,[15,20],2,[20,25],3,[20,25],6,0,"Essential for rear delt + cuff health."),ex("Face pull (light cable)",2,[15,20],2,[15,20],3,[15,20],6,2.5,"External rotation focus. Rehab and priming in one."),ex("Seated cable row (neutral)",2,[12,15],2,[12,15],3,[12,15],6,5,"Very light — activating lats and mid-back."),ex("Dumbbell curl (seated)",2,[12,15],2,[12,15],3,[12,15],6,2.5,"")]},
  {label:"WED",name:"Pull",focus:"Back · Biceps · Rear delts",rest:false,prime:false,

   exercises:[ex("Barbell row (neutral grip)",2,[8,10],3,[8,10],4,[6,8],8,5,"Neutral grip reduces shoulder internal rotation stress."),ex("Lat pulldown (neutral/close)",2,[10,12],3,[10,12],3,[8,10],8,5,"Close neutral grip — full lat stretch without shoulder risk."),ex("Seated cable row (neutral)",2,[10,12],3,[10,12],3,[10,12],8,5,"Drive elbows straight back, squeeze at peak."),ex("Face pull",2,[15,20],3,[15,20],3,[15,20],9,2.5,"Rear delt + external rotator. Never skip."),ex("EZ bar curl",2,[10,12],3,[10,12],3,[10,12],8,2.5,""),ex("Hammer curl",2,[12,15],3,[12,15],3,[12,15],9,2.5,"")]},
  {label:"THU",name:"Leg Prime",focus:"Glute activation · Hip hinge · Quad fire",rest:false,prime:true,
   pn:["Wks 1–2: Most important early session. Light, controlled, no soreness.","Wks 3–4: Add band resistance or more weight.","Wks 5–6: Keep intensity moderate — still priming."],
   exercises:[ex("Glute bridge (BW → band)",2,[15,20],2,[15,20],3,[15,20],6,0,"Activates glutes before tomorrow's squat."),ex("Banded clamshell",2,[15,20],2,[15,20],3,[20,25],6,0,"Hip abductor activation — protects knees."),ex("Goblet squat (tempo 3-0-1)",2,[10,12],2,[10,12],3,[12,15],6,5,"3-sec descent, pause, drive up."),ex("Lying leg curl (light)",2,[12,15],2,[12,15],3,[12,15],6,5,"Activates hamstrings for tomorrow."),ex("Standing calf raise (BW)",2,[15,20],2,[15,20],3,[15,20],6,0,"")]},
  {label:"FRI",name:"Legs A",focus:"Quads · Glutes · Calves",rest:false,prime:false,

  {label:"SAT",name:"Legs B",focus:"Hamstrings · Glutes · Posterior chain",rest:false,prime:false,
   pn:["Wks 1–2: RDL light, hip thrust BW only. No split squats.","Wks 3–4: Hip thrust loaded, leg curl added.","Wks 5–6: Bulgarian split squat enters at 2 sets."],
   exercises:[ex("Romanian deadlift",2,[10,12],3,[10,12],4,[8,10],7,5,"Hip hinge: soft knees, push hips back, bar stays close."),ex("Hip thrust (BW → barbell)",2,[12,15],3,[12,15],3,[12,15],8,10,"Bodyweight wks 1–2. Add bar week 3."),ex("Lying leg curl",2,[12,15],3,[12,15],4,[10,12],8,5,"Starts light wk 1. Full loading wk 5."),ex("Bulgarian split squat",0,[0,0],0,[0,0],2,[8,10],8,5,"Starts week 5 only. 2 sets each leg."),ex("Seated calf raise",2,[15,20],3,[15,20],4,[15,20],9,2.5,"")]},
  {label:"SUN",name:"Rest",focus:"",rest:true,prime:false,exercises:[]}
];
const pex=(day,phase)=>day.exercises.filter(e=>e.phases[phase].sets>0);

// ── GOALS ─────────────────────────────────────────────────────────
const GOALS=[
  {id:"steps",label:"10,000 steps",icon:"👟",desc:"Double your usual 5k."},
  {id:"water",label:"Drink 94 oz water",icon:"💧",desc:"Your daily hydration target."},
  {id:"protein",label:"Hit 145g protein",icon:"🥩",desc:"Most important target for recomp."},
  {id:"sleep",label:"Sleep 7+ hours",icon:"🌙",desc:"Recovery is when you build muscle."},
  {id:"supplements",label:"Take supplements",icon:"💊",desc:"Consistency compounds."}
];

// ── STATE ─────────────────────────────────────────────────────────
let activeTab="dashboard";
let wkWeek=ld("wk_week",1);
let activeDay=(()=>{let d=new Date().getDay();return d===0?6:d-1})();
let openEx=-1;
let wkComp=ld("wk_completed",[]);
let wkSets=ld("wk_setdata",{});
let wkHist=ld("wk_history",{});
let weighIns=ld("weighins",[]);
let showWI=false;
let showInfo=false;
let wiWeight="",wiBF="";
// Nutrition form state - persists across renders
let nf={name:"",calories:"",protein:"",carbs:"",fat:""};
// Food database state
const USDA_KEY="DEMO_KEY"; // free tier: 30 req/min, 50/day — enough for personal use
let fdSearch="";
let fdResults=[];
let fdLoading=false;
let fdSelected=null; // {fdcId, name, nutrients, servings}
let fdGrams=100;
let fdServing=null; // selected serving option or null (means grams mode)
let fdPortionMode="grams"; // "grams" | "serving"
let fdLogMode="search"; // "search" | "manual"
let recentFoods=ld("recent_foods",[]);
let searchDebounce=null;

function getNutrient(food,id){
  if(!food||!food.foodNutrients)return 0;
  const n=food.foodNutrients.find(x=>x.nutrientId===id||x.nutrient?.id===id);
  return n?(n.value||n.amount||0):0;
}
// USDA nutrient IDs
const NID={energy:1008,protein:1003,carbs:1005,fat:1004};

function calcFromGrams(food,grams){
  const scale=grams/100;
  return{
    calories:Math.round(getNutrient(food,NID.energy)*scale),
    protein:Math.round(getNutrient(food,NID.protein)*scale*10)/10,
    carbs:Math.round(getNutrient(food,NID.carbs)*scale*10)/10,
    fat:Math.round(getNutrient(food,NID.fat)*scale*10)/10
  };
}

async function searchFoods(query){
  if(!query||query.length<2){fdResults=[];renderNutrition();return;}
  fdLoading=true;renderNutrition();
  try{
    const url=`https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(query)}&dataType=SR%20Legacy,Survey%20(FNDDS),Foundation&pageSize=10&api_key=${USDA_KEY}`;
    const r=await fetch(url);
    const d=await r.json();
    fdResults=(d.foods||[]).map(f=>({
      fdcId:f.fdcId,
      name:f.description,
      brand:f.brandOwner||f.brandName||"",
      servings:f.foodMeasures||[],
      foodNutrients:f.foodNutrients||[]
    }));
  }catch(e){fdResults=[];}
  fdLoading=false;renderNutrition();
}

function selectFood(food){
  fdSelected=food;
  fdGrams=100;
  fdPortionMode="grams";
  fdServing=food.servings&&food.servings.length>0?food.servings[0]:null;
  renderNutrition();
}

function addFoodEntry(){
  if(!fdSelected)return;
  let grams=fdGrams;
  if(fdPortionMode==="serving"&&fdServing){
    grams=fdServing.gramWeight||100;
  }
  const macros=calcFromGrams(fdSelected,grams);
  const entry={
    name:fdSelected.name+(fdPortionMode==="serving"&&fdServing?` (${fdServing.disseminationText||fdServing.portionDescription||"1 serving"})`:` (${grams}g)`),
    calories:macros.calories,protein:macros.protein,carbs:macros.carbs,fat:macros.fat,
    id:Date.now()
  };
  // Save to recent foods
  const recent=[{name:fdSelected.name,fdcId:fdSelected.fdcId,food:fdSelected},...recentFoods.filter(r=>r.fdcId!==fdSelected.fdcId)].slice(0,10);
  recentFoods=recent;sv("recent_foods",recentFoods);
  const cur=ld(`nutri_${td()}`,[]);sv(`nutri_${td()}`,[...cur,entry]);
  fdSelected=null;fdSearch="";fdResults=[];fdGrams=100;
  renderNutrition();
}

function addRecentFood(rf){
  fdSelected=rf.food;
  fdGrams=100;fdPortionMode="grams";
  fdServing=rf.food.servings&&rf.food.servings.length>0?rf.food.servings[0]:null;
  renderNutrition();
}

function addManualEntry(){
  if(!nf.name.trim()&&!nf.calories)return;
  const entry={
    name:nf.name||"Food entry",
    calories:parseFloat(nf.calories)||0,
    protein:parseFloat(nf.protein)||0,
    carbs:parseFloat(nf.carbs)||0,
    fat:parseFloat(nf.fat)||0,
    id:Date.now()
  };
  const cur=ld(`nutri_${td()}`,[]);
  sv(`nutri_${td()}`,[...cur,entry]);
  nf={name:"",calories:"",protein:"",carbs:"",fat:""};
  renderNutrition();
}


// ── HELPERS ───────────────────────────────────────────────────────
function h(tag,attrs,children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k==="class")el.className=v;
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  });
  if(children){
    (Array.isArray(children)?children:[children]).forEach(c=>{
      if(c==null||c===false)return;
      el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
    });
  }
  return el;
}
function div(style,children){return h("div",{style},children)}
function txt(s,style){return h("div",{style},s)}
function neonBar(pct,color){
  return h("div",{class:"neon-bar-wrap"},[
    h("div",{class:"neon-bar-fill",style:{width:Math.min(pct,100)+"%",background:color,boxShadow:`0 0 6px ${color}`}})
  ]);
}
function card(children,accent,extraStyle){
  const el=h("div",{class:"card"});
  if(accent){el.style.border=`1px solid ${accent}44`;el.style.boxShadow=`0 0 16px ${accent}11`}
  if(extraStyle)Object.assign(el.style,extraStyle);
  (Array.isArray(children)?children:[children]).forEach(c=>{if(c)el.appendChild(c)});
  return el;
}
function macroRing(value,max,color,label){
  const size=72,r=size/2-7,circ=2*Math.PI*r,dash=circ*Math.min(value/(max||1),1);

// ── WORKOUT STATE HELPERS ─────────────────────────────────────────
function getLast(di,ei){const h=wkHist[`d${di}_e${ei}`]||[];return h.length?h[h.length-1]:null}
function getLastTopSet(di,ei){
  // Returns {weight, reps} of the heaviest set in the last session
  const last=getLast(di,ei);
  if(!last||!last.sets||!last.sets.length)return null;
  // Find set with highest weight
  return last.sets.reduce((a,s)=>s.weight>a.weight?s:a,last.sets[0]);
}
function getSug(di,ei){
  const phase=pf(wkWeek),dl=wkWeek>0&&wkWeek%6===0;
  const ep=PROG[di].exercises[ei].phases[phase];
  const topSet=getLastTopSet(di,ei);
  if(!topSet)return null;
  if(dl)return Math.round(topSet.weight*.85*4)/4;
  // Hit top of rep range on all sets last time → add increment
  const last=getLast(di,ei);
  const allHitTop=last&&last.sets&&last.sets.every(s=>s.reps>=ep.rr[1]);
  return allHitTop?topSet.weight+PROG[di].exercises[ei].inc:topSet.weight;
}
function getSets(di,ei){
  const phase=pf(wkWeek),k=`d${di}_e${ei}_w${wkWeek}`;
  if(!wkSets[k]){
    const ep=PROG[di].exercises[ei].phases[phase];
    if(ep.sets===0)return[];
    const sw=getSug(di,ei);
    // Initialise AND persist immediately so updSet always reads back its own writes
    wkSets[k]=Array.from({length:ep.sets},()=>({weight:sw?String(sw):"",reps:"",done:false}));
    sv("wk_setdata",wkSets);
  }
  return wkSets[k];
}
function updSet(di,ei,si,field,val){
  const k=`d${di}_e${ei}_w${wkWeek}`;
  // getSets now always initialises the key, so wkSets[k] is guaranteed to exist
  const cur=getSets(di,ei);
  cur[si]={...cur[si],[field]:String(val)};
  sv("wk_setdata",wkSets);
}
function tglSet(di,ei,si){
  const k=`d${di}_e${ei}_w${wkWeek}`,cur=getSets(di,ei);
  cur[si]={...cur[si],done:!cur[si].done};
  sv("wk_setdata",wkSets);
  // Update button visually without full re-render (preserves keyboard focus)
  const btn=document.getElementById(`ck-${di}-${ei}-${si}`);
  if(btn){
    const done=cur[si].done;
    btn.style.border=`1px solid ${done?G:BRD}`;
    btn.style.background=done?OKD:SRF2;
    btn.style.color=done?G:DIM;
  }
  // Update progress bar
  const pct=Math.round(calcProg(di)*100);
  const pb=document.getElementById("wk-progress-bar");
  if(pb)pb.style.width=pct+"%";
  // Update exercise header dot
  const allDone=cur.every(s=>s.done);
  const numEl=document.getElementById(`ex-num-${di}-${ei}`);
  if(numEl){
    if(allDone){numEl.style.borderColor=G+"66";numEl.style.background=OKD;numEl.style.color=G;numEl.textContent="✓";}
    else{numEl.style.borderColor=BRD;numEl.style.background=SRF2;numEl.style.color=MUT;numEl.textContent=ei+1;}
  }
  const exCard=document.getElementById(`ex-card-${di}-${ei}`);
  if(exCard)exCard.style.border=`1px solid ${allDone?G+"66":BRD}`;
}
function addSet(di,ei){
  const k=`d${di}_e${ei}_w${wkWeek}`,cur=getSets(di,ei);
  wkSets={...wkSets,[k]:[...cur,{weight:cur[0]?.weight||"",reps:"",done:false}]};
  sv("wk_setdata",wkSets);render();
}
function calcProg(di){
  const day=PROG[di],phase=pf(wkWeek);
  if(day.rest||!day.exercises.length)return 1;
  let t=0,d=0;
  pex(day,phase).forEach(exO=>{
    const ei=day.exercises.indexOf(exO);
    getSets(di,ei).forEach(s=>{t++;if(s.done)d++;});
  });
  return t?d/t:0;
}
function finishWorkout(){
  const di=activeDay,day=PROG[di],phase=pf(wkWeek),nh={...wkHist};
  pex(day,phase).forEach(exO=>{
    const ei=day.exercises.indexOf(exO);
    const allSets=getSets(di,ei);
    const doneSets=allSets.filter(s=>s.done&&s.weight&&s.reps);
    if(!doneSets.length)return;
    const hk=`d${di}_e${ei}`;
    // Store full per-set detail: [{weight, reps}, ...] plus metadata
    const entry={
      week:wkWeek,
      date:td(),
      sets:doneSets.map(s=>({weight:parseFloat(s.weight)||0,reps:parseFloat(s.reps)||0}))
    };
    nh[hk]=[...(nh[hk]||[]),entry];
  });
  wkHist=nh;sv("wk_history",wkHist);
  const nc=[...new Set([...wkComp,di])];wkComp=nc;sv("wk_completed",wkComp);
  const wkDays=PROG.map((_,i)=>i).filter(i=>!PROG[i].rest);
  if(wkDays.every(i=>nc.includes(i))){wkWeek++;sv("wk_week",wkWeek);wkComp=[];wkSets={};sv("wk_completed",[]);sv("wk_setdata",{});}
  render();
}

// ── FEEDBACK ─────────────────────────────────────────────────────
function getFeedback(){
  const tips=[];
  if(weighIns.length>=2){
    const r=weighIns.slice(-4),delta=r[r.length-1].weight-r[0].weight,rate=delta/r.length;
    if(rate<-1)tips.push({type:"warn",title:"Losing too fast",body:`~${Math.abs(rate).toFixed(1)} lbs/week risks muscle loss. Add 150–200 kcal.`});
    else if(rate<-.25)tips.push({type:"ok",title:"Recomp on track",body:`~${Math.abs(rate).toFixed(2)} lbs/week. Keep going.`});
    else if(rate>.25)tips.push({type:"warn",title:"Weight trending up",body:`+${rate.toFixed(1)} lbs/week. Tighten up on weekends.`});
    else tips.push({type:"info",title:"Weight stable",body:"Good for recomp. For fat loss, cut 100 kcal or add 1,500 steps."});
  }
  const gains=[];
  PROG.forEach((day,di)=>day.exercises.forEach((exO,ei)=>{
    const h=wkHist[`d${di}_e${ei}`]||[];
    if(h.length>=3){
      const firstTop=h[0].sets?Math.max(...h[0].sets.map(s=>s.weight)):h[0].weight||0;
      const lastTop=h[h.length-1].sets?Math.max(...h[h.length-1].sets.map(s=>s.weight)):h[h.length-1].weight||0;
      if(lastTop>firstTop)gains.push({name:exO.name,g:lastTop-firstTop});
    }
  }));
  if(gains.length){const top=gains.sort((a,b)=>b.g-a.g)[0];tips.push({type:"ok",title:`PR — ${top.name}`,body:`Up ${top.g} lbs from first session.`});}
  if(!tips.length)tips.push({type:"info",title:"Log a weigh-in for feedback",body:"After 2+ entries you'll get adaptive recommendations here."});
  return tips;
}

          div({class:"macro-preview-item"},[

      const backBtn=h("button",{style:{width:"100%",padding:"9px",background:"transparent",border:`1px solid ${BRD}`,borderRadius:"10px",color:MUT,fontSize:"13px",fontFamily:"'Exo 2',sans-serif",cursor:"pointer",marginTop:"8px"},onclick:()=>{fdSelected=null;renderNutrition()}},["← Back to results"]);

      detailEl=div({class:"food-detail"},[

        ...recentFoods.slice(0,6).map(rf=>{
          const macros100=calcFromGrams(rf.food,100);
          const row=h("div",{class:"recent-item"});

          row.appendChild(h("button",{style:{flexShrink:0,padding:"5px 10px",background:GD,border:`1px solid ${G}44`,borderRadius:"8px",color:G,fontSize:"11px",fontFamily:"'Exo 2',sans-serif",cursor:"pointer"},onclick:()=>addRecentFood(rf)},["Add"]));
          return row;
        })

    logSection=div({},[searchWrap,loadingEl,resultsEl,noResults,detailEl,recentEl].filter(Boolean));

  } else {

        inp.addEventListener("input",e=>{nf[k]=e.target.value});

        return div({},[txt(lbl,{fontSize:"9px",color:col,textTransform:"uppercase",letterSpacing:".8px",marginBottom:"3px"}),inp]);
      })
    );
    const addBtn=h("button",{class:"btn-primary",style:{border:`1.5px solid ${G}`,color:G,boxShadow:`0 0 12px ${G}55`},onclick:addManualEntry},["+ Add entry"]);
    logSection=div({},[
      txt("Log food",{fontSize:"10px",color:MUT,textTransform:"uppercase",letterSpacing:"2px",marginBottom:"10px"}),
      nameInp,macroGrid,addBtn
    ]);
  }

  const logCard=card([div({padding:"14px"},[modeToggle,logSection])]);

  // ── TODAY'S LOG LIST ──
  let logListCard=null;
  if(log.length>0){
    logListCard=card([
      txt("Today's log",{fontSize:"10px",color:MUT,textTransform:"uppercase",letterSpacing:"2px",padding:"12px 14px 8px"}),

            div({fontFamily:"'Share Tech Mono',monospace",fontSize:"10px",display:"flex",gap:"10px"},[
              txt(Math.round(e.calories||0)+" kcal",{color:G}),
              txt(Math.round(e.protein||0)+"g P",{color:PROT}),

              txt(Math.round(e.fat||0)+"g F",{color:FAT})

          ]),

// ── RENDER WORKOUT ────────────────────────────────────────────────
function renderWorkout(){
  const phase=pf(wkWeek),dl=wkWeek>0&&wkWeek%6===0,pc=PC[phase];
  const day=PROG[activeDay],isDone=wkComp.includes(activeDay);
  const pct=Math.round(calcProg(activeDay)*100);
  const exes=day.rest?[]:pex(day,phase);

  // Phase banner
  const phaseBanner=div({background:SRF,border:`1px solid ${pc}33`,borderRadius:"12px",padding:"10px 14px",marginBottom:"14px",display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:`0 0 16px ${pc}11`},[
    div({},[
      txt(`Phase ${phase+1} · ${PL[phase]}`,{fontSize:"9px",color:pc,textTransform:"uppercase",letterSpacing:"2px",marginBottom:"2px"}),
      txt(PD2[phase],{fontSize:"12px",color:MUT})
    ]),
    txt("W"+wkWeek,{fontFamily:"'Share Tech Mono',monospace",fontSize:"22px",color:pc,fontWeight:700,marginLeft:"12px",flexShrink:0})
  ]);

  // Day tabs
  const tabs=div({class:"day-tabs"},PROG.map((d,i)=>{
    const done=wkComp.includes(i),active=i===activeDay;
    const btn=h("button",{class:"day-tab",onclick:()=>{activeDay=i;openEx=-1;render()}},[d.label+(d.prime&&!active?"⚡":"")]);
    if(active){btn.style.background=pc;btn.style.color="#000";btn.style.borderColor=pc;btn.style.boxShadow=`0 0 12px ${pc}88`;btn.style.fontWeight=700;}
    else if(done){btn.style.color=G;btn.style.borderColor=G+"88";btn.style.boxShadow=`0 0 6px ${G}44`;}
    else if(d.prime){btn.style.color=WARN;btn.style.borderColor=WARN+"66";}
    return btn;
  }));

  let mainContent;
  if(day.rest){
    mainContent=div({textAlign:"center",padding:"60px 24px"},[
      txt("◑",{fontSize:"48px",marginBottom:"16px",color:MUT}),
      txt("Rest & recover",{fontSize:"18px",fontWeight:700,color:TXT,marginBottom:"8px"}),
      txt("Sleep, eat well, let the adaptation happen.",{fontSize:"14px",color:MUT,lineHeight:1.7})
    ]);
  } else {
    const nameRow=div({display:"flex",alignItems:"center",gap:"8px",marginBottom:"2px"},[
      txt(day.name,{fontSize:"20px",fontWeight:700,color:TXT}),
      day.prime?div({fontSize:"10px",background:WARND,color:WARN,padding:"2px 8px",borderRadius:"10px",border:`1px solid ${WARN}44`},["⚡ PRIME"]):null
    ].filter(Boolean));
    const phaseNote=div({background:SRF2,border:`1px solid ${BRD}`,borderRadius:"8px",padding:"8px 12px",margin:"8px 0 12px",fontSize:"12px",color:MUT,lineHeight:1.6},[day.pn[phase]]);
    const deloadNote=dl?div({background:WARND,border:`1px solid ${WARN}44`,borderRadius:"8px",padding:"8px 12px",marginBottom:"10px",fontSize:"12px",color:WARN},["Deload week — weights at 85% of last session."]):null;
    function undoWorkout(){
      // Remove from completed list
      wkComp=wkComp.filter(x=>x!==activeDay);
      sv("wk_completed",wkComp);
      // Remove the last history entry for each exercise from this day/week
      const day2=PROG[activeDay],phase2=pf(wkWeek),nh={...wkHist};
      pex(day2,phase2).forEach(exO=>{
        const ei=day2.exercises.indexOf(exO),hk=`d${activeDay}_e${ei}`;
        if(nh[hk]&&nh[hk].length>0){
          const last=nh[hk][nh[hk].length-1];
          if(last.week===wkWeek||last.date===td()){
            nh[hk]=nh[hk].slice(0,-1);
          }
        }
      });
      wkHist=nh;sv("wk_history",wkHist);
      render();
    }
    const progressEl=isDone?
      div({background:OKD,border:`1px solid ${G}66`,borderRadius:"10px",padding:"12px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"},[
        div({display:"flex",alignItems:"center",gap:"10px"},[
          txt("✓",{fontSize:"20px",color:G}),
          div({},[txt("Session complete",{fontSize:"14px",fontWeight:700,color:G}),txt(pct+"% of sets logged",{fontSize:"12px",color:MUT})])
        ]),
        h("button",{style:{padding:"6px 12px",background:"transparent",border:`1px solid ${G}44`,borderRadius:"8px",color:G,fontSize:"11px",fontFamily:"'Exo 2',sans-serif",cursor:"pointer"},onclick:undoWorkout},["Undo"])
      ]):
      div({marginBottom:"2px"},[
        div({class:"neon-bar-wrap"},[
          div({class:"neon-bar-fill",id:"wk-progress-bar",style:{width:pct+"%",background:pc,boxShadow:`0 0 6px ${pc}`}})
        ])
      ]);

    const exCards=exes.map(exO=>{
      const ei=day.exercises.indexOf(exO);
      const ep=exO.phases[phase],sets=getSets(activeDay,ei);
      const allDone=sets.length>0&&sets.every(s=>s.done),isOpen=openEx===ei;
      const sw=getSug(activeDay,ei),last=getLast(activeDay,ei),hitTop=last&&last.reps>=ep.rr[1];

      const numEl=h("div",{class:"ex-num",id:`ex-num-${activeDay}-${ei}`});
      if(allDone){numEl.style.borderColor=G+"66";numEl.style.background=OKD;numEl.style.color=G;numEl.innerHTML="✓";}
      else numEl.textContent=ei+1;

      const pillEl=sw!==null?h("span",{style:{fontSize:"10px",padding:"1px 7px",borderRadius:"10px",fontFamily:"'Share Tech Mono',monospace",background:hitTop&&!dl?GD:SRF2,color:hitTop&&!dl?G:DIM,border:`1px solid ${hitTop&&!dl?G+"44":BRD}`}},[(dl?"deload":hitTop?`+${exO.inc}lb`:"same")]):null;

      const hdr=div({class:"ex-header",onclick:()=>{openEx=isOpen?-1:ei;render()}},[
        numEl,
        div({flex:1,minWidth:0},[
          txt(exO.name,{fontSize:"13px",fontWeight:600,color:TXT,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}),
          div({fontSize:"11px",color:MUT,marginTop:"1px",display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap"},[
            document.createTextNode(`${ep.sets}×${ep.rr[0]}-${ep.rr[1]} · RPE ${ep.rpe}`),
            pillEl
          ].filter(Boolean))
        ]),
        txt("⌄",{color:DIM,fontSize:"14px",transition:"transform .2s",transform:isOpen?"rotate(180deg)":"none"})
      ]);

      const card2=div({class:"ex-card",id:`ex-card-${activeDay}-${ei}`});
      if(allDone){card2.style.border=`1px solid ${G}66`;}
      card2.appendChild(hdr);

      if(isOpen){
        const bodyEl=div({class:"ex-body"});
        if(exO.note)bodyEl.appendChild(div({background:SRF2,borderRadius:"8px",padding:"8px 10px",margin:"10px 0 8px",fontSize:"11px",color:MUT,lineHeight:1.6},["💡 "+exO.note]));
        if(sw!==null)bodyEl.appendChild(div({display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${BRD}`,marginBottom:"8px"},[
          txt("Suggested weight",{fontSize:"12px",color:MUT}),
          txt(sw+" lbs",{fontFamily:"'Share Tech Mono',monospace",fontSize:"13px",color:G})
        ]));
        bodyEl.appendChild(div({display:"grid",gridTemplateColumns:"28px 1fr 1fr 40px",gap:"6px",padding:"4px 0"},
          ["Set","Weight","Reps","✓"].map(lbl=>txt(lbl,{fontSize:"9px",color:DIM,textAlign:"center",textTransform:"uppercase",letterSpacing:".5px"}))
        ));
        sets.forEach((s,si)=>{
          const wInp=h("input",{type:"number",inputmode:"decimal",placeholder:"lbs",class:"set-inp",value:s.weight});
          wInp.addEventListener("input",e=>{updSet(activeDay,ei,si,"weight",e.target.value)});
          wInp.addEventListener("blur",e=>{updSet(activeDay,ei,si,"weight",e.target.value)});
          const rInp=h("input",{type:"number",inputmode:"numeric",placeholder:String(ep.rr[0]),class:"set-inp",value:s.reps});
          if(s.reps&&parseInt(s.reps)>=ep.rr[1])rInp.style.borderColor=G;
          rInp.addEventListener("input",e=>{
            updSet(activeDay,ei,si,"reps",e.target.value);
            rInp.style.borderColor=e.target.value&&parseInt(e.target.value)>=ep.rr[1]?G:BRD;
          });
          rInp.addEventListener("blur",e=>{updSet(activeDay,ei,si,"reps",e.target.value)});
          const ckBtn=h("button",{class:"set-ck",id:`ck-${activeDay}-${ei}-${si}`,onclick:()=>tglSet(activeDay,ei,si)},["✓"]);
          if(s.done){ckBtn.style.border=`1px solid ${G}`;ckBtn.style.background=OKD;ckBtn.style.color=G;}
          bodyEl.appendChild(div({class:"set-row"},[
            txt(si+1,{fontFamily:"'Share Tech Mono',monospace",fontSize:"11px",color:DIM,textAlign:"center"}),
            wInp,rInp,ckBtn
          ]));
        });
        bodyEl.appendChild(h("button",{style:{width:"100%",padding:"8px",background:"transparent",border:`1px dashed ${BRD}`,borderRadius:"8px",color:MUT,fontSize:"12px",fontFamily:"'Exo 2',sans-serif",cursor:"pointer",marginTop:"4px"},onclick:()=>addSet(activeDay,ei)},["+ Add set"]));
        card2.appendChild(bodyEl);
      }
      return card2;
    });

    const finishBtn=!isDone?h("button",{class:"btn-primary",style:{border:`1.5px solid ${pc}`,color:pc,boxShadow:`0 0 12px ${pc}55`,marginTop:"4px"},onclick:finishWorkout},["Finish session"]):null;

    mainContent=div({},[
      div({marginBottom:"14px"},[nameRow,txt(day.focus,{fontSize:"12px",color:MUT}),phaseNote,deloadNote,progressEl].filter(Boolean)),
      ...exCards,
      finishBtn
    ].filter(Boolean));
  }

  const content=document.getElementById("content");
  content.innerHTML="";
  content.appendChild(div({padding:"16px 16px 88px"},[phaseBanner,tabs,mainContent]));
}

// ── RENDER PROGRESS ───────────────────────────────────────────────
let progEx=null; // which exercise is expanded in progress tab

function renderProgress(){
  const phase=pf(wkWeek),byEx={};
  PROG.forEach((day,di)=>day.exercises.forEach((exO,ei)=>{
    const h2=wkHist[`d${di}_e${ei}`]||[];
    if(h2.length){if(!byEx[exO.name])byEx[exO.name]=[];byEx[exO.name].push(...h2);}
  }));
  const exes=Object.keys(byEx);
  const content=document.getElementById("content");
  content.innerHTML="";
  if(!exes.length){
    content.appendChild(div({padding:"32px",textAlign:"center"},[
      txt("◎",{fontSize:"40px",marginBottom:"12px",color:P}),
      txt("No data yet",{fontSize:"16px",fontWeight:700,color:TXT,marginBottom:"8px"}),
      txt("Complete your first session to see your history here.",{fontSize:"14px",color:MUT,lineHeight:1.7})
    ]));return;
  }

  const items=exes.map(name=>{
    const sessions=byEx[name];
    const isOpen=progEx===name;

    // Get top weight per session for sparkline
    const topWeights=sessions.map(s=>s.sets?Math.max(...s.sets.map(x=>x.weight)):s.weight||0);
    const firstTop=topWeights[0],lastTop=topWeights[topWeights.length-1];
    const gained=Math.round((lastTop-firstTop)*10)/10;
    const maxW=Math.max(...topWeights);

    // Latest session sets
    const latest=sessions[sessions.length-1];
    const latestSets=latest.sets||[];

    const sparkline=sessions.length>1?div({display:"flex",alignItems:"flex-end",gap:"3px",height:"28px",marginBottom:isOpen?"10px":"0"},
      topWeights.map((w,i)=>{
        const ht=maxW>0?Math.max(w/maxW*28,3):3,isLast=i===topWeights.length-1;
        return div({flex:1,height:ht+"px",borderRadius:"2px",background:isLast?G:BRD,
          boxShadow:isLast?`0 0 6px ${G}`:"none",title:`Wk${sessions[i].week||i+1}: ${w}lbs`});
      })
    ):null;

    // Summary row
    const summaryRow=div({display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"8px",cursor:"pointer",padding:"14px 14px 0"},[ 
      div({flex:1,paddingRight:"12px"},[
        txt(name,{fontSize:"13px",fontWeight:600,color:TXT,marginBottom:"3px"}),
        div({fontSize:"10px",color:MUT,fontFamily:"'Share Tech Mono',monospace",display:"flex",gap:"10px"},[
          txt(sessions.length+" session"+(sessions.length!==1?"s":""),{color:MUT}),
          gained>0?txt("↑ +"+gained+"lb all-time",{color:G}):null,
          gained<0?txt("↓ "+gained+"lb",{color:PROT}):null,
          gained===0&&sessions.length>1?txt("holding",{color:DIM}):null
        ].filter(Boolean))
      ]),
      div({textAlign:"right"},[
        txt(lastTop+"lbs",{fontFamily:"'Share Tech Mono',monospace",fontSize:"16px",color:G,marginBottom:"2px"}),
        txt("latest top set",{fontSize:"9px",color:DIM,textTransform:"uppercase",letterSpacing:".5px"})
      ])
    ]);
    summaryRow.addEventListener("click",()=>{progEx=isOpen?null:name;renderProgress();});

    const cardEl=div({class:"card",style:{marginBottom:"10px"}});
    cardEl.appendChild(summaryRow);
    if(sparkline)cardEl.appendChild(div({padding:"0 14px 10px"},[sparkline]));

    if(isOpen){
      // Full session history, most recent first
      const histSection=div({borderTop:`1px solid ${BRD}`});
      [...sessions].reverse().forEach((session,idx)=>{
        const sets=session.sets||[];
        const sessionTop=sets.length?Math.max(...sets.map(s=>s.weight)):0;
        const sessionHeader=div({display:"flex",justifyContent:"space-between",alignItems:"center",
          padding:"10px 14px 6px",borderBottom:`1px solid ${BRD}`},[
          div({},[
            txt((session.date||`Week ${session.week}`),{fontSize:"12px",fontWeight:600,color:TXT}),
            txt(`Week ${session.week||"—"} · ${sets.length} set${sets.length!==1?"s":""}`,{fontSize:"10px",color:MUT,marginTop:"1px"})
          ]),
          txt(sessionTop+"lbs top",{fontFamily:"'Share Tech Mono',monospace",fontSize:"12px",color:G})
        ]);
        histSection.appendChild(sessionHeader);
        // Sets grid
        const setsGrid=div({padding:"6px 14px 10px"});
        // Column headers
        setsGrid.appendChild(div({display:"grid",gridTemplateColumns:"32px 1fr 1fr 1fr",gap:"6px",marginBottom:"4px"},[
          txt("Set",{fontSize:"9px",color:DIM,textTransform:"uppercase",letterSpacing:".5px"}),
          txt("Weight",{fontSize:"9px",color:DIM,textTransform:"uppercase",letterSpacing:".5px",textAlign:"center"}),
          txt("Reps",{fontSize:"9px",color:DIM,textTransform:"uppercase",letterSpacing:".5px",textAlign:"center"}),
          txt("Vol",{fontSize:"9px",color:DIM,textTransform:"uppercase",letterSpacing:".5px",textAlign:"center"})
        ]));
        sets.forEach((s,si)=>{
          const vol=Math.round(s.weight*s.reps);
          setsGrid.appendChild(div({display:"grid",gridTemplateColumns:"32px 1fr 1fr 1fr",gap:"6px",marginBottom:"4px",alignItems:"center"},[
            txt(si+1,{fontFamily:"'Share Tech Mono',monospace",fontSize:"11px",color:DIM}),
            txt(s.weight+"lbs",{fontFamily:"'Share Tech Mono',monospace",fontSize:"12px",color:TXT,textAlign:"center"}),
            txt(s.reps+" reps",{fontFamily:"'Share Tech Mono',monospace",fontSize:"12px",color:CARB,textAlign:"center"}),
            txt(vol,{fontFamily:"'Share Tech Mono',monospace",fontSize:"11px",color:MUT,textAlign:"center"})
          ]));
        });
        histSection.appendChild(setsGrid);
      });
      cardEl.appendChild(histSection);
    }

    return cardEl;
  });

  const phaseBanner=div({background:SRF,border:`1px solid ${PC[phase]}33`,borderRadius:"12px",padding:"10px 14px",marginBottom:"16px"},[
    txt(`Phase ${phase+1} · ${PL[phase]}`,{fontSize:"9px",color:PC[phase],textTransform:"uppercase",letterSpacing:"2px",marginBottom:"2px"}),
    txt(`Week ${wkWeek} · ${exes.length} exercises tracked`,{fontSize:"12px",color:MUT})
  ]);
  content.appendChild(div({padding:"16px 16px 88px"},[phaseBanner,...items]));
}

// ── RENDER NAV ────────────────────────────────────────────────────
function renderNav(){
  const tabs=[{id:"dashboard",label:"Today",icon:"◈"},{id:"nutrition",label:"Nutrition",icon:"◉"},{id:"workout",label:"Training",icon:"⊕"},{id:"progress",label:"Progress",icon:"◎"}];
  const nav=document.getElementById("nav");
  nav.innerHTML="";
  tabs.forEach(t=>{
    const active=activeTab===t.id;
    const btn=document.createElement("button");
    btn.className="nav-btn";
    if(active){const dot=document.createElement("div");dot.className="nav-dot";btn.appendChild(dot);}
    const ico=document.createElement("div");ico.className="nav-icon";ico.textContent=t.icon;ico.style.color=active?G:DIM;
    const lbl=document.createElement("div");lbl.className="nav-label";lbl.textContent=t.label;lbl.style.color=active?G:DIM;lbl.style.fontWeight=active?"700":"400";
    btn.appendChild(ico);btn.appendChild(lbl);
    btn.addEventListener("click",()=>{activeTab=t.id;render();});
    nav.appendChild(btn);
  });
}

// ── RENDER HEADER ─────────────────────────────────────────────────
function renderHeader(){
  document.getElementById("hdr-date").textContent=new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
  document.getElementById("hdr-stats").textContent=`${profile.weight}lb · ${profile.calories}kcal`;
}

// ── MAIN RENDER ───────────────────────────────────────────────────
function render(){
  renderHeader();
  renderNav();
  if(activeTab==="dashboard")renderDashboard();
  else if(activeTab==="nutrition")renderNutrition();
  else if(activeTab==="workout")renderWorkout();
  else if(activeTab==="progress")renderProgress();
}

render();
</script>
