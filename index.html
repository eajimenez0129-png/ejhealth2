<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="EJ"/>
<meta name="theme-color" content="#000000"/>
<title>EJ · Daily practice.</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
/* ── 2B: Dark Slate · Space Grotesk · #0B1D2E ── */
:root{
  --bg:#0B1D2E;
  --bg2:#0f2540;
  --bg3:#122a45;
  --brd:#163350;
  --brd2:#1a3a55;
  --txt:#ffffff;
  --muted:#4a7090;
  --dim:#1e3a55;
  --teal:#00C9B1;
  --teal-dim:#002e28;
  --teal-bg:#00C9B115;
  --warn:#e07050;
  --warn-dim:#2a1000;
  --prot:#e05570;
  --carb:#e0a030;
  --fat:#60b0d0;
  --fib:#70b080;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--txt);font-family:'Space Grotesk',sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none;height:100%}
::-webkit-scrollbar{width:0;height:0}
input,button,select,textarea{font-family:'Space Grotesk',sans-serif;color:var(--txt)}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
button{cursor:pointer}
.app{max-width:390px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative}
.hdr{padding:14px 16px 12px;border-bottom:1px solid var(--brd);display:flex;justify-content:space-between;align-items:center;background:var(--bg);position:sticky;top:0;z-index:100}
.neon-line{height:1px;background:linear-gradient(90deg,transparent,var(--teal),transparent);opacity:.4}
.content{overflow-y:auto;-webkit-overflow-scrolling:touch}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;background:rgba(11,29,46,.96);border-top:1px solid var(--brd);display:flex;padding:10px 0;z-index:100;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.nav-btn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;position:relative}
.nav-dot{position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:20px;height:1px;background:var(--teal);border-radius:1px}
.card{background:var(--bg2);border:1px solid var(--brd);border-radius:14px;overflow:hidden;margin-bottom:12px}
.inp{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--brd);border-radius:8px;color:var(--txt);font-size:15px;outline:none;font-family:'Space Grotesk',sans-serif}
.inp:focus{border-color:var(--teal)}
.nbw{height:2px;background:var(--brd);border-radius:1px;overflow:hidden}
.nbf{height:2px;border-radius:1px;transition:width .4s}
.day-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;scrollbar-width:none}
.ex-card{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;margin-bottom:8px;overflow:hidden}
.ex-hdr{display:flex;align-items:center;gap:11px;padding:12px 14px;cursor:pointer;user-select:none;-webkit-user-select:none}
.ex-num{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);flex-shrink:0}
.ex-body{padding:0 14px 12px;border-top:1px solid var(--brd)}
.set-row{display:grid;grid-template-columns:24px 1fr 1fr 44px;gap:6px;margin-bottom:6px;align-items:center}
.sinp{height:44px;border:1px solid var(--brd);border-radius:8px;text-align:center;font-size:17px;color:var(--txt);background:var(--bg3);width:100%;outline:none;font-family:'Space Grotesk',sans-serif;-webkit-appearance:none}
.sinp:focus{border-color:var(--teal);background:#0a1e30}
.sck{height:44px;width:44px;border-radius:8px;border:1px solid var(--brd);background:var(--bg3);color:var(--dim);font-size:17px}
.goal-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-top:1px solid var(--brd);cursor:pointer}
.safe-top{padding-top:env(safe-area-inset-top,0px)}
.safe-bottom{padding-bottom:calc(env(safe-area-inset-bottom,0px) + 8px)}
.sr-item{padding:10px 14px;border-bottom:1px solid var(--brd);cursor:pointer}
.sr-item:last-child{border-bottom:none}
.sr-item:active{background:var(--bg3)}
.mp-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px}
.mp-item{background:var(--bg);border-radius:8px;padding:8px 2px;text-align:center;border:1px solid var(--brd)}
.ptabs{display:flex;gap:6px;margin-bottom:10px}
.ptab{flex:1;padding:7px 0;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;text-align:center;border:1px solid var(--brd);background:transparent;color:var(--muted);font-family:'Space Grotesk',sans-serif}
.ptab.on{background:var(--teal-bg);border-color:var(--teal);color:var(--teal)}
.sect{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.8px;margin-bottom:8px;font-family:'Space Mono',monospace}
.scan-btn{display:flex;align-items:center;gap:6px;padding:10px 14px;background:transparent;border:1px solid var(--teal);border-radius:9px;color:var(--teal);font-size:13px;font-weight:600;font-family:'Space Grotesk',sans-serif;cursor:pointer}
</style>
</head>
<body>
<div class="app">
  <div class="hdr safe-top">
    <div>
      <div style="font-size:20px;font-weight:700;letter-spacing:-.4px;font-family:'Space Grotesk',sans-serif">EJ<span style="color:#00C9B1">.</span></div>
      <div style="font-size:10px;color:#4a7090;margin-top:2px;letter-spacing:1.8px;text-transform:uppercase;font-family:'Space Mono',monospace">Daily practice.</div>
    </div>
    <div style="text-align:right;font-family:'Space Mono',monospace;font-size:10px;color:#7aaabb">
      <div id="hdr-date"></div>
      <div id="hdr-stats" style="font-size:9px;color:#4a7090;margin-top:1px"></div>
    </div>
  </div>
  <div class="neon-line"></div>
  <div class="content" id="content" style="padding-bottom:80px"></div>
  <nav class="nav safe-bottom" id="nav"></nav>
</div>
<script>
// ── COLORS — Option 2B Dark Slate ───────────────────────────────────
const G="#00C9B1",P="#00C9B1",GD="#002e28",PD="#002e28";
const PROT="#e05570",CARB="#e0a030",FAT="#60b0d0",FIB="#70b080";
const SRF="#0f2540",SRF2="#122a45",BRD="#163350",TXT="#ffffff",MUT="#7aaabb",DIM="#3a6070";
const WARN="#e07050",WARND="#2a1000",OKD="#002e28";
const PC=["#00C9B1","#60b0d0","#70b080"];
const FIBER_TARGET=25;

// ── STORAGE ─────────────────────────────────────────────────────────
const ld=(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb}catch{return fb}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};
const td=()=>{
  const d=new Date();
  const yr=d.getFullYear();
  const mo=String(d.getMonth()+1).padStart(2,"0");
  const dy=String(d.getDate()).padStart(2,"0");
  return `${yr}-${mo}-${dy}`;
};

// ── PROFILE ─────────────────────────────────────────────────────────
const INIT={weight:138,bodyFat:23.5,calories:1850,protein:145,carbs:175,fat:55,waterOz:94,tdee:2100};
let profile=ld("user_profile",null)||INIT;
function saveProfile(p){profile=p;sv("user_profile",p);renderHeader()}
function calcMacros(w,bf,cal){
  const lbm=w*(1-bf/100),pr=Math.round(lbm*1.05),fa=Math.round(cal*.27/9);
  return{protein:pr,fat:fa,carbs:Math.max(Math.round((cal-pr*4-fa*9)/4),80),waterOz:Math.round(w*.68)};
}
function estTDEE(w,bf){return Math.round((370+21.6*(w*(1-bf/100)*.453592))*1.25)}

// ── PROGRAM ─────────────────────────────────────────────────────────
const PL=["Reactivation","Accumulation","Development"];
const PD2=["Wks 1–2 · Light loads, movement patterns, zero soreness spirals.","Wks 3–4 · Volume builds, intensity climbs carefully.","Wks 5–6+ · Full program. Progressive overload in effect."];
const pf=w=>w<=2?0:w<=4?1:2;
const ex=(name,p0s,p0r,p1s,p1r,p2s,p2r,rpe,inc,note="")=>({name,phases:[{sets:p0s,rr:p0r,rpe:Math.max(rpe-2,5)},{sets:p1s,rr:p1r,rpe:Math.max(rpe-1,6)},{sets:p2s,rr:p2r,rpe}],inc,note});
// ── PROGRAM — slot-based with exercise pick lists ─────────────────
// Each slot has a muscle target + list of equipment-variable options
// Progressive overload is tracked per exercise name across all slots
const EXLIB={
  // Push
  "Chest Press":[
    {name:"Barbell bench press",       inc:5,  note:"Elbows 45° — protects cuff. Keep right arm controlled."},
    {name:"Dumbbell flat press",        inc:2.5,note:"Neutral grip option available — easier on right shoulder."},
    {name:"Landmine press",             inc:2.5,note:"Cuff-safe angle. Brace elbow into body at bottom."},
    {name:"Machine chest press",        inc:5,  note:"Fixed path — good for shoulder stability."},
    {name:"Push-up (weighted)",         inc:2.5,note:"Elevate feet to increase difficulty."},
  ],
  "Incline Press":[
    {name:"Incline dumbbell press",     inc:2.5,note:"30–45° incline. Neutral grip protects shoulder."},
    {name:"Incline barbell press",      inc:5,  note:"Spot recommended. Keep right arm path controlled."},
    {name:"Incline cable fly",          inc:2.5,note:"Low anchor for safe shoulder arc."},
    {name:"Incline machine press",      inc:5,  note:"Fixed path — good when shoulder is aggravated."},
  ],
  "Lateral Delts":[
    {name:"Cable lateral raise",        inc:2.5,note:"Arm forward 15° removes impingement risk."},
    {name:"Dumbbell lateral raise",     inc:2.5,note:"Lead with elbow, light weight."},
    {name:"Machine lateral raise",      inc:2.5,note:"Most shoulder-safe option."},
    {name:"Band lateral raise",         inc:0,  note:"Easiest on the cuff. Good for warm-up sets."},
  ],
  "Triceps":[
    {name:"Tricep rope pushdown",       inc:2.5,note:"Elbows pinned to sides throughout."},
    {name:"Tricep bar pushdown",        inc:2.5,note:"Overhand grip — more lateral head."},
    {name:"Overhead tricep extension",  inc:2.5,note:"Skip if shoulder is aggravated."},
    {name:"Close-grip bench press",     inc:5,  note:"Elbows tucked, shoulder-safe."},
    {name:"Skull crusher",              inc:2.5,note:"EZ bar reduces wrist strain."},
  ],
  // Pull
  "Horizontal Row":[
    {name:"Barbell row (neutral grip)", inc:5,  note:"Neutral grip reduces shoulder internal rotation."},
    {name:"Dumbbell row",               inc:2.5,note:"Supported — great for right shoulder stability."},
    {name:"Seated cable row",           inc:5,  note:"Drive elbows straight back. Squeeze at peak."},
    {name:"Machine row",                inc:5,  note:"Fixed path — safest for shoulder."},
    {name:"TRX/Ring row",               inc:0,  note:"Bodyweight — adjust difficulty by foot position."},
  ],
  "Vertical Pull":[
    {name:"Lat pulldown (neutral grip)",inc:5,  note:"Close neutral grip — full lat stretch, no shoulder risk."},
    {name:"Assisted pull-up",           inc:2.5,note:"Pronated grip. Control the descent."},
    {name:"Cable straight-arm pulldown",inc:2.5,note:"Isolates lats without bicep."},
    {name:"Single-arm lat pulldown",    inc:2.5,note:"Allows each side to work independently."},
  ],
  "Rear Delts / External Rotation":[
    {name:"Face pull",                  inc:2.5,note:"External rotation focus. Rehab and priming in one."},
    {name:"Rear delt fly (dumbbell)",   inc:2.5,note:"Prone or bent over. Light weight, squeeze."},
    {name:"Cable rear delt fly",        inc:2.5,note:"Cross-cable or single. Full contraction."},
    {name:"Band pull-apart",            inc:0,  note:"Essential cuff health. Slow and controlled."},
  ],
  "Biceps":[
    {name:"EZ bar curl",                inc:2.5,note:"Reduces wrist strain vs straight bar."},
    {name:"Dumbbell curl",              inc:2.5,note:"Supinate at top for full contraction."},
    {name:"Hammer curl",                inc:2.5,note:"Brachialis and brachioradialis emphasis."},
    {name:"Cable curl",                 inc:2.5,note:"Constant tension throughout the range."},
    {name:"Incline dumbbell curl",      inc:2.5,note:"Full stretch at bottom — great for hypertrophy."},
  ],
  // Legs A
  "Quad Dominant":[
    {name:"Goblet squat",               inc:5,  note:"Weeks 1–2: this IS your main leg movement."},
    {name:"Barbell back squat",         inc:5,  note:"Week 3+. Use safety bar if available."},
    {name:"Leg press",                  inc:10, note:"Feet high and wide — quad + glute emphasis."},
    {name:"Hack squat",                 inc:10, note:"Machine version — knees stay safe."},
    {name:"Bulgarian split squat",      inc:5,  note:"Week 5+. 2 sets each leg to start."},
  ],
  "Knee Extension":[
    {name:"Leg extension",              inc:5,  note:"Full range. Squeeze at top."},
    {name:"Spanish squat (band)",       inc:0,  note:"Bodyweight. Knee-over-toe focus."},
  ],
  "Calves":[
    {name:"Standing calf raise (machine)",inc:5,note:"Full range — deep stretch at bottom."},
    {name:"Leg press calf raise",       inc:10, note:"On the leg press platform."},
    {name:"Seated calf raise",          inc:2.5,note:"Soleus emphasis (bent knee)."},
    {name:"Dumbbell standing calf raise",inc:2.5,note:"Single leg for balance challenge."},
  ],
  // Legs B
  "Hip Hinge":[
    {name:"Romanian deadlift",          inc:5,  note:"Hip hinge: soft knees, push hips back, bar stays close."},
    {name:"Dumbbell RDL",               inc:2.5,note:"Same pattern, easier to control."},
    {name:"Good morning",               inc:5,  note:"Bar on back, hinge forward. Light weight."},
    {name:"Cable pull-through",         inc:5,  note:"Cuff-safe hinge. Great hip drive."},
  ],
  "Hip Thrust / Glute":[
    {name:"Hip thrust (barbell)",       inc:10, note:"Drive through heels. Squeeze glutes at top."},
    {name:"Hip thrust (dumbbell)",      inc:5,  note:"Lighter setup — same mechanics."},
    {name:"Glute bridge",               inc:5,  note:"On the floor. Weeks 1–2 use bodyweight."},
    {name:"Cable kickback",             inc:2.5,note:"Single leg. Keep spine neutral."},
  ],
  "Hamstring Curl":[
    {name:"Lying leg curl",             inc:5,  note:"Full range. Control the eccentric."},
    {name:"Seated leg curl",            inc:5,  note:"Hip flexed — longer hamstring length."},
    {name:"Nordic curl",                inc:0,  note:"Advanced. Use with pad under knees."},
    {name:"Stability ball leg curl",    inc:0,  note:"Bodyweight. Good when machines unavailable."},
  ],
  // Upper hypertrophy / Prime slots
  "Chest Fly":[
    {name:"Cable fly (low anchor)",     inc:2.5,note:"Anchor below hip — shoulder arc safe."},
    {name:"Pec deck",                   inc:2.5,note:"Fixed arc — very shoulder safe."},
    {name:"Dumbbell fly",               inc:2.5,note:"Light weight. Don't go too wide."},
  ],
  "Upper Back / Mid Trap":[
    {name:"Cable face pull",            inc:2.5,note:"External rotation. Never skip."},
    {name:"Band pull-apart",            inc:0,  note:"High rep. Great for shoulder health."},
    {name:"Prone Y/T/W raises",         inc:0,  note:"Bodyweight. Scapular stability."},
  ],
};

// Build slot-based program
// Each slot: {target, rr, rpe, sets per phase, inc — from selected exercise}
function mkSlot(target,p0s,p0r,p1s,p1r,p2s,p2r,rpe){
  return{target,phases:[
    {sets:p0s,rr:p0r,rpe:Math.max(rpe-2,5)},
    {sets:p1s,rr:p1r,rpe:Math.max(rpe-1,6)},
    {sets:p2s,rr:p2r,rpe}
  ]};
}

const PROG=[
  // DAY 0: MON — Push (Chest, Shoulders, Triceps) ~65–75 min
  {label:"MON",name:"Push",focus:"Chest · Shoulders · Triceps",rest:false,prime:false,
   pn:["Wks 1–2: 2 sets each. Stop 3 reps short of failure. Learn the movements.","Wks 3–4: 3 sets. Push closer to RPE targets.","Wks 5–6+: Full volume. Chase progressive overload."],
   slots:[
     mkSlot("Chest Press",   2,[10,12],3,[10,12],4,[8,10], 8),
     mkSlot("Incline Press", 2,[10,12],3,[10,12],3,[8,10], 8),
     mkSlot("Chest Fly",     2,[12,15],3,[12,15],3,[12,15],8),
     mkSlot("Lateral Delts", 2,[15,20],3,[15,20],4,[12,15],9),
     mkSlot("Triceps",       2,[12,15],3,[12,15],4,[12,15],8),
   ]},

  // DAY 1: TUE — Rest
  {label:"TUE",name:"Rest",focus:"",rest:true,prime:false,slots:[]},

  // DAY 2: WED — Pull (Back, Biceps, Rear Delts) ~65–75 min
  {label:"WED",name:"Pull",focus:"Back · Biceps · Rear Delts",rest:false,prime:false,
   pn:["Wks 1–2: 2 sets. Focus on feeling the right muscles, not just moving weight.","Wks 3–4: Volume increases. Start chasing RPE.","Wks 5–6+: Full program. Back should be noticeably stronger."],
   slots:[
     mkSlot("Vertical Pull",         2,[8,10], 3,[8,10], 4,[6,8],  8),
     mkSlot("Horizontal Row",        2,[8,10], 3,[8,10], 4,[6,8],  8),
     mkSlot("Rear Delts / External Rotation",2,[15,20],3,[15,20],3,[15,20],9),
     mkSlot("Upper Back / Mid Trap", 2,[15,20],3,[15,20],3,[15,20],8),
     mkSlot("Biceps",                2,[10,12],3,[10,12],3,[10,12], 8),
   ]},

  // DAY 3: THU — Rest
  {label:"THU",name:"Rest",focus:"",rest:true,prime:false,slots:[]},

  // DAY 4: FRI — Legs (Quad + Posterior Chain) ~70–80 min
  {label:"FRI",name:"Legs",focus:"Quads · Hamstrings · Glutes · Calves",rest:false,prime:false,
   pn:["Wks 1–2: Goblet squat + bodyweight hip thrust only. 2 sets. Stop well short of failure — you will be sore.","Wks 3–4: Volume steps up. Leg press and loaded hip thrust enter.","Wks 5–6+: Full program. Bulgarian split squat enters at 2 sets."],
   slots:[
     mkSlot("Quad Dominant",      2,[10,12],3,[10,12],4,[8,10], 7),
     mkSlot("Hip Hinge",          2,[10,12],3,[10,12],4,[8,10], 8),
     mkSlot("Hip Thrust / Glute", 2,[12,15],3,[12,15],3,[12,15],8),
     mkSlot("Hamstring Curl",     2,[12,15],3,[12,15],4,[10,12],8),
     mkSlot("Knee Extension",     2,[15,20],3,[15,20],3,[15,20],9),
     mkSlot("Calves",             2,[15,20],3,[15,20],4,[15,20],9),
   ]},

  // DAY 5: SAT — Rest
  {label:"SAT",name:"Rest",focus:"",rest:true,prime:false,slots:[]},

  // DAY 6: SAT — Full Body (Upper + Lower integration) ~70–80 min
  // Note: label shows as second SAT but displays as the 6th day slot
  {label:"SUN",name:"Full Body",focus:"Upper · Lower · Core balance",rest:false,prime:false,
   pn:["Wks 1–2: 2 sets each. Think of this as movement practice — everything light.","Wks 3–4: 3 sets. Treat this as a real training day now.","Wks 5–6+: Full volume. This is where your week's work comes together."],
   slots:[
     mkSlot("Chest Press",    2,[10,12],3,[10,12],3,[10,12],8),
     mkSlot("Horizontal Row", 2,[10,12],3,[10,12],3,[10,12],8),
     mkSlot("Quad Dominant",  2,[10,12],3,[10,12],3,[10,12],8),
     mkSlot("Hip Hinge",      2,[10,12],3,[10,12],3,[10,12],8),
     mkSlot("Lateral Delts",  2,[15,20],3,[15,20],3,[15,20],9),
     mkSlot("Biceps",         2,[12,15],3,[12,15],3,[12,15],8),
   ]}
];

// Selected exercise per slot — persisted so it survives tab switches
// key: "sel_d{di}_s{si}" → exercise name
function getSelEx(di,si){
  const k=`sel_d${di}_s${si}`;
  const saved=ld(k,"");
  const day=PROG[di];
  if(!day.slots||!day.slots[si])return null;
  const target=day.slots[si].target;
  const opts=EXLIB[target]||[];
  if(saved&&opts.find(e=>e.name===saved))return opts.find(e=>e.name===saved);
  return opts[0]||null; // default to first option
}
function setSelEx(di,si,name){sv(`sel_d${di}_s${si}`,name);}

// Compatibility shim — treat slots as exercises for history/logging
function slotExIdx(di,si){return si;} // slot index == exercise index for storage
function getSlotHistory(di,si){
  // History keyed by exercise NAME not slot, so switching equipment preserves separate histories
  const exName=getSelEx(di,si)?.name;
  if(!exName)return[];
  return (wkHist[`ex_${exName}`]||[]);
}
function getSlotTopSet(di,si){
  const h=getSlotHistory(di,si);
  if(!h.length)return null;
  const last=h[h.length-1];
  if(!last.sets||!last.sets.length)return null;
  return last.sets.reduce((a,s)=>s.weight>a.weight?s:a,last.sets[0]);
}
function getSlotSuggest(di,si){
  const day=PROG[di];if(!day.slots||!day.slots[si])return null;
  const phase=pf(wkWeek),dl=wkWeek%6===0&&wkWeek>0;
  const slot=day.slots[si],ep=slot.phases[phase];
  const exObj=getSelEx(di,si);if(!exObj)return null;
  const top=getSlotTopSet(di,si);if(!top)return null;
  if(dl)return Math.round(top.weight*.85*4)/4;
  const last=getSlotHistory(di,si);
  const allHit=last.length&&last[last.length-1].sets&&last[last.length-1].sets.every(s=>s.reps>=ep.rr[1]);
  return allHit?top.weight+exObj.inc:top.weight;
}
function getSlotSets(di,si){
  const k=`d${di}_s${si}_w${wkWeek}`;
  if(!wkSets[k]){
    const day=PROG[di];if(!day.slots||!day.slots[si])return[];
    const ep=day.slots[si].phases[pf(wkWeek)];
    if(ep.sets===0)return[];
    const sw=getSlotSuggest(di,si);
    wkSets[k]=Array.from({length:ep.sets},()=>({weight:sw?String(sw):"",reps:"",done:false}));
    sv("wk_setdata",wkSets);
  }
  return wkSets[k];
}
function updSlotSet(di,si,setIdx,field,val){
  const k=`d${di}_s${si}_w${wkWeek}`;
  getSlotSets(di,si);
  wkSets[k][setIdx][field]=String(val);
  sv("wk_setdata",wkSets);
}
function tglSlotDone(di,si,setIdx,domDay){

function calcProgSlots(di){

async function lookupBarcode(code){
  try{
    const r=await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    const d=await r.json();
    if(d.status!==1||!d.product)return null;
    const p=d.product;
    const n=p.nutriments||{};
    // Build serving from product data if available
    const servings=[];
    if(p.serving_size&&p.serving_quantity){
      servings.push({disseminationText:p.serving_size,gramWeight:parseFloat(p.serving_quantity)||null});
    }
    return{
      fdcId:"off_"+code,
      name:(p.product_name||p.generic_name||"Scanned product").trim(),
      servings,
      foodNutrients:[
        {nutrientId:1008,value:parseFloat(n["energy-kcal_100g"])||parseFloat(n["energy_100g"])/4.184||0},
        {nutrientId:1003,value:parseFloat(n.proteins_100g)||0},
        {nutrientId:1005,value:parseFloat(n.carbohydrates_100g)||0},
        {nutrientId:1004,value:parseFloat(n.fat_100g)||0},
        {nutrientId:1079,value:parseFloat(n.fiber_100g)||0}
      ]
    };
  }catch(e){return null;}
}

async function startBarcodeScanner(){
  if(scannerActive)return; // prevent double-open
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    alert("Camera not available. Make sure you're using Safari and have allowed camera access in Settings → Safari → Camera.");return;
  }

  scannerActive=true;

  // Build full-screen overlay
  const ov=document.createElement("div");
  ov.id="scanner-overlay";
  ov.style.cssText="position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px";

  const title=document.createElement("div");
  title.textContent="Scan Barcode";
  title.style.cssText="color:#fff;font-size:18px;font-weight:700;font-family:'Space Grotesk',sans-serif;margin-bottom:16px";

  const vid=document.createElement("video");
  vid.style.cssText="width:100%;max-width:360px;border-radius:12px;background:#111";
  vid.setAttribute("playsinline","true");
  vid.setAttribute("autoplay","true");
  vid.setAttribute("muted","true");
  vid.muted=true;

  const frame=document.createElement("div");
  frame.style.cssText="position:absolute;width:240px;height:100px;border:2.5px solid #39ff14;border-radius:8px;box-shadow:0 0 0 9999px rgba(0,0,0,.5),0 0 20px #39ff1466;pointer-events:none;top:50%;left:50%;transform:translate(-50%,-50%)";

  const vidWrap=document.createElement("div");
  vidWrap.style.cssText="position:relative;width:100%;max-width:360px;aspect-ratio:4/3;border-radius:12px;overflow:hidden;background:#111";
  vidWrap.appendChild(vid);vidWrap.appendChild(frame);

  const lbl=document.createElement("div");
  lbl.textContent="Align barcode with the green box";
  lbl.style.cssText="color:#cccccc;font-size:14px;margin-top:14px;font-family:'Space Grotesk',sans-serif;text-align:center";

  const status=document.createElement("div");
  status.id="scan-status";
  status.style.cssText="color:#39ff14;font-size:13px;margin-top:6px;font-family:'Space Mono',monospace;min-height:18px;text-align:center";

  const closeBtn=document.createElement("button");
  closeBtn.textContent="✕ Cancel";
  closeBtn.style.cssText="margin-top:20px;padding:12px 32px;background:transparent;border:1px solid #333;border-radius:10px;color:#999;font-size:15px;font-family:'Space Grotesk',sans-serif;cursor:pointer";
  closeBtn.addEventListener("click",()=>{closeScannerCleanup();renderNutrition();});

  ov.appendChild(title);ov.appendChild(vidWrap);ov.appendChild(lbl);ov.appendChild(status);ov.appendChild(closeBtn);
  document.body.appendChild(ov);

  // Request camera — environment (back) camera first, fallback to any
  try{
    try{
      scannerStream=await navigator.mediaDevices.getUserMedia({
        video:{facingMode:{exact:"environment"},width:{ideal:1280},height:{ideal:960}}
      });
    }catch{
      scannerStream=await navigator.mediaDevices.getUserMedia({video:true});
    }
    vid.srcObject=scannerStream;
    await new Promise((res,rej)=>{
      vid.onloadedmetadata=()=>{vid.play().then(res).catch(rej)};
      setTimeout(()=>rej(new Error("timeout")),8000);
    });
  }catch(e){
    status.textContent="Camera error: "+e.message;
    status.style.color="#ff4d6d";
    lbl.textContent="Check Settings → Privacy → Camera → Safari";
    return;
  }

  status.textContent="Camera ready — scanning…";

  // Check for BarcodeDetector (Safari 17.0+ on iOS, Chrome on Android)
  const hasBD=typeof BarcodeDetector!=="undefined";
  if(hasBD){
    let detector;
    try{detector=new BarcodeDetector({formats:["ean_13","ean_8","upc_a","upc_e","code_128","code_39","qr_code"]});}
    catch{detector=new BarcodeDetector();}

    let scanning=true;
    let lastCode="";
    const scanLoop=async()=>{
      if(!scanning||!scannerActive)return;
      try{
        if(vid.readyState>=2){ // HAVE_CURRENT_DATA
          const codes=await detector.detect(vid);
          if(codes.length>0&&codes[0].rawValue!==lastCode){
            lastCode=codes[0].rawValue;
            scanning=false;
            status.textContent="Found: "+lastCode+" · Looking up…";
            const food=await lookupBarcode(lastCode);
            closeScannerCleanup();
            if(food){
              fdSelected=food;fdGrams=100;fdPortionMode="grams";
              fdServing=food.servings&&food.servings.length&&food.servings[0].gramWeight?food.servings[0]:null;
              renderNutrition();
            }else{
              alert("Product not found in database. Try searching by name.");
              renderNutrition();
            }
            return;
          }
        }
      }catch(e){}
      // Use setTimeout instead of rAF for better battery life and reliability
      if(scanning&&scannerActive)setTimeout(scanLoop,150);
    };
    vid.addEventListener("playing",()=>setTimeout(scanLoop,500));
  } else {
    // Fallback for older Safari — show manual entry
    frame.style.border="2px dashed #666";
    lbl.textContent="Auto-scan not supported — enter barcode manually:";
    status.textContent="";
    const inp=document.createElement("input");

function exportData(){
  const keys=["user_profile","wk_week","wk_completed","wk_setdata","wk_history","weighins","recent_foods"];
  const data={version:1,exported:new Date().toISOString(),profile:{}};
  keys.forEach(k=>{const v=localStorage.getItem(k);if(v)data[k]=JSON.parse(v);});
  // Also grab all nutrition logs (nutri_YYYY-MM-DD keys)
  data.nutrition={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith("nutri_")){data.nutrition[k]=JSON.parse(localStorage.getItem(k)||"[]");}
  }
  // Also grab all goal logs
  data.goals={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith("goals_")){data.goals[k]=JSON.parse(localStorage.getItem(k)||"{}");}
  }
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`ej-health-backup-${td()}.json`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}

function importData(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.version)throw new Error("Invalid backup file");
      const keys=["user_profile","wk_week","wk_completed","wk_setdata","wk_history","weighins","recent_foods"];
      keys.forEach(k=>{if(data[k]!==undefined)localStorage.setItem(k,JSON.stringify(data[k]));});
      if(data.nutrition)Object.entries(data.nutrition).forEach(([k,v])=>localStorage.setItem(k,JSON.stringify(v)));
      if(data.goals)Object.entries(data.goals).forEach(([k,v])=>localStorage.setItem(k,JSON.stringify(v)));
      // Reload all state
      profile=ld("user_profile",null)||INIT;
      wkWeek=ld("wk_week",1);
      wkComp=ld("wk_completed",[]);
      wkSets=ld("wk_setdata",{});
      wkHist=ld("wk_history",{});
      weighIns=ld("weighins",[]);
      recentFoods=ld("recent_foods",[]);
      alert("Data imported successfully!");
      render();
    }catch(err){alert("Import failed — make sure you're using a valid EJ Health backup file.");}
  };
  reader.readAsText(file);
}

function searchLocalFoods(q){
  const terms=q.toLowerCase().split(/\s+/);
  return LOCAL_FOODS.filter(f=>terms.every(t=>f.name.toLowerCase().includes(t)))
    .map(f=>({
      fdcId:"local_"+f.name,
      name:f.name,
      servings:[
        {disseminationText:"100g",gramWeight:100},
        {disseminationText:"1 medium (50g)",gramWeight:50},
      ],
      foodNutrients:[
        {nutrientId:1008,value:f.cal},
        {nutrientId:1003,value:f.p},
        {nutrientId:1005,value:f.c},
        {nutrientId:1004,value:f.f},
        {nutrientId:1079,value:f.fib}
      ]
    }));
}

const NID={energy:1008,protein:1003,carbs:1005,fat:1004,fiber:1079};

function getNutrient(food,id){
  if(!food||!food.foodNutrients)return 0;
  const n=food.foodNutrients.find(x=>x.nutrientId===id||(x.nutrient&&x.nutrient.id===id));
  return n?(n.value||n.amount||0):0;
}
function calcFromGrams(food,grams){
  const s=grams/100;
  return{
    calories:Math.round(getNutrient(food,NID.energy)*s),
    protein: +(getNutrient(food,NID.protein)*s).toFixed(1),
    carbs:   +(getNutrient(food,NID.carbs)*s).toFixed(1),
    fat:     +(getNutrient(food,NID.fat)*s).toFixed(1),
    fiber:   +(getNutrient(food,NID.fiber)*s).toFixed(1)
  };
}
async function searchFoods(q){
  if(!q||q.length<2){fdResults=[];updateSearchResults();return;}
  fdLoading=true;updateSearchResults();
  // 1. Local whole foods — instant, no API
  const local=searchLocalFoods(q);
  // 2. USDA FoodData Central — 600,000+ foods, full nutrient data
  let usda=[];
  try{
    const url=`https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(q)}&dataType=SR%20Legacy,Foundation,Survey%20(FNDDS),Branded&pageSize=12&api_key=${USDA_KEY}`;
    const r=await fetch(url);
    const d=await r.json();
    usda=(d.foods||[]).map(f=>({
      fdcId:f.fdcId,
      name:f.description+(f.brandOwner?` (${f.brandOwner})`:""),
      servings:(f.foodMeasures||[]).filter(s=>s.gramWeight).map(s=>({
        disseminationText:s.disseminationText||s.portionDescription||"Serving",
        gramWeight:s.gramWeight
      })),
      foodNutrients:f.foodNutrients||[]
    }));
  }catch(e){}
  // 3. Open Food Facts — packaged/branded products
  let off=[];
  try{
    const url=`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&search_simple=1&action=process&json=1&page_size=6&fields=id,product_name,nutriments,serving_size,serving_quantity`;
    const r=await fetch(url);
    const d=await r.json();
    off=(d.products||[])
      .filter(p=>p.product_name&&p.product_name.trim())
      .map(p=>{
        const n=p.nutriments||{};
        return{
          fdcId:"off_"+p.id,
          name:p.product_name.trim(),
          servings:p.serving_size&&p.serving_quantity?[{disseminationText:p.serving_size,gramWeight:parseFloat(p.serving_quantity)||null}]:[],
          foodNutrients:[
            {nutrientId:1008,value:n["energy-kcal_100g"]||0},
            {nutrientId:1003,value:n.proteins_100g||0},
            {nutrientId:1005,value:n.carbohydrates_100g||0},
            {nutrientId:1004,value:n.fat_100g||0},
            {nutrientId:1079,value:n.fiber_100g||0}
          ]
        };
      });
  }catch(e){}
  // Merge: local first, then USDA, then OFF — deduplicate by name
  const seen=new Set(local.map(f=>f.name.toLowerCase()));
  const usdaNew=usda.filter(f=>!seen.has(f.name.toLowerCase()));
  usdaNew.forEach(f=>seen.add(f.name.toLowerCase()));
  const offNew=off.filter(f=>!seen.has(f.name.toLowerCase()));
  fdResults=[...local,...usdaNew,...offNew];
  fdLoading=false;updateSearchResults();
}

let reminderTime=ld("reminder_time",""); // "HH:MM" or ""
let reminderEnabled=ld("reminder_enabled",false);

function saveReminder(time,enabled){
  reminderTime=time;reminderEnabled=enabled;
  sv("reminder_time",time);sv("reminder_enabled",enabled);
}

async function requestNotifPermission(){
  if(!("Notification" in window))return false;
  if(Notification.permission==="granted")return true;
  if(Notification.permission==="denied")return false;
  const p=await Notification.requestPermission();
  return p==="granted";
}

function scheduleReminder(){
  // Cancel any existing timer
  if(window._reminderTimer)clearTimeout(window._reminderTimer);
  if(!reminderEnabled||!reminderTime)return;
  const [h,m]=reminderTime.split(":").map(Number);
  const now=new Date();
  const next=new Date();
  next.setHours(h,m,0,0);
  if(next<=now)next.setDate(next.getDate()+1); // schedule for tomorrow if already passed
  const ms=next-now;
  window._reminderTimer=setTimeout(()=>{
    if(Notification.permission==="granted"){
      new Notification("EJ Health — daily check-in",{
        body:"Time to log your nutrition, training, and goals 💪",
        icon:"/icons/icon-192.png",
        badge:"/icons/icon-192.png",
        tag:"ej-daily-reminder"
      });
    }
    // Reschedule for next day
    window._reminderTimer=setTimeout(()=>scheduleReminder(),1000);
  },ms);
}

// Kick off reminder scheduling on load
if(reminderEnabled&&reminderTime)scheduleReminder();

// wkShift now uses td() for local timezone month key
let _shiftMonth=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`};
let wkShift=ld(`wk_shift_${_shiftMonth()}`,0);

// wkOffset: number of days the schedule has been shifted this week
// e.g. offset=1 means Monday's workout now appears on Tuesday, etc.
// Stored per week so it resets when the week advances.
let wkOffset=ld(`wk_offset_${ld("wk_week",1)}`,0);

function shiftSchedule(){
  // Increment offset — shifts every remaining day forward by 1
  wkOffset++;
  sv(`wk_offset_${wkWeek}`,wkOffset);
  // Move activeDay forward so we stay on the current view
  activeDay=Math.min(activeDay+1,6);
  renderWorkout();
}

// Map a calendar day index to the PROG day it should show
// given the current offset
function progDayForDisplay(calDay){
  // Shift the PROG index back by offset so the workout appears later
  // e.g. Monday (0) with offset 1 → shows what was Sunday (6)
  // Actually: we want to shift FORWARD — today's workout appears tomorrow
  // So: the workout scheduled for (calDay - offset) now shows on calDay
  const progIdx=((calDay - wkOffset) % 7 + 7) % 7;
  return progIdx;
}

// What PROG day does this display tab actually show?
function getDisplayProgDay(calDay){
  return progDayForDisplay(calDay);
}

function pushWeek(){
  // Vacation mode: replay the entire current week
  // Clears completion for this week so all days become available again
  // History is preserved — progressive overload is not affected
  if(!confirm("Push this entire week? Your workout history is preserved, but this week's sessions will reset so you can repeat them."))return;
  wkComp=[];sv("wk_completed",[]);
  wkSets={};sv("wk_setdata",{});
  // Don't change wkWeek — same week replays, then advances when done
  renderWorkout();
}

// ── WORKOUT HELPERS ─────────────────────────────────────────────────
function getLast(di,ei){const h=wkHist[`d${di}_e${ei}`]||[];return h.length?h[h.length-1]:null}
function getTopSet(di,ei){
  const last=getLast(di,ei);
  if(!last||!last.sets||!last.sets.length)return null;
  return last.sets.reduce((a,s)=>s.weight>a.weight?s:a,last.sets[0]);
}
function getSug(di,ei){
  // Legacy — used only for old exercise-indexed history
  const day=PROG[di];if(!day.exercises||!day.exercises[ei])return null;
  const phase=pf(wkWeek),dl=wkWeek%6===0&&wkWeek>0;
  const ep=day.exercises[ei].phases[phase],top=getTopSet(di,ei);
  if(!top)return null;
  if(dl)return Math.round(top.weight*.85*4)/4;
  const last=getLast(di,ei);
  const allHit=last&&last.sets&&last.sets.every(s=>s.reps>=ep.rr[1]);
  return allHit?top.weight+day.exercises[ei].inc:top.weight;
}
function getSets(di,ei){
  // Legacy compat for old exercise-indexed data
  const day=PROG[di];if(!day.exercises||!day.exercises[ei])return[];
  const k=`d${di}_e${ei}_w${wkWeek}`;
  if(!wkSets[k]){
    const ep=day.exercises[ei].phases[pf(wkWeek)];
    if(!ep||ep.sets===0)return[];
    const sw=getSug(di,ei);
    wkSets[k]=Array.from({length:ep.sets},()=>({weight:sw?String(sw):"",reps:"",done:false}));
    sv("wk_setdata",wkSets);
  }
  return wkSets[k];
}

// ── FEEDBACK ────────────────────────────────────────────────────────
function getFeedback(){
  const tips=[];
  if(weighIns.length>=2){
    const r=weighIns.slice(-4),delta=r[r.length-1].weight-r[0].weight,rate=delta/r.length;
    if(rate<-1)tips.push({type:"warn",title:"Losing too fast",body:`~${Math.abs(rate).toFixed(1)} lbs/week. Add 150–200 kcal to protect muscle.`});
    else if(rate<-.25)tips.push({type:"ok",title:"Recomp on track",body:`~${Math.abs(rate).toFixed(2)} lbs/week fat loss. Keep going.`});
    else if(rate>.25)tips.push({type:"warn",title:"Weight trending up",body:`+${rate.toFixed(1)} lbs/week. Tighten up on weekends.`});
    else tips.push({type:"info",title:"Weight stable",body:"Good for recomp. For fat loss, try −100 kcal or +1,500 daily steps."});
  }
  const gains=[];
  // Gather gains from slot-based history (keyed by exercise name)
  Object.keys(wkHist).forEach(hk=>{
    if(!hk.startsWith("ex_"))return;
    const exName=hk.slice(3);
    const h=wkHist[hk];
    if(h.length>=3){
      const f=h[0].sets?Math.max(...h[0].sets.map(s=>s.weight)):h[0].weight||0;
      const l=h[h.length-1].sets?Math.max(...h[h.length-1].sets.map(s=>s.weight)):h[h.length-1].weight||0;
      if(l>f)gains.push({name:exName,g:l-f});
    }
  });
  if(gains.length){const top=gains.sort((a,b)=>b.g-a.g)[0];tips.push({type:"ok",title:`PR — ${top.name}`,body:`Up ${top.g} lbs from your first session.`});}
  if(!tips.length)tips.push({type:"info",title:"Log a weigh-in for feedback",body:"After 2+ entries you'll get adaptive recommendations here."});
  return tips;
}

// ── RENDER PROGRESS ───────────────────────────────────────────────────
function renderProgress(){
  checkDayRollover();
  const content=document.getElementById("content");
  content.innerHTML="";

  // Helper: make element with style
  function el(tag,css,text){
    const e=document.createElement(tag);
    if(css)e.style.cssText=css;
    if(text!==undefined)e.textContent=text;
    return e;
  }
  function row(items,gridCols,gap){
    const d=document.createElement("div");
    d.style.cssText=`display:grid;grid-template-columns:${gridCols};gap:${gap||"6px"}`;
    items.forEach(i=>{if(i)d.appendChild(i);});
    return d;
  }
  function sparkline(vals,color,height){
    const wrap=document.createElement("div");
    wrap.style.cssText=`display:flex;align-items:flex-end;gap:3px;height:${height||26}px`;
    const mx=Math.max(...vals),mn=Math.min(...vals);
    vals.forEach((v,i)=>{
      const ht=mx===mn?height/2:Math.max(((v-mn)/(mx-mn))*(height||26),3);
      const b=document.createElement("div");
      const isLast=i===vals.length-1;
      b.style.cssText=`flex:1;height:${ht}px;border-radius:2px;background:${isLast?color:BRD};${isLast?"box-shadow:0 0 5px "+color:""}`;
      wrap.appendChild(b);
    });
    return wrap;
  }
  function mkCard(accent){
    const c=document.createElement("div");
    c.className="card";
    c.style.marginBottom="12px";
    if(accent){c.style.border=`1px solid ${accent}44`;c.style.boxShadow=`0 0 12px ${accent}0d`;}
    return c;
  }
  function nbarEl(pct,color){
    const w=document.createElement("div");w.className="nbw";
    const f=document.createElement("div");f.className="nbf";
    f.style.cssText=`width:${Math.min(pct,100)}%;background:${color};box-shadow:0 0 5px ${color}`;
    w.appendChild(f);return w;
  }
  function labelEl(text,color){
    const d=document.createElement("div");
    d.style.cssText=`font-size:11px;color:${color||TXT};text-transform:uppercase;letter-spacing:1.8px;margin-bottom:8px;font-family:'Space Grotesk',sans-serif`;
    d.textContent=text;return d;
  }
  function append(parent,...children){children.forEach(c=>{if(c)parent.appendChild(c);});return parent;}

  const wrap=document.createElement("div");
  wrap.style.cssText="padding:14px 14px 88px";

  // Section tabs
  const sections=[{id:"strength",label:"Strength"},{id:"body",label:"Body"},{id:"goals",label:"Goals"},{id:"measures",label:"Measures"}];
  const tabBar=document.createElement("div");
  tabBar.style.cssText="display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none";
  sections.forEach(s=>{
    const btn=document.createElement("button");
    btn.textContent=s.label;
    const active=progSection===s.id;
    btn.style.cssText=`flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:${active?700:400};font-family:'Space Grotesk',sans-serif;cursor:pointer;border:1px solid ${active?G+"88":BRD};background:${active?GD:"transparent"};color:${active?G:TXT}`;
    btn.addEventListener("click",()=>{progSection=s.id;renderProgress();});
    tabBar.appendChild(btn);
  });
  wrap.appendChild(tabBar);

  // ── STRENGTH ──────────────────────────────────────────────────────
  if(progSection==="strength"){
    const byEx={};
    Object.keys(wkHist).forEach(hk=>{
      if(!hk.startsWith("ex_"))return;
      const name=hk.slice(3),h=wkHist[hk];
      if(h&&h.length){if(!byEx[name])byEx[name]=[];byEx[name].push(...h);}
    });
    const exes=Object.keys(byEx);
    if(!exes.length){
      const empty=document.createElement("div");
      empty.style.cssText="text-align:center;padding:40px 20px";
      append(empty,
        el("div","font-size:36px;margin-bottom:12px;color:"+P,"◎"),
        el("div","font-size:16px;font-weight:700;color:"+TXT+";margin-bottom:7px","No strength data yet"),
        el("div","font-size:14px;color:"+TXT+";line-height:1.7","Finish a training session to see your history here.")
      );
      wrap.appendChild(empty);
    } else {
      const phase=pf(wkWeek);
      const banner=mkCard(PC[phase]);
      append(banner,
        el("div",`font-size:10px;color:${PC[phase]};text-transform:uppercase;letter-spacing:1.8px;margin-bottom:1px;padding:9px 14px 0`,`Phase ${phase+1} · ${PL[phase]}`),
        el("div","font-size:12px;color:"+TXT+";padding:0 14px 9px",`Week ${wkWeek} · ${exes.length} exercises tracked`)
      );
      wrap.appendChild(banner);
      exes.forEach(name=>{
        const sessions=byEx[name],isOpen=progEx===name;
        const topWts=sessions.map(s=>s.sets?Math.max(...s.sets.map(x=>x.weight)):s.weight||0);
        const maxW=Math.max(...topWts),firstTop=topWts[0],lastTop=topWts[topWts.length-1];
        const gained=Math.round((lastTop-firstTop)*10)/10;
        const card2=mkCard();
        const sumRow=document.createElement("div");
        sumRow.style.cssText="padding:13px 14px 0;cursor:pointer";
        const topRow=document.createElement("div");
        topRow.style.cssText="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px";
        const nameCol=document.createElement("div");nameCol.style.cssText="flex:1;padding-right:10px";
        append(nameCol,el("div","font-size:14px;font-weight:600;color:"+TXT+";margin-bottom:3px",name));
        const metaRow=document.createElement("div");metaRow.style.cssText="font-size:11px;color:"+TXT+";font-family:'Space Mono',monospace;display:flex;gap:8px;flex-wrap:wrap";
        metaRow.appendChild(el("span","",sessions.length+" session"+(sessions.length!==1?"s":"")));
        if(gained>0)metaRow.appendChild(el("span","color:"+G,"↑ +"+gained+"lb"));
        else if(gained<0)metaRow.appendChild(el("span","color:"+PROT,"↓ "+gained+"lb"));
        else if(sessions.length>1)metaRow.appendChild(el("span","color:"+TXT,"holding"));
        nameCol.appendChild(metaRow);
        const rightCol=document.createElement("div");rightCol.style.cssText="text-align:right";
        append(rightCol,el("div","font-family:'Space Mono',monospace;font-size:16px;color:"+G+";margin-bottom:2px",lastTop+"lbs"),el("div","font-size:9px;color:"+TXT+";text-transform:uppercase;letter-spacing:.5px","latest top set"));
        append(topRow,nameCol,rightCol);
        sumRow.appendChild(topRow);
        if(sessions.length>1){sumRow.appendChild(sparkline(topWts,G,26));sumRow.style.paddingBottom="12px";}
        else{const sp=document.createElement("div");sp.style.paddingBottom="12px";sumRow.appendChild(sp);}
        sumRow.addEventListener("click",()=>{progEx=isOpen?null:name;renderProgress();});
        card2.appendChild(sumRow);
        if(isOpen){
          const hist=document.createElement("div");hist.style.borderTop=`1px solid ${BRD}`;
          [...sessions].reverse().forEach(session=>{
            const sets=session.sets||[];
            const sTop=sets.length?Math.max(...sets.map(s=>s.weight)):0;
            const sh=document.createElement("div");
            sh.style.cssText=`padding:9px 14px 6px;border-bottom:1px solid ${BRD};display:flex;justify-content:space-between;align-items:center`;
            const sd=document.createElement("div");
            append(sd,el("div","font-size:13px;font-weight:600;color:"+TXT,session.date||`Week ${session.week}`),el("div","font-size:11px;color:"+TXT+";margin-top:1px",`Wk ${session.week||"—"} · ${sets.length} set${sets.length!==1?"s":""}`));
            append(sh,sd,el("div","font-family:'Space Mono',monospace;font-size:12px;color:"+G,sTop+"lbs top"));
            hist.appendChild(sh);
            const grid=document.createElement("div");grid.style.cssText="padding:6px 14px 10px";
            const hdr=document.createElement("div");hdr.style.cssText="display:grid;grid-template-columns:28px 1fr 1fr 1fr;gap:6px;margin-bottom:4px";
            ["Set","Weight","Reps","Vol"].forEach(l=>{const c=el("div","font-size:10px;color:"+TXT+";text-transform:uppercase;letter-spacing:.5px;text-align:center",l);hdr.appendChild(c);});
            grid.appendChild(hdr);
            sets.forEach((s,si)=>{
              const sr=document.createElement("div");sr.style.cssText="display:grid;grid-template-columns:28px 1fr 1fr 1fr;gap:6px;margin-bottom:4px;align-items:center";
              [String(si+1),s.weight+"lbs",s.reps+" reps",String(Math.round(s.weight*s.reps))].forEach((t,ti)=>{
                const c=el("div","font-family:'Space Mono',monospace;font-size:"+(ti===0?"12":"13")+"px;color:"+TXT+";text-align:center",t);
                sr.appendChild(c);
              });
              grid.appendChild(sr);
            });
            hist.appendChild(grid);
          });
          card2.appendChild(hist);
        }
        wrap.appendChild(card2);
      });
    }
  }

  // ── BODY COMPOSITION ──────────────────────────────────────────────
  else if(progSection==="body"){
    wrap.appendChild(labelEl("Body Composition"));
    const wis=weighIns;
    if(wis.length<2){
      const info=mkCard();
      info.style.padding="14px";
      info.appendChild(el("div","font-size:13px;color:"+TXT+";line-height:1.7","Log at least 2 weigh-ins on the Dashboard to see your body composition trend here."));
      wrap.appendChild(info);
    } else {
      // Weight chart
      const wts=wis.map(w=>w.weight);
      const wtCard=mkCard(P);
      const wp=document.createElement("div");wp.style.padding="14px";
      const wr=document.createElement("div");wr.style.cssText="display:flex;justify-content:space-between;margin-bottom:8px";
      const wDelta=wts[wts.length-1]-wts[0];
      wr.appendChild(el("div","font-size:11px;color:"+P+";text-transform:uppercase;letter-spacing:1.5px","Weight"));
      const wRight=document.createElement("div");wRight.style.cssText="font-family:'Space Mono',monospace;font-size:13px;color:"+TXT+";display:flex;gap:8px;align-items:center";
      wRight.appendChild(el("span","",`${wts[0]} → ${wts[wts.length-1]} lbs`));
      wRight.appendChild(el("span","color:"+(wDelta<=0?G:PROT),(wDelta>0?"+":"")+wDelta.toFixed(1)+" lbs"));
      wr.appendChild(wRight);
      append(wp,wr,sparkline(wts,P,48));
      const wd=document.createElement("div");wd.style.cssText="display:flex;justify-content:space-between;font-size:10px;color:"+TXT+";font-family:'Space Mono',monospace;margin-top:6px";
      wd.appendChild(el("span","",wis[0].date));wd.appendChild(el("span","",wis[wis.length-1].date));
      wp.appendChild(wd);wtCard.appendChild(wp);wrap.appendChild(wtCard);
      // BF chart
      const bfWis=wis.filter(w=>w.bodyFat);
      if(bfWis.length>=2){
        const bfs=bfWis.map(w=>w.bodyFat);
        const bfCard=mkCard(CARB);
        const bp=document.createElement("div");bp.style.padding="14px";
        const br2=document.createElement("div");br2.style.cssText="display:flex;justify-content:space-between;margin-bottom:8px";
        const bfDelta=bfs[bfs.length-1]-bfs[0];
        br2.appendChild(el("div","font-size:11px;color:"+CARB+";text-transform:uppercase;letter-spacing:1.5px","Body Fat %"));
        const bRight=document.createElement("div");bRight.style.cssText="font-family:'Space Mono',monospace;font-size:13px;color:"+TXT+";display:flex;gap:8px;align-items:center";
        bRight.appendChild(el("span","",`${bfs[0]}% → ${bfs[bfs.length-1]}%`));
        bRight.appendChild(el("span","color:"+(bfDelta<=0?G:PROT),(bfDelta>0?"+":"")+bfDelta.toFixed(1)+"%"));
        br2.appendChild(bRight);
        append(bp,br2,sparkline(bfs,CARB,48));
        const bd=document.createElement("div");bd.style.cssText="display:flex;justify-content:space-between;font-size:10px;color:"+TXT+";font-family:'Space Mono',monospace;margin-top:6px";
        bd.appendChild(el("span","",bfWis[0].date));bd.appendChild(el("span","",bfWis[bfWis.length-1].date));
        bp.appendChild(bd);bfCard.appendChild(bp);wrap.appendChild(bfCard);
      }
    }
    // Push week button
    wrap.appendChild(labelEl("Vacation mode","#cccccc"));
    const vCard=mkCard();const vp=document.createElement("div");vp.style.padding="14px";
    vp.appendChild(el("div","font-size:13px;color:"+TXT+";line-height:1.6;margin-bottom:12px","Traveling or on a deload? Push this week's workouts forward without affecting your progression."));
    const vBtn=document.createElement("button");
    vBtn.textContent="→ Push this week's workouts";
    vBtn.style.cssText=`width:100%;padding:11px;background:transparent;border:1.5px solid ${WARN};border-radius:10px;color:${WARN};font-size:14px;font-weight:700;font-family:'Space Grotesk',sans-serif;cursor:pointer`;
    vBtn.addEventListener("click",pushWeek);
    vp.appendChild(vBtn);vCard.appendChild(vp);wrap.appendChild(vCard);
  }

  // ── GOALS TRACKING ────────────────────────────────────────────────
  else if(progSection==="goals"){
    const allGoalDays={};
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k&&k.startsWith("goals_")){
        try{allGoalDays[k.slice(6)]=JSON.parse(localStorage.getItem(k)||"{}");}catch{}
      }
    }
    const dates=Object.keys(allGoalDays).sort();
    if(!dates.length){
      const empty=document.createElement("div");empty.style.cssText="text-align:center;padding:40px 20px";
      append(empty,el("div","font-size:16px;font-weight:700;color:"+TXT+";margin-bottom:7px","No goal data yet"),el("div","font-size:14px;color:"+TXT+";line-height:1.7","Check off daily goals to see your consistency here."));
      wrap.appendChild(empty);
    } else {
      // Monthly calendar
      const now=new Date();
      const yr=now.getFullYear(),mo=now.getMonth();
      const moStr=`${yr}-${String(mo+1).padStart(2,"0")}`;
      const daysInMonth=new Date(yr,mo+1,0).getDate();
      const firstDow=new Date(yr,mo,1).getDay();
      wrap.appendChild(labelEl("This month"));
      const calCard=mkCard();calCard.style.padding="14px";
      // DOW headers
      const dowRow=document.createElement("div");dowRow.style.cssText="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px";
      ["S","M","T","W","T","F","S"].forEach(d=>{const c=el("div","text-align:center;font-size:10px;color:"+TXT+";font-family:'Space Mono',monospace;padding:2px 0",d);dowRow.appendChild(c);});
      calCard.appendChild(dowRow);
      const calGrid=document.createElement("div");calGrid.style.cssText="display:grid;grid-template-columns:repeat(7,1fr);gap:3px";
      for(let i=0;i<firstDow;i++){const c=document.createElement("div");c.style.height="28px";calGrid.appendChild(c);}
      for(let day=1;day<=daysInMonth;day++){
        const dateStr=`${moStr}-${String(day).padStart(2,"0")}`;
        const dg=allGoalDays[dateStr]||null;
        const allDone=dg&&GOALS.every(g=>dg[g.id]);
        const anyDone=dg&&GOALS.some(g=>dg[g.id]);
        const isToday=dateStr===td();
        const c=document.createElement("div");
        c.textContent=day;
        c.style.cssText=`height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:12px;font-family:'Space Mono',monospace;background:${allDone?G:anyDone?G+"33":"transparent"};color:${allDone?"#000":isToday?G:TXT};border:${isToday?"1.5px solid "+G:"1px solid transparent"};font-weight:${allDone||isToday?700:400}`;
        calGrid.appendChild(c);
      }
      calCard.appendChild(calGrid);
      const completeDays=dates.filter(d=>d.startsWith(moStr)&&GOALS.every(g=>(allGoalDays[d]||{})[g.id])).length;
      const sumRow2=document.createElement("div");sumRow2.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-top:12px";
      sumRow2.appendChild(el("div","font-size:12px;color:"+TXT+";font-family:'Space Mono',monospace",`${completeDays} perfect day${completeDays!==1?"s":""} this month`));
      sumRow2.appendChild(el("div","font-size:11px;color:"+TXT,`${daysInMonth} days total`));
      calCard.appendChild(sumRow2);
      wrap.appendChild(calCard);
      // Per-goal hit rate
      wrap.appendChild(labelEl("Goal hit rate (all time)"));
      const hitCard2=mkCard();const hp=document.createElement("div");hp.style.padding="14px";
      GOALS.forEach(g=>{
        const hits=dates.filter(d=>(allGoalDays[d]||{})[g.id]).length;
        const pct=dates.length?Math.round(hits/dates.length*100):0;
        const gr=document.createElement("div");gr.style.marginBottom="10px";
        const gl=document.createElement("div");gl.style.cssText="display:flex;justify-content:space-between;margin-bottom:4px";
        const gLeft=document.createElement("div");gLeft.style.cssText="display:flex;align-items:center;gap:6px";
        gLeft.appendChild(goalIcon(g.id,G));
        gLeft.appendChild(el("div","font-size:13px;color:"+TXT,g.label));
        gl.appendChild(gLeft);
        gl.appendChild(el("div","font-family:'Space Mono',monospace;font-size:13px;color:"+(pct>=80?G:pct>=50?CARB:PROT),pct+"%"));
        gr.appendChild(gl);gr.appendChild(nbarEl(pct,pct>=80?G:pct>=50?CARB:PROT));
        hp.appendChild(gr);
      });
      hitCard2.appendChild(hp);wrap.appendChild(hitCard2);
    }
  }

  // ── MEASUREMENTS ──────────────────────────────────────────────────
  else if(progSection==="measures"){
    const measurements=getMeasurements();
    wrap.appendChild(labelEl("Log measurements"));
    const formCard=mkCard();const fp=document.createElement("div");fp.style.padding="14px";
    const mGrid=document.createElement("div");mGrid.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px";
    MEASURE_FIELDS.forEach(f=>{
      const latest=measurements.length?measurements[measurements.length-1][f]||"":"";
      const mWrap=document.createElement("div");
      mWrap.appendChild(el("div","font-size:10px;color:"+TXT+";text-transform:uppercase;letter-spacing:1px;margin-bottom:3px",f.charAt(0).toUpperCase()+f.slice(1)));
      const inp=document.createElement("input");
      inp.type="number";inp.inputMode="decimal";inp.placeholder=latest?String(latest):"in";inp.id=`m-inp-${f}`;
      inp.className="inp";inp.style.cssText="text-align:center;padding:8px 4px";
      mWrap.appendChild(inp);mGrid.appendChild(mWrap);
    });
    fp.appendChild(mGrid);
    const saveBtn=document.createElement("button");
    saveBtn.textContent="Save measurements";
    saveBtn.style.cssText=`width:100%;padding:11px;background:transparent;border:1.5px solid ${G};border-radius:10px;color:${G};font-size:14px;font-weight:700;font-family:'Space Grotesk',sans-serif;cursor:pointer`;
    saveBtn.addEventListener("click",()=>{
      const entry={date:td()};
      MEASURE_FIELDS.forEach(f=>{const v=parseFloat(document.getElementById(`m-inp-${f}`)?.value||"");if(v)entry[f]=v;});
      if(Object.keys(entry).length>1){addMeasurement(entry);renderProgress();}
      else alert("Enter at least one measurement.");
    });
    fp.appendChild(saveBtn);formCard.appendChild(fp);wrap.appendChild(formCard);

    if(measurements.length>0){
      wrap.appendChild(labelEl("Measurement history"));
      MEASURE_FIELDS.forEach(f=>{
        const entries=measurements.filter(e=>e[f]);
        if(!entries.length)return;
        const vals=entries.map(e=>e[f]);
        const first=vals[0],last=vals[vals.length-1];
        const delta=Math.round((last-first)*10)/10;
        const mc=mkCard(P);const mp=document.createElement("div");mp.style.padding="12px 14px";
        const mr=document.createElement("div");mr.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px";
        mr.appendChild(el("div","font-size:13px;font-weight:600;color:"+TXT,f.charAt(0).toUpperCase()+f.slice(1)));
        const mRight=document.createElement("div");mRight.style.textAlign="right";
        mRight.appendChild(el("div","font-family:'Space Mono',monospace;font-size:15px;color:"+P,last+'"'));
        if(delta!==0)mRight.appendChild(el("div","font-size:10px;color:"+(delta<0?G:PROT)+";margin-top:2px",(delta>0?"+":"")+delta+'" from start'));
        mr.appendChild(mRight);mp.appendChild(mr);
        if(entries.length>1)mp.appendChild(sparkline(vals,P,24));
        mc.appendChild(mp);wrap.appendChild(mc);
      });
      // History table
      wrap.appendChild(labelEl("All entries"));
      const tbl=mkCard();const tp=document.createElement("div");tp.style.padding="12px 14px";
      const cols=`80px ${MEASURE_FIELDS.map(()=>"1fr").join(" ")}`;
      const tHdr=document.createElement("div");tHdr.style.cssText=`display:grid;grid-template-columns:${cols};gap:4px;margin-bottom:6px;font-size:9px;color:${TXT};text-transform:uppercase;letter-spacing:.5px;font-family:'Space Mono',monospace`;
      tHdr.appendChild(el("div","","Date"));
      MEASURE_FIELDS.forEach(f=>tHdr.appendChild(el("div","text-align:center",f.slice(0,3))));
      tp.appendChild(tHdr);
      [...measurements].reverse().slice(0,12).forEach(e=>{
        const tr=document.createElement("div");tr.style.cssText=`display:grid;grid-template-columns:${cols};gap:4px;margin-bottom:5px;font-size:11px;font-family:'Space Mono',monospace;color:${TXT}`;
        tr.appendChild(el("div","",e.date));
        MEASURE_FIELDS.forEach(f=>tr.appendChild(el("div","text-align:center;color:"+(e[f]?TXT:DIM),e[f]?e[f]+'"':"—")));
        tp.appendChild(tr);
      });
      tbl.appendChild(tp);wrap.appendChild(tbl);
    }
  }

  content.appendChild(wrap);
}

// ── MAIN RENDER ───────────────────────────────────────────────────────
function render(){
  renderHeader();renderNav();
  if(activeTab==="dashboard")renderDashboard();
  else if(activeTab==="nutrition")renderNutrition();
  else if(activeTab==="workout")renderWorkout();
  else if(activeTab==="progress")renderProgress();
}

render();
</script>
</body>
</html>
