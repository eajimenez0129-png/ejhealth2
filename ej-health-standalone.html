<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="EJ Health"/>
  <meta name="theme-color" content="#000000"/>
  <title>EJ Health</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{background:#000;color:#fff;font-family:'Exo 2',sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
    ::-webkit-scrollbar{width:0;height:0;}
    input,button,textarea,select{font-family:'Exo 2',sans-serif;color:#fff;}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
    input[type=number]{-moz-appearance:textfield;}
    .safe-top{padding-top:env(safe-area-inset-top,0px);}
    .safe-bottom{padding-bottom:calc(env(safe-area-inset-bottom,0px) + 10px);}
    ::selection{background:#b400ff44;color:#fff;}
    body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:9999;}
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel loaded from CDN — no build step needed -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
const { useState, useEffect } = React;

// ── COLORS ──────────────────────────────────────────────────────
const C = {
  bg:"#000000",surface:"#0d0d0d",surfaceHigh:"#161616",
  border:"#1f1f1f",borderMid:"#2a2a2a",
  text:"#ffffff",textMuted:"#666666",textDim:"#2e2e2e",
  neonGreen:"#39ff14",neonGreenDim:"#0a2200",
  neonPurple:"#b400ff",neonPurpleDim:"#1a0028",
  protein:"#ff4d6d",carbs:"#ffaa00",fat:"#00d4ff",
  success:"#39ff14",successDim:"#061a00",
  warn:"#ffaa00",warnDim:"#1f1400",
  info:"#b400ff",infoDim:"#1a0028",
  phase0:"#b400ff",phase1:"#00d4ff",phase2:"#39ff14",
};
const FD="'Exo 2',sans-serif", FM="'Share Tech Mono',monospace";

// ── PROFILE & MACROS ─────────────────────────────────────────────
const INIT = {weight:138,bodyFat:23.5,calories:1850,protein:145,carbs:175,fat:55,waterOz:94,tdee:2100};
function calcMacros(w,bf,cal){
  const lbm=w*(1-bf/100),protein=Math.round(lbm*1.05),fat=Math.round((cal*0.27)/9);
  return{protein,fat,carbs:Math.max(Math.round((cal-protein*4-fat*9)/4),80),waterOz:Math.round(w*0.68)};
}
function estimateTDEE(w,bf){
  return Math.round((370+21.6*(w*(1-bf/100)*0.453592))*1.25);
}

// ── PROGRAM ───────────────────────────────────────────────────────
const PL=["Reactivation","Accumulation","Development"];
const PC=[C.phase0,C.phase1,C.phase2];
const PD=["Wks 1–2 · Light loads, movement patterns, zero soreness spirals.","Wks 3–4 · Volume builds, intensity climbs carefully.","Wks 5–6+ · Full program. Progressive overload in effect."];
const pf=w=>w<=2?0:w<=4?1:2;
const ex=(name,p0s,p0r,p1s,p1r,p2s,p2r,rpe,inc,note="")=>({name,phases:[{sets:p0s,rr:p0r,rpe:Math.max(rpe-2,5)},{sets:p1s,rr:p1r,rpe:Math.max(rpe-1,6)},{sets:p2s,rr:p2r,rpe}],inc,note});
const PROG={name:"EJ Training",days:[
  {label:"MON",name:"Push",focus:"Chest · Tris · Front delt",rest:false,prime:false,
   phaseNotes:["Wks 1–2: Form focus, stop 3 reps short of failure.","Wks 3–4: Add a set, push closer to RPE.","Wks 5–6: Full volume, chase overload."],
   exercises:[ex("Dumbbell flat press (neutral grip)",2,[10,12],3,[10,12],4,[8,10],8,2.5,"Elbows 45° — protects cuff. Keep right arm path controlled."),ex("Landmine press (right supported)",2,[10,12],3,[10,12],3,[8,10],8,2.5,"Brace elbow into body at bottom. Cuff-safe pressing angle."),ex("Cable chest fly (low anchor)",2,[12,15],3,[12,15],3,[12,15],8,2.5,"Anchor below hip — keeps shoulder arc safe."),ex("Cable lateral raise (arm fwd 15°)",2,[15,20],3,[15,20],4,[12,15],9,2.5,"Slight forward tilt removes impingement risk."),ex("Tricep rope pushdown",2,[12,15],3,[12,15],3,[12,15],8,2.5,"")]},
  {label:"TUE",name:"Upper Prime",focus:"Activation · Blood flow · Mobility",rest:false,prime:true,
   phaseNotes:["Wks 1–2: Very easy. Just waking muscles up.","Wks 3–4: Slight resistance increase.","Wks 5–6: Still priming — don't kill yourself before Pull."],
   exercises:[ex("Band pull-apart",2,[15,20],2,[20,25],3,[20,25],6,0,"Essential for rear delt + cuff health."),ex("Face pull (light cable)",2,[15,20],2,[15,20],3,[15,20],6,2.5,"External rotation focus. Rehab and priming in one."),ex("Seated cable row (neutral)",2,[12,15],2,[12,15],3,[12,15],6,5,"Very light — just activating lats and mid-back."),ex("Dumbbell curl (seated)",2,[12,15],2,[12,15],3,[12,15],6,2.5,"")]},
  {label:"WED",name:"Pull",focus:"Back · Biceps · Rear delts",rest:false,prime:false,
   phaseNotes:["Wks 1–2: Neutral grip everything. 2 sets, feel the muscles.","Wks 3–4: Add volume, start pushing RPE.","Wks 5–6: Full program. Back should be noticeably stronger."],
   exercises:[ex("Barbell row (neutral grip)",2,[8,10],3,[8,10],4,[6,8],8,5,"Neutral grip reduces shoulder internal rotation stress."),ex("Lat pulldown (neutral/close)",2,[10,12],3,[10,12],3,[8,10],8,5,"Close neutral grip — full lat stretch without shoulder risk."),ex("Seated cable row (neutral)",2,[10,12],3,[10,12],3,[10,12],8,5,"Drive elbows straight back, squeeze at peak."),ex("Face pull",2,[15,20],3,[15,20],3,[15,20],9,2.5,"Rear delt + external rotator. Never skip."),ex("EZ bar curl",2,[10,12],3,[10,12],3,[10,12],8,2.5,""),ex("Hammer curl",2,[12,15],3,[12,15],3,[12,15],9,2.5,"")]},
  {label:"THU",name:"Leg Prime",focus:"Glute activation · Hip hinge · Quad fire",rest:false,prime:true,
   phaseNotes:["Wks 1–2: Most important early session. Light, controlled, no soreness.","Wks 3–4: Add band resistance or more weight.","Wks 5–6: Keep intensity moderate — still priming."],
   exercises:[ex("Glute bridge (BW → band)",2,[15,20],2,[15,20],3,[15,20],6,0,"Activates glutes before tomorrow's squat."),ex("Banded clamshell",2,[15,20],2,[15,20],3,[20,25],6,0,"Hip abductor activation — protects knees on squats."),ex("Goblet squat (tempo 3-0-1)",2,[10,12],2,[10,12],3,[12,15],6,5,"3-sec descent, pause, drive up. Quad + glute primer."),ex("Lying leg curl (light)",2,[12,15],2,[12,15],3,[12,15],6,5,"Activates hamstrings for tomorrow's hinge movements."),ex("Standing calf raise (BW)",2,[15,20],2,[15,20],3,[15,20],6,0,"")]},
  {label:"FRI",name:"Legs A",focus:"Quads · Glutes · Calves",rest:false,prime:false,
   phaseNotes:["Wks 1–2: NO lunges. Goblet squat only, 2 sets. Stop short of failure.","Wks 3–4: Leg press enters, volume steps up.","Wks 5–6: Walking lunges reintroduced. Full program."],
   exercises:[ex("Goblet squat",2,[10,12],3,[10,12],4,[8,10],7,5,"Weeks 1–2: this IS your main leg movement. Own the pattern."),ex("Leg press",0,[10,12],3,[10,12],3,[10,12],8,10,"Starts week 3. Feet high+wide — quad+glute emphasis."),ex("Walking lunge (dumbbell)",0,[0,0],2,[10,10],3,[10,10],8,5,"Starts week 3 at 2 sets. Week 5 bumps to 3."),ex("Leg extension",2,[15,20],3,[15,20],3,[15,20],9,5,"Light terminal extension wks 1–2, proper loading later."),ex("Standing calf raise (machine)",2,[15,20],3,[15,20],4,[15,20],9,5,"")]},
  {label:"SAT",name:"Legs B",focus:"Hamstrings · Glutes · Posterior chain",rest:false,prime:false,
   phaseNotes:["Wks 1–2: RDL light, hip thrust BW only. No split squats.","Wks 3–4: Hip thrust loaded, leg curl added.","Wks 5–6: Bulgarian split squat enters at 2 sets."],
   exercises:[ex("Romanian deadlift",2,[10,12],3,[10,12],4,[8,10],7,5,"Hip hinge: soft knees, push hips back, bar stays close."),ex("Hip thrust (BW → barbell)",2,[12,15],3,[12,15],3,[12,15],8,10,"Bodyweight wks 1–2. Add bar week 3."),ex("Lying leg curl",2,[12,15],3,[12,15],4,[10,12],8,5,"Starts light wk 1. Full loading wk 5."),ex("Bulgarian split squat",0,[0,0],0,[0,0],2,[8,10],8,5,"Starts week 5 only. 2 sets each leg. Earn this one."),ex("Seated calf raise",2,[15,20],3,[15,20],4,[15,20],9,2.5,"")]},
  {label:"SUN",name:"Rest",focus:"",rest:true,prime:false,exercises:[]},
]};
const pex=(day,phase)=>day.exercises.filter(e=>e.phases[phase].sets>0);

// ── STORAGE ───────────────────────────────────────────────────────
const ld=(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const today=()=>new Date().toISOString().slice(0,10);

// ── GOALS ─────────────────────────────────────────────────────────
const GOALS=[
  {id:"steps",label:"10,000 steps",icon:"👟",desc:"Double your usual 5k."},
  {id:"water",label:"Drink 94 oz water",icon:"💧",desc:"Your daily hydration target."},
  {id:"protein",label:"Hit 145g protein",icon:"🥩",desc:"Most important target for recomp."},
  {id:"sleep",label:"Sleep 7+ hours",icon:"🌙",desc:"Recovery is when you build muscle."},
  {id:"supplements",label:"Take supplements",icon:"💊",desc:"Consistency compounds."},
];

// ── FEEDBACK ──────────────────────────────────────────────────────
function feedback(wis,history){
  const tips=[];
  if(wis.length>=2){
    const r=wis.slice(-4),delta=r[r.length-1].weight-r[0].weight,rate=delta/r.length;
    if(rate<-1) tips.push({type:"warn",title:"Losing too fast",body:`~${Math.abs(rate).toFixed(1)} lbs/week risks muscle loss. Add 150–200 kcal.`});
    else if(rate<-0.25) tips.push({type:"success",title:"Recomp on track",body:`~${Math.abs(rate).toFixed(2)} lbs/week. Keep going.`});
    else if(rate>0.25) tips.push({type:"warn",title:"Weight trending up",body:`+${rate.toFixed(1)} lbs/week. Tighten up on weekends.`});
    else tips.push({type:"info",title:"Weight stable",body:"Good for recomp. For fat loss, cut 100 kcal or add 1,500 steps."});
  }
  const gains=[];
  PROG.days.forEach((day,di)=>day.exercises.forEach((exO,ei)=>{
    const h=history[`d${di}_e${ei}`]||[];
    if(h.length>=3&&h[h.length-1].weight>h[0].weight) gains.push({name:exO.name,g:h[h.length-1].weight-h[0].weight});
  }));
  if(gains.length){const top=gains.sort((a,b)=>b.g-a.g)[0];tips.push({type:"success",title:`PR — ${top.name}`,body:`Up ${top.g} lbs from your first session.`});}
  if(!tips.length) tips.push({type:"info",title:"Log a weigh-in for feedback",body:"After 2+ entries you'll get adaptive recommendations here."});
  return tips;
}

// ── COMPONENTS ────────────────────────────────────────────────────
function MacroRing({value,max,color,label,size=72}){
  const r=size/2-7,circ=2*Math.PI*r,dash=circ*Math.min(value/(max||1),1);
  return <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
    <div style={{position:"relative",width:size,height:size}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)",position:"absolute"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.border} strokeWidth={5}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={5} strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" style={{filter:`drop-shadow(0 0 4px ${color})`}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <div style={{fontFamily:FM,fontSize:13,color:C.text}}>{Math.round(value)}</div>
        <div style={{fontSize:8,color:C.textMuted,textTransform:"uppercase",letterSpacing:1}}>g</div>
      </div>
    </div>
    <div style={{fontSize:10,color:color,textTransform:"uppercase",letterSpacing:1}}>{label}</div>
  </div>;
}

function NeonBar({color=C.neonGreen,pct=100}){
  return <div style={{height:2,background:C.border,borderRadius:2,overflow:"hidden"}}>
    <div style={{height:2,width:`${pct}%`,background:color,borderRadius:2,boxShadow:`0 0 8px ${color}`,transition:"width .4s"}}/>
  </div>;
}

function Card({children,accent,style={}}){
  return <div style={{background:C.surface,border:`1px solid ${accent?accent+"44":C.border}`,borderRadius:14,overflow:"hidden",...(accent?{boxShadow:`0 0 18px ${accent}11`}:{}),...style}}>{children}</div>;
}

const iStyle={width:"100%",padding:"10px 12px",background:C.surfaceHigh,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:14,outline:"none",fontFamily:FD};
const pBtn=(col=C.neonGreen)=>({width:"100%",padding:13,background:"transparent",border:`1.5px solid ${col}`,borderRadius:12,fontSize:14,fontWeight:700,fontFamily:FD,cursor:"pointer",color:col,boxShadow:`0 0 12px ${col}55`,letterSpacing:.5});

// ── DASHBOARD ─────────────────────────────────────────────────────
function Dashboard({profile,onUpdate}){
  const td=today();
  const [goals,setGoals]=useState(()=>ld(`goals_${td}`,{}));
  const [wis,setWis]=useState(()=>ld("weighins",[]));
  const [showWI,setShowWI]=useState(false);
  const [wf,setWf]=useState({weight:"",bodyFat:""});
  const hist=ld("wk_history",{});
  const log=ld(`nutri_${td}`,[]);
  useEffect(()=>{sv(`goals_${td}`,goals);},[goals]);
  useEffect(()=>{sv("weighins",wis);},[wis]);
  const prot=log.reduce((a,e)=>a+(parseFloat(e.protein)||0),0);
  const done=GOALS.filter(g=>goals[g.id]).length;
  const pct=Math.round(done/GOALS.length*100);
  const fb=feedback(wis,hist);
  const latest=wis.length?wis[wis.length-1]:null;
  const delta=wis.length>=2?latest.weight-wis[0].weight:null;

  function saveWI(){
    const w=parseFloat(wf.weight);if(!w)return;
    const bf=parseFloat(wf.bodyFat)||profile.bodyFat;
    const list=[...wis.filter(x=>x.date!==td),{date:td,weight:w,bodyFat:bf}].sort((a,b)=>a.date.localeCompare(b.date));
    setWis(list);
    const tdee=estimateTDEE(w,bf),cals=Math.round(tdee-250);
    onUpdate({...profile,weight:w,bodyFat:bf,calories:cals,tdee,...calcMacros(w,bf,cals)});
    setShowWI(false);setWf({weight:"",bodyFat:""});
  }

  return <div style={{padding:"16px 16px 88px"}}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
      <Card accent={C.neonPurple} style={{padding:"14px 14px 12px"}}>
        <div style={{fontSize:10,color:C.neonPurple,textTransform:"uppercase",letterSpacing:1.5,marginBottom:6}}>Weight</div>
        <div style={{fontFamily:FM,fontSize:26,color:C.text,lineHeight:1}}>{profile.weight}<span style={{fontSize:12,color:C.textMuted,marginLeft:3}}>lbs</span></div>
        {delta!==null&&<div style={{fontSize:11,marginTop:4,color:delta<=0?C.neonGreen:C.protein}}>{delta<=0?delta.toFixed(1):`+${delta.toFixed(1)}`} lbs</div>}
      </Card>
      <Card accent={C.neonGreen} style={{padding:"14px 14px 12px"}}>
        <div style={{fontSize:10,color:C.neonGreen,textTransform:"uppercase",letterSpacing:1.5,marginBottom:6}}>Goals today</div>
        <div style={{fontFamily:FM,fontSize:26,color:pct===100?C.neonGreen:C.text,lineHeight:1}}>{done}<span style={{fontSize:12,color:C.textMuted,marginLeft:2}}>/{GOALS.length}</span></div>
        <div style={{fontSize:11,color:C.textMuted,marginTop:4}}>{pct===100?"All done ⚡":"Keep going"}</div>
      </Card>
    </div>

    <Card style={{marginBottom:14}}>
      <div style={{padding:"12px 14px 6px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:10,color:C.textMuted,textTransform:"uppercase",letterSpacing:2}}>Daily goals</div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:60}}><NeonBar color={pct===100?C.neonGreen:C.neonPurple} pct={pct}/></div>
          <div style={{fontFamily:FM,fontSize:10,color:C.textMuted}}>{pct}%</div>
        </div>
      </div>
      {GOALS.map(g=>{
        const d=!!goals[g.id];
        return <div key={g.id} onClick={()=>setGoals(p=>({...p,[g.id]:!p[g.id]}))}
          style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderTop:`1px solid ${C.border}`,cursor:"pointer",background:d?`${C.neonGreen}08`:"transparent"}}>
          <div style={{width:24,height:24,borderRadius:6,flexShrink:0,border:`1.5px solid ${d?C.neonGreen:C.border}`,background:d?C.neonGreenDim:"transparent",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:d?`0 0 8px ${C.neonGreen}66`:"none"}}>
            {d&&<span style={{fontSize:12,color:C.neonGreen}}>✓</span>}
          </div>
          <div style={{fontSize:18,flexShrink:0}}>{g.icon}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:600,color:d?C.textMuted:C.text,textDecoration:d?"line-through":"none"}}>{g.label}</div>
            <div style={{fontSize:11,color:C.textMuted,marginTop:1}}>{g.id==="protein"?`${Math.round(prot)}g logged`:g.desc}</div>
          </div>
        </div>;
      })}
    </Card>

    <Card style={{padding:14,marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:10,color:C.textMuted,textTransform:"uppercase",letterSpacing:2}}>Weight log</div>
        <button onClick={()=>setShowWI(v=>!v)} style={{padding:"5px 12px",background:C.neonPurpleDim,border:`1px solid ${C.neonPurple}66`,borderRadius:8,color:C.neonPurple,fontSize:11,fontFamily:FD,cursor:"pointer"}}>
          {showWI?"Cancel":"+ Log"}
        </button>
      </div>
      {showWI&&<div style={{marginBottom:14,padding:12,background:C.surfaceHigh,borderRadius:10,border:`1px solid ${C.border}`}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <div>
            <div style={{fontSize:10,color:C.neonPurple,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Weight (lbs)</div>
            <input type="number" inputMode="decimal" placeholder="138" value={wf.weight} onChange={e=>setWf(f=>({...f,weight:e.target.value}))} style={iStyle}/>
          </div>
          <div>
            <div style={{fontSize:10,color:C.textMuted,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Body fat % (opt.)</div>
            <input type="number" inputMode="decimal" placeholder="23.5" value={wf.bodyFat} onChange={e=>setWf(f=>({...f,bodyFat:e.target.value}))} style={iStyle}/>
          </div>
        </div>
        <button onClick={saveWI} style={pBtn(C.neonPurple)}>Save & recalculate</button>
      </div>}
      {wis.length>0?<>
        <div style={{display:"flex",alignItems:"flex-end",gap:3,height:40,marginBottom:8}}>
          {wis.slice(-12).map((wi,i,arr)=>{
            const mn=Math.min(...arr.map(x=>x.weight))-2,mx=Math.max(...arr.map(x=>x.weight))+2;
            const h=Math.max(((wi.weight-mn)/(mx-mn))*40,4),last=i===arr.length-1;
            return<div key={wi.date} style={{flex:1,height:h,borderRadius:2,background:last?C.neonPurple:C.border,boxShadow:last?`0 0 6px ${C.neonPurple}`:undefined}}/>;
          })}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.textDim,fontFamily:FM}}>
          <span>{wis[0]?.date}</span><span>{latest?.weight} lbs</span>
        </div>
      </>:<div style={{textAlign:"center",padding:"14px 0",fontSize:13,color:C.textDim}}>Log your first weigh-in</div>}
    </Card>

    <div style={{fontSize:10,color:C.textMuted,textTransform:"uppercase",letterSpacing:2,marginBottom:10}}>Adaptive feedback</div>
    {fb.map((f,i)=>{
      const col=f.type==="success"?C.neonGreen:f.type==="warn"?C.warn:C.neonPurple;
      return <div key={i} style={{background:`${col}0a`,border:`1px solid ${col}33`,borderRadius:12,padding:"12px 14px",marginBottom:10}}>
        <div style={{fontSize:13,fontWeight:700,color:col,marginBottom:4}}>{f.title}</div>
        <div style={{fontSize:12,color:C.textMuted,lineHeight:1.7}}>{f.body}</div>
      </div>;
    })}
  </div>;
}

// ── NUTRITION ─────────────────────────────────────────────────────
function Nutrition({profile}){
  const td=today();
  const [log,setLog]=useState(()=>ld(`nutri_${td}`,[]));
  const [form,setForm]=useState({name:"",calories:"",protein:"",carbs:"",fat:""});
  const [showInfo,setShowInfo]=useState(false);
  useEffect(()=>{sv(`nutri_${td}`,log);},[log]);
  const tot=log.reduce((a,e)=>({calories:a.calories+(parseFloat(e.calories)||0),protein:a.protein+(parseFloat(e.protein)||0),carbs:a.carbs+(parseFloat(e.carbs)||0),fat:a.fat+(parseFloat(e.fat)||0)}),{calories:0,protein:0,carbs:0,fat:0});
  const cp=Math.min(Math.round(tot.calories/profile.calories*100),999);
  const cl=profile.calories-tot.calories;

  return <div style={{padding:"16px 16px 88px"}}>
    <Card accent={C.neonGreen} style={{padding:"20px 20px 18px",marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div>
          <div style={{fontSize:10,color:C.neonGreen,textTransform:"uppercase",letterSpacing:2,marginBottom:6}}>Calories today</div>
          <div style={{fontFamily:FM,fontSize:38,color:C.text,lineHeight:1}}>{Math.round(tot.calories)}</div>
          <div style={{fontSize:12,color:C.textMuted,marginTop:4}}>{cl>=0?`${Math.round(cl)} remaining`:`${Math.round(-cl)} over`}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontFamily:FM,fontSize:28,color:cp>=100?C.protein:C.neonGreen}}>{cp}%</div>
          <div style={{fontSize:11,color:C.textMuted}}>of {profile.calories}</div>
          <button onClick={()=>setShowInfo(v=>!v)} style={{fontSize:10,color:C.neonPurple,background:"none",border:"none",cursor:"pointer",fontFamily:FD}}>how? {showInfo?"▲":"▼"}</button>
        </div>
      </div>
      {showInfo&&<div style={{background:C.surfaceHigh,borderRadius:8,padding:"10px 12px",marginBottom:12,fontSize:11,color:C.textMuted,lineHeight:1.9,border:`1px solid ${C.border}`}}>
        <div><span style={{color:C.neonGreen}}>TDEE</span> ~{profile.tdee} kcal (Katch-McArdle × 1.25)</div>
        <div><span style={{color:C.neonGreen}}>Target</span> {profile.calories} kcal (−250 deficit)</div>
        <div><span style={{color:C.protein}}>Protein</span> {profile.protein}g · 1.05g/lb lean mass</div>
        <div><span style={{color:C.fat}}>Fat</span> {profile.fat}g · hormonal floor</div>
        <div><span style={{color:C.carbs}}>Carbs</span> {profile.carbs}g · training fuel</div>
        <div style={{marginTop:6,fontSize:10,color:C.textDim}}>Auto-updates on weigh-in.</div>
      </div>}
      <NeonBar color={cp>=100?C.protein:C.neonGreen} pct={Math.min(cp,100)}/>
      <div style={{display:"flex",justifyContent:"space-around",paddingTop:14}}>
        <MacroRing value={tot.protein} max={profile.protein} color={C.protein} label="Protein"/>
        <MacroRing value={tot.carbs} max={profile.carbs} color={C.carbs} label="Carbs"/>
        <MacroRing value={tot.fat} max={profile.fat} color={C.fat} label="Fat"/>
      </div>
    </Card>

    <Card style={{padding:"12px 14px",marginBottom:14}}>
      <div style={{fontSize:10,color:C.textMuted,textTransform:"uppercase",letterSpacing:2,marginBottom:12}}>Daily targets</div>
      {[["Protein",tot.protein,profile.protein,C.protein],["Carbs",tot.carbs,profile.carbs,C.carbs],["Fat",tot.fat,profile.fat,C.fat]].map(([l,v,m,c])=>(
        <div key={l} style={{marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
            <span style={{fontSize:12,color:c}}>{l}</span>
            <span style={{fontFamily:FM,fontSize:11,color:C.textMuted}}>{Math.round(v)} / {m}g</span>
          </div>
          <NeonBar color={c} pct={Math.min(v/(m||1)*100,100)}/>
        </div>
      ))}
      <div style={{display:"flex",justifyContent:"space-between",paddingTop:4}}>
        <span style={{fontSize:12,color:C.fat}}>Water</span>
        <span style={{fontFamily:FM,fontSize:11,color:C.textMuted}}>{profile.waterOz} oz · track on Dashboard</span>
      </div>
    </Card>

    <Card style={{padding:14,marginBottom:14}}>
      <div style={{fontSize:10,color:C.textMuted,textTransform:"uppercase",letterSpacing:2,marginBottom:10}}>Log food</div>
      <input placeholder="Food name (optional)" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} style={{...iStyle,marginBottom:8}}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,marginBottom:10}}>
        {[["calories","Kcal",C.neonGreen],["protein","Pro",C.protein],["carbs","Carbs",C.carbs],["fat","Fat",C.fat]].map(([k,l,c])=>(
          <div key={k}>
            <div style={{fontSize:9,color:c,textTransform:"uppercase",letterSpacing:.8,marginBottom:3}}>{l}</div>
            <input type="number" placeholder="0" value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} style={{...iStyle,textAlign:"center",padding:"8px 4px"}}/>

        ))}

      <button onClick={()=>{if(!form.name.trim()&&!form.calories)return;setLog(l=>[...l,{...form,id:Date.now()}]);setForm({name:"",calories:"",protein:"",carbs:"",fat:""});}} style={pBtn(C.neonGreen)}>+ Add entry</button>
    </Card>

    {log.length>0&&<Card>
      <div style={{padding:"12px 14px 8px",fontSize:10,color:C.textMuted,textTransform:"uppercase",letterSpacing:2}}>Today's log</div>
      {log.map((e,i)=><div key={e.id} style={{display:"flex",alignItems:"center",padding:"10px 14px",borderTop:`1px solid ${C.border}`}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.name||`Entry ${i+1}`}</div>
          <div style={{fontFamily:FM,fontSize:10,display:"flex",gap:10}}>
            <span style={{color:C.neonGreen}}>{Math.round(e.calories||0)} kcal</span>
            <span style={{color:C.protein}}>{Math.round(e.protein||0)}g P</span>
            <span style={{color:C.carbs}}>{Math.round(e.carbs||0)}g C</span>
            <span style={{color:C.fat}}>{Math.round(e.fat||0)}g F</span>
          </div>
        </div>
        <button onClick={()=>setLog(l=>l.filter(x=>x.id!==e.id))} style={{background:"none",border:"none",color:C.textMuted,fontSize:20,padding:"4px 8px",cursor:"pointer",lineHeight:1}}>×</button>
      </div>)}
    </Card>}
  </div>;
}

// ── WORKOUT ───────────────────────────────────────────────────────
function Workout(){
  const [week,setWeek]=useState(()=>ld("wk_week",1));
  const [day,setDay]=useState(()=>{let d=new Date().getDay();return d===0?6:d-1;});
  const [openEx,setOpenEx]=useState(0);
  const [comp,setComp]=useState(()=>ld("wk_completed",[]));
  const [sd,setSd]=useState(()=>ld("wk_setdata",{}));
  const [hist,setHist]=useState(()=>ld("wk_history",{}));
  useEffect(()=>{sv("wk_week",week);},[week]);
  useEffect(()=>{sv("wk_completed",comp);},[comp]);
  useEffect(()=>{sv("wk_setdata",sd);},[sd]);
  useEffect(()=>{sv("wk_history",hist);},[hist]);

  const phase=pf(week),dl=week>0&&week%6===0,pc=PC[phase];
  const getLast=(di,ei)=>{const h=hist[`d${di}_e${ei}`]||[];return h.length?h[h.length-1]:null;};
  const getSug=(di,ei)=>{const ep=PROG.days[di].exercises[ei].phases[phase],last=getLast(di,ei);if(!last)return null;if(dl)return Math.round(last.weight*.85*4)/4;return last.reps>=ep.rr[1]?last.weight+PROG.days[di].exercises[ei].inc:last.weight;};
  const getSets=(di,ei)=>{const k=`d${di}_e${ei}_w${week}`;if(!sd[k]){const ep=PROG.days[di].exercises[ei].phases[phase];if(ep.sets===0)return[];const sw=getSug(di,ei);return Array.from({length:ep.sets},()=>({weight:sw?String(sw):"",reps:"",done:false}));}return sd[k];};
  const updSet=(di,ei,si,field,val)=>{const k=`d${di}_e${ei}_w${week}`,cur=getSets(di,ei);setSd(d=>({...d,[k]:cur.map((s,i)=>i===si?{...s,[field]:val}:s)}));};
  const tgl=(di,ei,si)=>{const k=`d${di}_e${ei}_w${week}`,cur=getSets(di,ei);setSd(d=>({...d,[k]:cur.map((s,i)=>i===si?{...s,done:!s.done}:s)}));};
  const addS=(di,ei)=>{const k=`d${di}_e${ei}_w${week}`,cur=getSets(di,ei);setSd(d=>({...d,[k]:[...cur,{weight:cur[0]?.weight||"",reps:"",done:false}]}));};
  const prog=(di)=>{const d=PROG.days[di];if(d.rest||!d.exercises.length)return 1;let t=0,dn=0;pex(d,phase).forEach(exO=>{const ei=d.exercises.indexOf(exO);getSets(di,ei).forEach(s=>{t++;if(s.done)dn++;});});return t?dn/t:0;};
  const finish=()=>{
    const di=day,d=PROG.days[di],nh={...hist};
    pex(d,phase).forEach(exO=>{const ei=d.exercises.indexOf(exO);const sets=getSets(di,ei).filter(s=>s.done&&s.weight&&s.reps);if(!sets.length)return;const hk=`d${di}_e${ei}`;nh[hk]=[...(nh[hk]||[]),{week,weight:parseFloat(sets[0].weight)||0,reps:Math.max(...sets.map(s=>parseFloat(s.reps)||0)),sets:sets.length}];});
    setHist(nh);const nc=[...new Set([...comp,di])];setComp(nc);
    if(PROG.days.map((_,i)=>i).filter(i=>!PROG.days[i].rest).every(i=>nc.includes(i))){setWeek(w=>w+1);setComp([]);setSd({});}
  };

  const D=PROG.days[day],pct=Math.round(prog(day)*100),isDone=comp.includes(day),exes=D.rest?[]:pex(D,phase);
  const si=(ex={})=>({height:38,border:`1px solid ${C.border}`,borderRadius:8,textAlign:"center",fontSize:14,color:C.text,background:C.surfaceHigh,width:"100%",outline:"none",fontFamily:FD,...ex});

  return <div style={{padding:"16px 16px 88px"}}>
    <Card accent={pc} style={{padding:"10px 14px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div>
        <div style={{fontSize:9,color:pc,textTransform:"uppercase",letterSpacing:2,marginBottom:2}}>Phase {phase+1} · {PL[phase]}</div>
        <div style={{fontSize:12,color:C.textMuted}}>{PD[phase]}</div>
      </div>
      <div style={{fontFamily:FM,fontSize:22,color:pc,fontWeight:700,marginLeft:12,flexShrink:0}}>W{week}</div>
    </Card>

    <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:16,scrollbarWidth:"none"}}>
      {PROG.days.map((d,i)=>{
        const done=comp.includes(i),active=i===day;
        return <button key={i} onClick={()=>{setDay(i);setOpenEx(0);}} style={{flexShrink:0,padding:"6px 12px",borderRadius:20,fontSize:10,fontWeight:active?700:400,letterSpacing:1.2,fontFamily:FM,background:active?pc:"transparent",color:active?"#000":done?C.neonGreen:d.prime?C.warn:C.textMuted,border:`1px solid ${active?pc:done?C.neonGreen+"88":d.prime?C.warn+"66":C.border}`,cursor:"pointer"}}>
          {d.label}{d.prime&&!active&&<span style={{marginLeft:2,fontSize:8}}>⚡</span>}
        </button>;
      })}
    </div>

    {D.rest?<div style={{textAlign:"center",padding:"60px 24px"}}>
      <div style={{fontSize:48,marginBottom:16,color:C.textMuted}}>◑</div>
      <div style={{fontSize:18,fontWeight:700,color:C.text,marginBottom:8}}>Rest & recover</div>
      <div style={{fontSize:14,color:C.textMuted,lineHeight:1.7}}>Sleep, eat well, let the adaptation happen.</div>
    </div>:<>
      <div style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
              <div style={{fontSize:20,fontWeight:700,color:C.text}}>{D.name}</div>
              {D.prime&&<span style={{fontSize:10,background:C.warnDim,color:C.warn,padding:"2px 8px",borderRadius:10,border:`1px solid ${C.warn}44`}}>⚡ PRIME</span>}
            </div>
            <div style={{fontSize:12,color:C.textMuted}}>{D.focus}</div>
          </div>
        </div>
        <div style={{background:C.surfaceHigh,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",margin:"8px 0 12px",fontSize:12,color:C.textMuted,lineHeight:1.6}}>{D.phaseNotes[phase]}</div>
        {dl&&<div style={{background:C.warnDim,border:`1px solid ${C.warn}44`,borderRadius:8,padding:"8px 12px",marginBottom:10,fontSize:12,color:C.warn}}>Deload week — weights at 85% of last session.</div>}
        {isDone?<div style={{background:C.successDim,border:`1px solid ${C.neonGreen}66`,borderRadius:10,padding:"12px 14px",display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontSize:20,color:C.neonGreen}}>✓</div>
          <div><div style={{fontSize:14,fontWeight:700,color:C.neonGreen}}>Session complete</div><div style={{fontSize:12,color:C.textMuted}}>{pct}% of sets logged</div></div>
        </div>:<NeonBar color={pc} pct={pct}/>}
      </div>

      {exes.map(exO=>{
        const ei=D.exercises.indexOf(exO),ep=exO.phases[phase],sets=getSets(day,ei);
        const allDone=sets.length>0&&sets.every(s=>s.done),isOpen=openEx===ei;
        const sw=getSug(day,ei),last=getLast(day,ei),hitTop=last&&last.reps>=ep.rr[1];
        return <div key={ei} style={{background:C.surface,border:`1px solid ${allDone?C.neonGreen+"66":C.border}`,borderRadius:14,marginBottom:10,overflow:"hidden"}}>
          <div onClick={()=>setOpenEx(isOpen?-1:ei)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",cursor:"pointer"}}>
            <div style={{width:28,height:28,borderRadius:"50%",flexShrink:0,background:allDone?C.successDim:C.surfaceHigh,color:allDone?C.neonGreen:C.textMuted,border:`1px solid ${allDone?C.neonGreen+"66":C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FM,fontSize:12}}>
              {allDone?"✓":ei+1}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{exO.name}</div>
              <div style={{fontSize:11,color:C.textMuted,marginTop:1,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                {ep.sets}×{ep.rr[0]}-{ep.rr[1]} · RPE {ep.rpe}
                {sw!==null&&<span style={{fontSize:10,padding:"1px 7px",borderRadius:10,fontFamily:FM,background:hitTop&&!dl?C.neonGreenDim:C.surfaceHigh,color:hitTop&&!dl?C.neonGreen:C.textDim,border:`1px solid ${hitTop&&!dl?C.neonGreen+"44":C.border}`}}>
                  {dl?"deload":hitTop?`+${exO.inc}lb`:"same"}
                </span>}
              </div>
            </div>
            <div style={{color:C.textMuted,fontSize:14,transform:isOpen?"rotate(180deg)":"none"}}>⌄</div>
          </div>
          {isOpen&&<div style={{padding:"0 14px 14px",borderTop:`1px solid ${C.border}`}}>
            {exO.note&&<div style={{background:C.surfaceHigh,borderRadius:8,padding:"8px 10px",margin:"10px 0 8px",fontSize:11,color:C.textMuted,lineHeight:1.6}}>💡 {exO.note}</div>}
            {sw!==null&&<div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${C.border}`,marginBottom:8}}>
              <span style={{fontSize:12,color:C.textMuted}}>Suggested weight</span>
              <span style={{fontFamily:FM,fontSize:13,color:C.neonGreen}}>{sw} lbs</span>
            </div>}
            <div style={{display:"grid",gridTemplateColumns:"28px 1fr 1fr 40px",gap:6,padding:"4px 0"}}>
              {["Set","Weight","Reps","✓"].map(h=><div key={h} style={{fontSize:9,color:C.textDim,textAlign:"center",textTransform:"uppercase",letterSpacing:.5}}>{h}</div>)}
            </div>
            {sets.map((s,si)=><div key={si} style={{display:"grid",gridTemplateColumns:"28px 1fr 1fr 40px",gap:6,marginBottom:6,alignItems:"center"}}>
              <div style={{fontFamily:FM,fontSize:11,color:C.textDim,textAlign:"center"}}>{si+1}</div>
              <input type="number" inputMode="decimal" placeholder="lbs" value={s.weight} onChange={e=>updSet(day,ei,si,"weight",e.target.value)} style={si({})}/>
              <input type="number" inputMode="numeric" placeholder={ep.rr[0]} value={s.reps} onChange={e=>updSet(day,ei,si,"reps",e.target.value)} style={si({borderColor:s.reps&&parseInt(s.reps)>=ep.rr[1]?C.neonGreen:C.border})}/>
              <button onClick={()=>tgl(day,ei,si)} style={{height:38,width:40,borderRadius:8,border:`1px solid ${s.done?C.neonGreen:C.border}`,background:s.done?C.successDim:C.surfaceHigh,color:s.done?C.neonGreen:C.textDim,fontSize:15,cursor:"pointer"}}>✓</button>
            </div>)}
            <button onClick={()=>addS(day,ei)} style={{width:"100%",padding:8,background:"transparent",border:`1px dashed ${C.border}`,borderRadius:8,color:C.textMuted,fontSize:12,fontFamily:FD,cursor:"pointer",marginTop:4}}>+ Add set</button>
          </div>}
        </div>;
      })}
      {!isDone&&<button onClick={finish} style={{...pBtn(pc),marginTop:4}}>Finish session</button>}
    </>}
  </div>;
}

// ── PROGRESS ──────────────────────────────────────────────────────
function Progress(){
  const hist=ld("wk_history",{}),week=ld("wk_week",1),phase=pf(week),byEx={};
  PROG.days.forEach((day,di)=>day.exercises.forEach((exO,ei)=>{const h=hist[`d${di}_e${ei}`]||[];if(h.length){if(!byEx[exO.name])byEx[exO.name]=[];byEx[exO.name].push(...h);}}));
  const exes=Object.keys(byEx);
  if(!exes.length)return <div style={{padding:32,textAlign:"center"}}>
    <div style={{fontSize:40,marginBottom:12,color:C.neonPurple}}>◎</div>
    <div style={{fontSize:16,fontWeight:700,color:C.text,marginBottom:8}}>No data yet</div>
    <div style={{fontSize:14,color:C.textMuted,lineHeight:1.7}}>Complete your first session to track progression.</div>
  </div>;
  return <div style={{padding:"16px 16px 88px"}}>
    <Card accent={PC[phase]} style={{padding:"10px 14px",marginBottom:16}}>
      <div style={{fontSize:9,color:PC[phase],textTransform:"uppercase",letterSpacing:2,marginBottom:2}}>Phase {phase+1} · {PL[phase]}</div>
      <div style={{fontSize:12,color:C.textMuted}}>Week {week} · {exes.length} exercises tracked</div>
    </Card>
    {exes.map(name=>{
      const entries=byEx[name],latest=entries[entries.length-1],gained=Math.round((latest.weight-entries[0].weight)*10)/10,maxW=Math.max(...entries.map(e=>e.weight));
      return <Card key={name} style={{padding:"14px 14px 12px",marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div style={{flex:1,paddingRight:12}}>
            <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:2}}>{name}</div>
            <div style={{fontSize:11,color:C.textMuted}}>{entries.length} session{entries.length!==1?"s":""}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:FM,fontSize:18,color:C.neonGreen}}>{latest.weight} lbs</div>
            {gained>0&&<div style={{fontSize:11,color:C.neonGreen}}>+{gained} lbs</div>}
            {gained===0&&entries.length>1&&<div style={{fontSize:11,color:C.textDim}}>holding</div>}
          </div>
        </div>
        {entries.length>1&&<div style={{display:"flex",alignItems:"flex-end",gap:3,height:28}}>
          {entries.map((e,i)=>{const h=maxW>0?Math.max(e.weight/maxW*28,3):3,last=i===entries.length-1;return<div key={i} style={{flex:1,height:h,borderRadius:2,background:last?C.neonPurple:C.border,boxShadow:last?`0 0 6px ${C.neonPurple}`:undefined}}/>;  })}
        </div>}
      </Card>;
    })}
  </div>;
}

            {active&&<div style={{position:"absolute",top:-1,left:"50%",transform:"translateX(-50%)",width:24,height:1.5,background:C.neonGreen,borderRadius:2,boxShadow:`0 0 8px ${C.neonGreen}`}}/>}
            <div style={{fontSize:16,color:active?C.neonGreen:C.textDim}}>{t.icon}</div>
            <div style={{fontSize:9,textTransform:"uppercase",letterSpacing:1,color:active?C.neonGreen:C.textDim,fontWeight:active?700:400}}>{t.label}</div>
          </button>
        );})}
      </div>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
